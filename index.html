<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#12141c;
    --panel:#1b1f2e;
    --panel-light:#242a3d;
    --buzz:#e63946;
    --buzz-dark:#a4222d;
    --gold:#f4b942;
    --text:#f1efea;
    --text-dim:#8a8fa3;
    --good:#4cc38a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;padding:0;background:transparent;}
  button,.qb-avatar{touch-action:manipulation;user-select:none;-webkit-user-select:none;}
  #qb-root{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 48px;
  }
  .qb-title{
    font-family:'Archivo Black','Inter',sans-serif;
    letter-spacing:0.5px;
  }
  .qb-card{
    background:var(--panel);
    border-radius:18px;
    padding:28px 24px;
    width:100%;
    max-width:520px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
  }
  .qb-btn{
    display:block;
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:var(--panel-light);
    transition:transform .12s ease, background .12s ease;
  }
  .qb-btn:hover{background:#2c3348;}
  .qb-btn:active{transform:scale(0.98);}
  .qb-btn-primary{background:var(--buzz);}
  .qb-btn-primary:hover{background:#ff4c58;}
  .qb-btn-gold{background:var(--gold);color:#1b1f2e;}
  .qb-btn-gold:hover{background:#ffca5c;}
  .qb-btn-ghost{background:transparent;border:1px solid #3a4160;}
  .qb-btn-small{padding:10px;margin:0;font-size:13px;}
  .qb-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .qb-input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #3a4160;
    background:var(--panel-light);
    color:var(--text);
    font-size:16px;
    margin-bottom:14px;
  }
  .qb-label{font-size:13px;color:var(--text-dim);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:1px;}
  .qb-avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:18px;}
  .qb-avatar{
    font-size:28px;
    text-align:center;
    padding:10px 0;
    border-radius:10px;
    background:var(--panel-light);
    cursor:pointer;
    border:2px solid transparent;
  }
  .qb-avatar.selected{border-color:var(--gold);background:#333c58;}
  .qb-buzzer-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px;}
  .qb-buzzer-pick{
    padding:12px 10px;border-radius:10px;border:2px solid transparent;
    background:var(--panel-light);color:var(--text);font-size:14px;font-weight:600;
    cursor:pointer;text-align:center;
  }
  .qb-buzzer-pick:hover{background:#2c3348;}
  .qb-buzzer-pick.selected{border-color:var(--gold);background:#333c58;}

  /* Buzzer */
  .qb-buzzer-wrap{display:flex;flex-direction:column;align-items:center;gap:22px;padding:30px 0;}
  .qb-buzzer{
    width:230px;height:230px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ff5561, var(--buzz) 60%, var(--buzz-dark) 100%);
    border:none;
    box-shadow:0 10px 0 var(--buzz-dark), 0 16px 30px rgba(230,57,70,0.4);
    font-family:'Archivo Black',sans-serif;
    font-size:30px;
    color:#fff;
    cursor:pointer;
    letter-spacing:1px;
  }
  .qb-buzzer:active{transform:translateY(6px);box-shadow:0 4px 0 var(--buzz-dark), 0 8px 20px rgba(230,57,70,0.4);}
  .qb-buzzer:disabled{
    background:radial-gradient(circle at 35% 30%, #4a4f60, #383d4d 60%, #2b2f3c 100%);
    box-shadow:0 10px 0 #1e2130;
    color:var(--text-dim);
    cursor:not-allowed;
  }
  .qb-status-line{font-size:18px;font-weight:600;text-align:center;min-height:26px;}
  .qb-status-sub{color:var(--text-dim);font-size:14px;text-align:center;}
  .qb-stage-pill{
    display:inline-block;background:var(--panel-light);color:var(--gold);
    padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;
    letter-spacing:0.5px;margin-bottom:10px;
  }

  /* Scoreboard */
  .qb-scoreboard{width:100%;}
  .qb-score-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-light);
    padding:10px 14px;border-radius:10px;margin-bottom:8px;
  }
  .qb-score-row .name{display:flex;align-items:center;gap:10px;font-weight:600;}
  .qb-score-row .pts{font-family:'Archivo Black',sans-serif;color:var(--gold);}
  .qb-rank{color:var(--text-dim);width:22px;display:inline-block;}

  /* Display (projector) mode */
  .qb-display{width:100%;max-width:1100px;text-align:center;}
  .qb-display .round-tag{
    color:var(--gold);font-family:'Archivo Black',sans-serif;
    letter-spacing:2px;text-transform:uppercase;font-size:28px;margin-bottom:4px;
  }
  .qb-display .round-tag .of{color:var(--text-dim);font-size:20px;letter-spacing:1px;}
  .qb-display .round-tag .rt-name{color:var(--gold);}
  /* on game screens the quiz name lives quietly in the top bar; the round and
     question take the stage. The lobby and podium keep the big hero title. */
  .qb-topbar{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:14px;}
  .qb-topbar .qb-back-link{margin-bottom:0;}
  .qb-brand{font-family:'Archivo Black',sans-serif;font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);}
  .qb-display > .round-tag{margin-bottom:22px;}
  .qb-display .qb-title{font-size:44px;margin:0 0 20px;}
  .qb-display .qb-stage-pill{font-size:18px;padding:10px 22px;margin-bottom:26px;}
  .qb-buzz-flash{
    background:linear-gradient(135deg,var(--buzz),#ff5561);
    border-radius:24px;
    padding:50px 30px;
    margin-bottom:34px;
    animation:qb-pulse 0.9s ease-in-out infinite;
  }
  @keyframes qb-pulse{0%{box-shadow:0 0 0 0 rgba(230,57,70,0.6);}70%{box-shadow:0 0 0 40px rgba(230,57,70,0);}100%{box-shadow:0 0 0 0 rgba(230,57,70,0);}}
  .qb-buzz-flash .who{font-family:'Archivo Black',sans-serif;font-size:64px;}
  .qb-buzz-avatar{font-size:80px;}
  .qb-idle-box{
    background:var(--panel);
    border:2px dashed #3a4160;
    border-radius:24px;
    padding:60px 30px;
    margin-bottom:34px;
    color:var(--text-dim);
    font-size:22px;
  }
  .qb-reveal-box{
    background:var(--panel);
    border:2px solid var(--gold);
    border-radius:24px;
    padding:44px 30px;
    margin-bottom:34px;
  }
  .qb-reveal-box .song{font-family:'Archivo Black',sans-serif;font-size:42px;color:var(--gold);margin:4px 0;}
  .qb-reveal-box .artist{font-size:20px;color:var(--text-dim);margin-bottom:14px;}
  .qb-reveal-box .winner-line{font-size:22px;font-weight:700;margin-top:14px;}
  .qb-display-scoreboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
  .qb-display-scoreboard .qb-score-row{font-size:20px;padding:16px 20px;}
  .qb-lobby{display:flex;flex-wrap:wrap;gap:40px;align-items:flex-start;justify-content:center;margin-bottom:30px;}
  .qb-qr-box{
    background:#fff;border-radius:20px;padding:20px;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .qb-qr-box .qb-qr-caption{color:#12141c;font-weight:700;font-size:14px;}
  .qb-lobby-joined{flex:1;min-width:280px;text-align:left;}
  .qb-lobby-joined h3{margin:0 0 14px;font-size:16px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}
  .qb-lobby-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .qb-lobby-chip{
    background:var(--panel-light);border-radius:12px;padding:12px;
    display:flex;align-items:center;gap:8px;font-weight:600;
  }
  .qb-lobby-chip .av{font-size:22px;}
  .qb-join-strip{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:26px;}
  .qb-join-strip .qb-qr-mini{background:#fff;border-radius:12px;padding:8px;}
  .qb-join-strip .strip-code{font-family:'Archivo Black',sans-serif;font-size:22px;color:var(--gold);}

  /* Admin */
  .qb-admin-section{margin-bottom:26px;}
  .qb-admin-section h3{margin:0 0 12px;font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);}

  /* desktop admin dashboard: everything on one screen, no page scrolling.
     The layout is a fixed-height column: header, then the live strip (always
     visible), then three columns that each scroll their own content. */
  .qb-admin-layout{
    width:100%;max-width:1400px;display:flex;flex-direction:column;gap:16px;
    height:calc(100dvh - 120px);min-height:420px;
  }
  .qb-admin-header{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;flex:none;}
  .qb-admin-header .qb-title{margin:0;font-size:24px;}
  .qb-admin-header .code{color:var(--gold);font-family:'Archivo Black',sans-serif;letter-spacing:1px;}
  .qb-admin-card{
    background:var(--panel);border-radius:18px;padding:20px 22px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);min-width:0;
    scrollbar-width:thin;
  }
  .qb-admin-card .qb-admin-section{margin-bottom:0;}
  .qb-admin-card .qb-admin-section + .qb-admin-section{margin-top:22px;}
  .qb-admin-card.qb-full{flex:none;max-height:44vh;overflow-y:auto;}
  .qb-admin-card.live{border:1px solid #3a4160;}
  .qb-admin-cols{
    flex:1;min-height:0;
    display:grid;grid-template-columns:repeat(3, minmax(0, 1fr));gap:16px;
  }
  .qb-admin-cols > *{min-height:0;}
  .qb-admin-cols > .qb-admin-card{overflow-y:auto;}
  .qb-col{display:flex;flex-direction:column;gap:16px;min-height:0;}
  .qb-col > .qb-admin-card{overflow-y:auto;flex:0 1 auto;min-height:0;}
  .qb-col > .qb-admin-card:first-child{flex:1 1 auto;}
  .qb-admin-card::-webkit-scrollbar{width:8px;}
  .qb-admin-card::-webkit-scrollbar-thumb{background:#3a4160;border-radius:4px;}
  .qb-form-cols{display:grid;grid-template-columns:1fr 1fr;gap:0 28px;align-items:start;}
  @media(max-width:1100px){
    /* smaller screens: give up the fixed dashboard and scroll the page normally */
    .qb-admin-layout{height:auto;min-height:0;}
    .qb-admin-cols{grid-template-columns:repeat(2, minmax(0,1fr));}
    .qb-admin-card.qb-full,.qb-admin-cols > .qb-admin-card,.qb-col > .qb-admin-card{max-height:none;overflow:visible;}
    .qb-col > .qb-admin-card:first-child{flex:none;}
  }
  @media(max-width:740px){
    .qb-admin-cols{grid-template-columns:1fr;}
    .qb-form-cols{grid-template-columns:1fr;}
  }
  .qb-buzzed-banner{
    background:var(--panel-light);
    border-radius:12px;
    padding:18px;
    text-align:center;
    margin-bottom:14px;
  }
  .qb-buzzed-banner .who{font-family:'Archivo Black',sans-serif;font-size:26px;margin:6px 0 14px;}
  .qb-row-2{display:flex;gap:10px;}
  .qb-row-2 .qb-btn{flex:1;}
  .qb-player-admin-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-light);padding:10px 12px;border-radius:10px;margin-bottom:8px;
  }
  .qb-remove-x{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;}
  .qb-remove-x:hover{color:var(--buzz);}
  .qb-score-adj{
    width:30px;height:30px;border-radius:8px;border:1px solid #3a4160;
    background:transparent;color:var(--text);font-size:16px;font-weight:700;
    cursor:pointer;line-height:1;
  }
  .qb-score-adj:hover{background:#2c3348;}

  /* exploding result banner on the display */
  .qb-banner-overlay{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;z-index:50;
  }
  .qb-banner{
    font-family:'Archivo Black',sans-serif;
    font-size:52px;text-align:center;padding:34px 54px;border-radius:24px;
    max-width:80vw;
    box-shadow:0 20px 80px rgba(0,0,0,0.6);
    animation:qb-explode 0.5s cubic-bezier(.17,.89,.32,1.28) both, qb-banner-out 0.45s ease 2.8s both;
  }
  .qb-banner.correct{background:var(--gold);color:#1b1f2e;}
  .qb-banner.wrong{background:var(--buzz);color:#fff;}
  /* bomb: solid flame gradient, flashing hot — was transparent (no bg rule) and unreadable */
  .qb-banner.bomb{
    background:linear-gradient(160deg,#ff2d1a 0%,#ff7a1a 45%,#ffc61a 100%);
    color:#fff;text-shadow:0 3px 0 #7a1200,0 6px 22px rgba(0,0,0,0.55);
    border:4px solid #ffe28a;
    animation:qb-explode 0.5s cubic-bezier(.17,.89,.32,1.28) both, qb-banner-out 0.45s ease 2.8s both, qb-flame-flash 0.22s linear infinite alternate;
  }
  @keyframes qb-flame-flash{
    from{filter:brightness(1) saturate(1.1);box-shadow:0 0 60px 18px rgba(255,90,20,0.55);}
    to{filter:brightness(1.35) saturate(1.5) hue-rotate(-14deg);box-shadow:0 0 110px 42px rgba(255,170,30,0.8);}
  }
  /* tactical nuke: alarm-red flash, harsher and faster than the bomb */
  .qb-banner.nuke{
    background:linear-gradient(160deg,#8f0000 0%,#e00000 55%,#ff5400 100%);
    color:#fff;text-shadow:0 3px 0 #4d0000,0 6px 26px rgba(0,0,0,0.7);
    border:4px dashed #ffd21f;
    animation:qb-explode 0.5s cubic-bezier(.17,.89,.32,1.28) both, qb-banner-out 0.45s ease 4.3s both, qb-nuke-flash 0.16s steps(2,end) infinite;
  }
  @keyframes qb-nuke-flash{
    from{filter:brightness(1);box-shadow:0 0 80px 24px rgba(255,40,0,0.7);}
    to{filter:brightness(1.6) saturate(1.4);box-shadow:0 0 140px 60px rgba(255,210,30,0.85);}
  }
  /* carpet bomb: hazard-striped and shuddering, a wider blast than one bomb */
  .qb-banner.carpet{
    background:repeating-linear-gradient(135deg,#ff6a00 0 26px,#1a1206 26px 52px);
    color:#fff;text-shadow:0 3px 0 #6b2400,0 6px 22px rgba(0,0,0,0.7);
    border:4px solid #ffb800;
    animation:qb-explode 0.5s cubic-bezier(.17,.89,.32,1.28) both, qb-banner-out 0.45s ease 3.2s both, qb-carpet-shake 0.1s linear infinite;
  }
  @keyframes qb-carpet-shake{
    0%{transform:translate(0,0);}   25%{transform:translate(-5px,3px);}
    50%{transform:translate(4px,-3px);} 75%{transform:translate(-3px,-2px);}
    100%{transform:translate(0,0);}
  }
  /* virus: sickly green, breathing rather than exploding */
  .qb-banner.virus{
    background:linear-gradient(160deg,#0b3a1c 0%,#1f9c4a 55%,#7ee08a 100%);
    color:#eafff0;text-shadow:0 2px 0 #06301a,0 5px 18px rgba(0,0,0,0.6);
    border:4px solid #8dffab;
    animation:qb-explode 0.5s cubic-bezier(.17,.89,.32,1.28) both, qb-banner-out 0.45s ease 3.0s both, qb-virus-breathe 0.9s ease-in-out infinite alternate;
  }
  @keyframes qb-virus-breathe{
    from{filter:hue-rotate(0deg) brightness(1);box-shadow:0 0 50px 12px rgba(60,220,110,0.45);}
    to{filter:hue-rotate(-18deg) brightness(1.22);box-shadow:0 0 110px 40px rgba(120,255,150,0.7);}
  }
  /* the infected player's phone: a green wash every time the virus bites.
     Deliberately pointer-events:none — unlike the oil slick this is a
     announcement, not a handicap, and it lands at the reveal anyway. */
  .qb-virus-overlay{
    position:fixed;inset:0;z-index:1900;pointer-events:none;overflow:hidden;
    background:radial-gradient(circle at 50% 42%, rgba(60,220,110,0.30), rgba(4,26,12,0.62));
    animation:qb-virus-wash 0.5s ease-in-out 5 alternate;
  }
  @keyframes qb-virus-wash{from{opacity:0.55;}to{opacity:1;}}
  .qb-virus-germ{position:absolute;font-size:34px;animation:qb-germ-float linear forwards;opacity:0.9;}
  @keyframes qb-germ-float{
    from{transform:translateY(110vh) rotate(0deg);}
    to{transform:translateY(-20vh) rotate(360deg);}
  }
  .qb-virus-msg{
    position:absolute;left:0;right:0;top:36%;text-align:center;
    font-family:'Archivo Black',sans-serif;font-size:26px;color:#eafff0;
    text-shadow:0 2px 14px #04270f;padding:0 18px;
  }
  /* a standing infection, shown on the phone until they answer one right */
  .qb-infected-badge{
    display:block;margin:8px auto 0;max-width:340px;border-radius:12px;padding:8px 12px;
    background:linear-gradient(160deg,#0b3a1c,#1f9c4a);border:2px solid #8dffab;
    color:#eafff0;font-weight:800;text-align:center;
    animation:qb-virus-breathe 1.1s ease-in-out infinite alternate;
  }
  /* oil slick: glossy black card for the projector's "X OILED Y" moment */
  .qb-banner.oil{
    background:linear-gradient(170deg,#20242e 0%,#05060a 70%);
    color:#fff;text-shadow:0 2px 12px #000;
    border:4px solid #3a4152;
    box-shadow:0 20px 80px rgba(0,0,0,0.8), inset 0 -14px 40px rgba(120,140,180,0.18);
  }
  /* the projector-wide flashing strip while a nuke is armed and inbound */
  .qb-nuke-alert{
    position:fixed;left:0;right:0;top:0;z-index:60;pointer-events:none;
    font-family:'Archivo Black',sans-serif;font-size:34px;text-align:center;
    padding:16px 10px;color:#fff;letter-spacing:2px;
    background:#c40000;text-shadow:0 2px 8px #000;
    animation:qb-alert-blink 0.5s steps(2,end) infinite;
  }
  @keyframes qb-alert-blink{from{background:#c40000;opacity:1;}to{background:#5a0000;opacity:0.82;}}
  @keyframes qb-explode{
    0%{transform:scale(0.2) rotate(-6deg);opacity:0;}
    60%{transform:scale(1.12) rotate(2deg);opacity:1;}
    100%{transform:scale(1) rotate(0deg);}
  }
  @keyframes qb-banner-out{to{transform:scale(1.15);opacity:0;}}
  .qb-banner-particle{
    position:absolute;left:50%;top:50%;font-size:36px;
    animation:qb-particle 1.5s ease-out forwards;
  }
  @keyframes qb-particle{
    from{transform:translate(-50%,-50%) scale(1);opacity:1;}
    to{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.6);opacity:0;}
  }

  /* who still has their guess: chips under the game screen */
  .qb-guess-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:22px;}
  .qb-guess-chip{background:var(--panel-light);border-radius:12px;padding:8px 14px;font-weight:600;font-size:16px;}
  .qb-guess-chip.out{opacity:0.35;filter:grayscale(1);text-decoration:line-through;}

  /* host review of typed answers */
  .qb-review-row{display:flex;align-items:center;gap:10px;background:var(--panel-light);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
  .qb-review-row .txt{flex:1;font-weight:600;}
  .qb-review-row .ms{color:var(--text-dim);font-size:13px;}

  /* instruction strips on the projector */
  .qb-tip{
    background:rgba(244,185,66,0.08);border:1px dashed var(--gold);
    border-radius:14px;padding:12px 22px;font-size:18px;max-width:760px;margin:0 auto 24px;
  }

  /* party look for the projector and phones; admin keeps the plain workbench look */
  #qb-root[data-view="display"],#qb-root[data-view="player"],#qb-root[data-view="join"],#qb-root[data-view="home"]{
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(230,57,70,0.16), transparent 60%),
      radial-gradient(900px 500px at -10% 25%, rgba(46,134,222,0.14), transparent 60%),
      radial-gradient(900px 600px at 50% 115%, rgba(244,185,66,0.10), transparent 60%),
      var(--bg);
  }
  #qb-root[data-view="display"] .qb-title,#qb-root[data-view="player"] .qb-title,
  #qb-root[data-view="join"] .qb-title,#qb-root[data-view="home"] .qb-title{
    background:linear-gradient(92deg, var(--gold) 0%, #ff5561 55%, #4cc38a 110%);
    -webkit-background-clip:text;background-clip:text;
    color:var(--gold);-webkit-text-fill-color:transparent;
  }
  .qb-buzzer:not(:disabled){animation:qb-armed 1.6s ease-in-out infinite;}
  @keyframes qb-armed{
    0%,100%{box-shadow:0 10px 0 var(--buzz-dark), 0 16px 30px rgba(230,57,70,0.4);}
    50%{box-shadow:0 10px 0 var(--buzz-dark), 0 16px 64px rgba(230,57,70,0.85);}
  }
  #qb-root[data-view="display"] .qb-stage-pill,#qb-root[data-view="player"] .qb-stage-pill{
    background:linear-gradient(90deg,var(--gold),#ffca5c);color:#1b1f2e;
  }
  #qb-root[data-view="display"] .qb-display-scoreboard .qb-score-row:nth-child(1){border:1px solid var(--gold);}
  #qb-root[data-view="display"] .qb-display-scoreboard .qb-score-row:nth-child(2){border:1px solid #c0c8dd;}
  #qb-root[data-view="display"] .qb-display-scoreboard .qb-score-row:nth-child(3){border:1px solid #d09a5b;}
  #qb-root[data-view="player"] .qb-card,#qb-root[data-view="join"] .qb-card{
    border:1px solid #2c3350;
    box-shadow:0 8px 30px rgba(0,0,0,0.35), 0 0 60px rgba(46,134,222,0.10);
  }
  .qb-lobby-chip{border:1px solid #3a4160;}

  /* standings screen on the projector */
  .qb-standings{max-width:640px;margin:0 auto 34px;}
  .qb-standing-row{
    display:flex;align-items:center;gap:18px;
    background:var(--panel);border-radius:14px;padding:16px 24px;margin-bottom:10px;
    font-size:26px;font-weight:700;
  }
  .qb-standing-row.leader{background:var(--panel-light);border:2px solid var(--gold);}
  .qb-standing-row .rank{width:52px;text-align:center;}
  .qb-standing-row .who{flex:1;text-align:left;}
  .qb-standing-row .pts{font-family:'Archivo Black',sans-serif;color:var(--gold);font-size:30px;}

  /* answer countdown + reaction time inside the buzz flash */
  .qb-countdown{font-family:'Archivo Black',sans-serif;font-size:64px;margin-top:10px;}
  /* the 3-2-1 that opens a question: one number, as big as the stage allows */
  .qb-startcount{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:46vh;}
  .qb-startcount .num{
    font-family:'Archivo Black',sans-serif;font-size:min(34vw,300px);line-height:1;color:var(--gold);
    text-shadow:0 0 60px rgba(224,160,58,0.55);animation:qb-pop 1s ease-out;
  }
  .qb-startcount .go{font-size:min(18vw,150px);color:#4cc38a;text-shadow:0 0 60px rgba(76,195,138,0.6);}
  .qb-startcount .lbl{font-size:26px;opacity:0.85;letter-spacing:2px;text-transform:uppercase;}
  @keyframes qb-pop{0%{transform:scale(2.1);opacity:0;}45%{transform:scale(1);opacity:1;}100%{transform:scale(1);opacity:1;}}
  .qb-countdown.warn{color:#ff9f30;}
  .qb-countdown.crit{color:#ff3b30;animation:qb-crit-flash .4s steps(2,start) infinite;}
  /* the phone's own countdown: orange for the last 10s, flashing red for the last 3 */
  .qb-p-countdown{font-family:'Archivo Black',sans-serif;font-size:42px;line-height:1;}
  .qb-p-countdown.warn{color:#ff9f30;}
  .qb-p-countdown.crit{color:#ff3b30;animation:qb-crit-flash .4s steps(2,start) infinite;}
  @keyframes qb-crit-flash{50%{opacity:.15;}}
  .qb-reaction{font-size:24px;font-weight:700;margin-top:8px;opacity:0.95;}

  /* who's locked out this round */
  .qb-out-row{margin:-8px 0 26px;color:var(--text-dim);font-size:18px;}
  .qb-out-chip{background:var(--panel);padding:6px 14px;border-radius:18px;margin:0 5px;display:inline-block;color:var(--text);}

  /* layer-advance and time's-up banners reuse the exploding banner */
  .qb-banner.layer{background:var(--panel-light);color:var(--text);border:2px solid var(--gold);}
  .qb-banner.timesup{background:var(--buzz);color:#fff;}

  /* pulsing highlight for the podium button once the final round is revealed */
  @keyframes qb-glow{0%,100%{box-shadow:0 0 0 0 rgba(244,185,66,0.7);}50%{box-shadow:0 0 0 12px rgba(244,185,66,0);}}
  .qb-glow{animation:qb-glow 1.4s ease-in-out infinite;}

  /* podium finale */
  .qb-podium{display:flex;align-items:flex-end;justify-content:center;gap:22px;margin:26px auto 34px;min-height:360px;}
  .qb-podium .slot{width:210px;opacity:0;transform:translateY(50px);transition:opacity .6s ease, transform .6s ease;}
  .qb-podium .slot.shown{opacity:1;transform:none;}
  .qb-podium .avatar{font-size:66px;}
  .qb-podium .name{font-weight:800;font-size:26px;margin-top:4px;}
  .qb-podium .score{font-family:'Archivo Black',sans-serif;color:var(--gold);font-size:22px;margin-top:2px;}
  .qb-podium .block{
    border-radius:14px 14px 0 0;margin-top:14px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Archivo Black',sans-serif;font-size:44px;color:#1b1f2e;
  }
  .qb-podium .block.first{background:var(--gold);}
  .qb-podium .block.second{background:#c0c7d4;}
  .qb-podium .block.third{background:#c98d5a;}
  .qb-fastest{
    background:var(--panel);border:2px solid var(--gold);border-radius:16px;
    padding:16px 26px;font-size:24px;font-weight:700;max-width:640px;margin:0 auto 22px;
  }

  /* rules card on the lobby screen */
  .qb-rules{
    background:var(--panel);border-radius:20px;padding:24px 32px;margin:0 auto 30px;
    max-width:780px;text-align:left;
  }
  .qb-volume-nudge{
    background:linear-gradient(90deg,var(--gold),#ffca5c);color:#1b1f2e;
    font-weight:800;font-size:21px;border-radius:16px;padding:16px 26px;
    max-width:780px;margin:0 auto 22px;text-align:center;
    animation:qb-vol-pulse 1.7s ease-in-out infinite;
  }
  @keyframes qb-vol-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
  .qb-rules h3{margin:0 0 12px;color:var(--gold);font-family:'Archivo Black',sans-serif;letter-spacing:1px;font-size:20px;text-transform:uppercase;}
  .qb-rules ol{margin:0;padding-left:24px;font-size:19px;line-height:1.75;}

  /* wager round */
  .qb-wager-toggle{display:flex;gap:10px;align-items:flex-start;background:var(--panel-light);border-radius:10px;padding:12px 14px;margin-bottom:12px;cursor:pointer;font-size:14px;}
  .qb-wager-toggle input{margin-top:3px;transform:scale(1.3);}
  .qb-wager-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px;}
  .qb-wager-tag{background:var(--gold);color:#1b1f2e;font-size:11px;font-weight:800;padding:2px 7px;border-radius:6px;vertical-align:middle;}
  .qb-wager-badge{background:var(--gold);color:#1b1f2e;font-family:'Archivo Black',sans-serif;padding:8px 20px;border-radius:20px;font-size:18px;}
  .qb-wager-splash{text-align:center;margin-bottom:26px;}
  .qb-wager-title{font-family:'Archivo Black',sans-serif;font-size:40px;color:var(--gold);}
  .qb-pot{font-family:'Archivo Black',sans-serif;font-size:52px;margin:12px 0;}
  .qb-pot span{color:var(--gold);}
  .qb-wager-in{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;color:var(--text-dim);}
  .qb-pot-line{color:var(--gold);font-size:22px;font-weight:700;margin-top:12px;}
  .qb-pot-line.roll{color:#4cc38a;}
  .qb-pot-pill{display:inline-block;background:var(--gold);color:#1b1f2e;font-weight:800;padding:8px 20px;border-radius:20px;font-size:20px;margin-bottom:14px;}
  .qb-clue-box{background:var(--panel-light);border:2px dashed var(--gold);border-radius:16px;padding:20px 26px;font-size:24px;max-width:720px;margin:0 auto 22px;}
  /* a kitty nobody won rolls into the next wager — worth a bit of noise */
  .qb-carry-banner{
    display:inline-block;background:#4cc38a;color:#12141c;font-weight:800;
    padding:8px 22px;border-radius:20px;font-size:20px;margin:10px 0;
  }
  .qb-carry-note{
    background:rgba(76,195,138,0.14);border:1px dashed #4cc38a;color:#4cc38a;
    border-radius:12px;padding:8px 14px;font-size:14px;font-weight:700;
  }
  .qb-lobby-chip.out{opacity:0.5;}
  /* betting is done: the host can stop waiting and get on with it */
  .qb-buzzed-banner.ready{border-color:#4cc38a;}

  /* slider (slide-to-guess) rounds */
  .qb-slider-readout{
    font-family:'Archivo Black',sans-serif;font-size:30px;color:var(--gold);
    line-height:1.1;text-align:center;
  }
  .qb-slider{
    -webkit-appearance:none;appearance:none;width:100%;max-width:340px;height:14px;
    border-radius:8px;background:linear-gradient(90deg,#2e86de,var(--gold));outline:none;
  }
  .qb-slider::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:38px;height:38px;border-radius:50%;
    background:#fff;border:3px solid var(--gold);cursor:pointer;
  }
  .qb-slider::-moz-range-thumb{
    width:38px;height:38px;border-radius:50%;background:#fff;border:3px solid var(--gold);cursor:pointer;
  }
  .qb-slider-ends{
    display:flex;justify-content:space-between;width:100%;max-width:340px;
    font-size:12px;color:var(--text-dim);
  }

  /* multiple-choice question rounds */
  .qb-qtype-row{display:flex;gap:8px;margin-bottom:14px;}
  .qb-answer-chip{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;color:#fff;font-size:15px;flex-shrink:0;}
  /* the answer a player picked, shown on the reveal in that button's colour */
  .qb-pick-chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:3px 12px;color:#fff;font-size:15px;font-weight:700;white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis;}
  .qb-pick-chip .shape{font-size:11px;}
  /* ---------- powerups ---------- */
  .qb-pu-slots{display:flex;gap:10px;margin:0 0 12px;}
  .qb-pu-slot{width:52px;height:52px;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;border:2px dashed rgba(255,255,255,0.25);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);}
  .qb-pu-slot.filled{border-style:solid;border-color:var(--gold);background:rgba(244,185,66,0.12);cursor:pointer;}
  .qb-pu-menu{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
  .qb-pu-row{display:flex;align-items:center;gap:12px;text-align:left;border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,0.04);color:inherit;cursor:pointer;font:inherit;}
  .qb-pu-row:disabled{opacity:0.45;cursor:default;}
  .qb-pu-row .ic{font-size:26px;flex-shrink:0;}
  .qb-pu-row .tx{flex:1;line-height:1.35;}
  .qb-pu-row .add{font-size:22px;font-weight:800;color:var(--gold);flex-shrink:0;}
  /* the nuke on the sign-up screen: issued, not chosen, so it isn't a button */
  .qb-pu-row.granted{border-color:#ffd21f;background:rgba(196,0,0,0.18);cursor:default;margin-bottom:12px;}
  /* the one-per-game nuke button in the phone tray, set apart from the 3 slots */
  .qb-pu-nuke{
    display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin:6px 0 2px;
    border-radius:12px;padding:10px;font:inherit;font-weight:800;cursor:pointer;
    background:linear-gradient(160deg,#8f0000,#e00000);color:#fff;border:2px solid #ffd21f;
  }
  .qb-pu-nuke:disabled{opacity:0.4;cursor:default;filter:grayscale(0.6);}
  .qb-pu-nuke.spent{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);color:var(--muted);}
  /* in-game tray on the phone */
  .qb-pu-tray{display:flex;gap:10px;justify-content:center;align-items:center;margin:8px 0 4px;}
  .qb-pu-btn{width:54px;height:54px;border-radius:14px;border:2px solid var(--gold);background:rgba(244,185,66,0.14);font-size:26px;cursor:pointer;position:relative;transition:transform 0.15s;}
  .qb-pu-btn:active{transform:scale(0.92);}
  .qb-pu-btn:disabled{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);opacity:0.4;cursor:default;filter:grayscale(1);}
  .qb-pu-btn.played{animation:qb-pu-pulse 0.8s ease;box-shadow:0 0 22px rgba(244,185,66,0.8);}
  @keyframes qb-pu-pulse{0%{transform:scale(1);}40%{transform:scale(1.35);}100%{transform:scale(1);}}
  .qb-pu-note{font-size:13px;color:var(--muted);text-align:center;}
  /* target picker sheet */
  .qb-pu-target{display:flex;flex-direction:column;gap:8px;margin:8px 0;}
  .qb-pu-target button{border:1px solid rgba(255,255,255,0.2);border-radius:12px;padding:12px;background:rgba(255,255,255,0.06);color:inherit;font:inherit;font-weight:700;cursor:pointer;}
  /* 50/50: the two snipped answers wither away (phone) */
  .qb-answer-sq.cut{opacity:0.12;filter:grayscale(1);transform:scale(0.94);pointer-events:none;transition:opacity 0.6s,transform 0.6s;}
  /* held powerups shown beside names on projector boards */
  .qb-pu-held{font-size:0.75em;letter-spacing:2px;margin-left:6px;}
  /* oil slick: full-phone overlay, blocks every tap while it drips */
  .qb-oil-overlay{position:fixed;inset:0;z-index:2000;overflow:hidden;background:rgba(0,0,0,0.25);touch-action:none;}
  .qb-oil-drip{position:absolute;top:-18vh;width:26px;border-radius:0 0 14px 14px;background:linear-gradient(#05060a,#101318);opacity:0.94;animation:qb-oil-fall linear forwards;}
  @keyframes qb-oil-fall{to{transform:translateY(130vh);}}
  .qb-oil-msg{position:absolute;left:0;right:0;top:38%;text-align:center;font-family:'Archivo Black',sans-serif;font-size:26px;color:#fff;text-shadow:0 2px 12px #000;animation:qb-oil-wobble 0.5s ease infinite alternate;}
  @keyframes qb-oil-wobble{from{transform:rotate(-2deg);}to{transform:rotate(2deg);}}
  /* bomb aftermath line on the reveal. Deliberately NOT animated: the 900ms
     display poll rebuilds this DOM, and a restarting entrance animation sat
     permanently mid-fade — the explosion moment comes from showBanner instead */
  /* The reveal's powerup lines are what STAYS on the projector (the big banner
     is a 3s flash), so they get their own solid card — as bare text on the dark
     stage they read as see-through from across the room. */
  .qb-bomb-line{
    font-family:'Archivo Black',sans-serif;font-size:24px;color:#fff;
    margin:12px auto;max-width:900px;padding:14px 24px;border-radius:16px;
    background:linear-gradient(160deg,#d42a10 0%,#ff7a1a 100%);
    border:3px solid #ffd08a;
    box-shadow:0 10px 44px rgba(255,90,20,0.4);
    text-shadow:0 2px 0 #7a1200,0 4px 14px rgba(0,0,0,0.5);
  }
  /* a powerup that didn't fire is a damp squib, not a drama: muted card */
  .qb-bomb-line.dud{
    background:linear-gradient(160deg,#2a2f3d,#171a24);border-color:#3a4152;
    color:var(--muted);box-shadow:none;text-shadow:none;font-size:20px;
  }
  .qb-bomb-line.oil{
    background:linear-gradient(170deg,#20242e,#05060a);border-color:#46506a;
    color:#cfe0f5;box-shadow:0 10px 40px rgba(0,0,0,0.6);
  }
  .qb-bomb-line.sick{
    background:linear-gradient(160deg,#0b3a1c,#1f9c4a);border-color:#8dffab;
    color:#eafff0;box-shadow:0 10px 44px rgba(60,220,110,0.35);
    text-shadow:0 2px 0 #06301a,0 4px 14px rgba(0,0,0,0.5);
  }
  .qb-bomb-line.well{
    background:linear-gradient(160deg,#0d3f52,#22a0c4);border-color:#a8ecff;
    color:#eafcff;box-shadow:0 10px 44px rgba(60,190,230,0.35);
    text-shadow:0 2px 0 #06303f,0 4px 14px rgba(0,0,0,0.5);
  }
  /* inside the nuke block the lines are already on a card — don't nest cards */
  .qb-nuke-block .qb-bomb-line{
    background:none;border:0;box-shadow:none;padding:0;margin:6px auto;max-width:none;color:#fff;
  }
  /* the nuke's aftermath box on the reveal: alarm-striped border, every hit listed */
  .qb-nuke-block{
    border:4px dashed #ffd21f;border-radius:18px;padding:16px 22px;margin:14px auto;max-width:900px;
    background:linear-gradient(160deg,rgba(143,0,0,0.85),rgba(224,60,0,0.75));
    box-shadow:0 0 60px rgba(255,60,0,0.45);
  }
  .qb-nuke-block .maths{display:block;font-size:17px;color:#ffe28a;margin-top:8px;font-family:'Archivo Black',sans-serif;}
  .qb-bomb-line .maths{display:block;font-family:'Nunito',sans-serif;font-size:16px;color:#dfe3ec;margin-top:4px;}
  .qb-question-text{font-family:'Archivo Black',sans-serif;font-size:34px;margin-bottom:18px;}
  /* white backing so transparent PNGs (logos) stay visible on the dark stage */
  .qb-qimage{max-width:min(440px,80vw);max-height:300px;border-radius:14px;margin:0 auto 18px;display:block;background:#fff;}
  /* same clue on the phone, sized so the answer controls still fit under it */
  .qb-qimage.phone{max-width:100%;max-height:34vh;margin-bottom:0;}
  .qb-answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:900px;margin:0 auto 20px;}
  .qb-answer-sq{
    border-radius:14px;padding:24px 18px;font-size:23px;font-weight:800;color:#fff;
    text-align:left;display:flex;gap:12px;align-items:center;border:none;
    text-shadow:0 1px 3px rgba(0,0,0,0.35);
  }
  .qb-answer-sq .shape{font-size:24px;}
  .qb-answer-grid.phone{gap:10px;margin-bottom:6px;}
  .qb-answer-grid.phone .qb-answer-sq{padding:18px 12px;font-size:16px;cursor:pointer;}
  .qb-answer-grid.phone .qb-answer-sq:active{transform:scale(0.97);}
  .qb-answer-sq:disabled{opacity:0.45;cursor:not-allowed;}
  .qb-answer-sq.chosen{opacity:1;outline:4px solid #fff;}
  .qb-answer-sq.correct-reveal{outline:4px solid #fff;box-shadow:0 0 34px rgba(255,255,255,0.45);}
  .qb-answer-sq.dimmed{opacity:0.25;}
  .qb-answered-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;color:var(--text-dim);}
  .qb-qresults{max-width:640px;margin:0 auto 30px;}
  .qb-qresult-row{
    display:flex;align-items:center;gap:14px;background:var(--panel);
    border-radius:12px;padding:12px 18px;margin-bottom:8px;font-size:20px;font-weight:600;text-align:left;
  }
  .qb-qresult-row.right{border:1px solid var(--good);}
  .qb-qresult-row.wrong{border:1px solid var(--buzz);opacity:0.9;}
  .qb-qresult-row .delta{color:var(--gold);font-family:'Archivo Black',sans-serif;}
  .qb-qresult-row .t{margin-left:auto;font-family:'Archivo Black',sans-serif;color:var(--text-dim);font-size:16px;}
  .qb-back-link{align-self:flex-start;background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;margin-bottom:16px;padding:0;}
  .qb-back-link:hover{color:var(--text);}
  .qb-small{font-size:13px;color:var(--text-dim);}
  .qb-round-row{
    background:var(--panel-light);border-radius:12px;padding:14px 16px;margin-bottom:10px;
  }
  .qb-round-row .rr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .qb-round-row .rr-title{font-weight:700;}
  .qb-round-row .rr-meta{color:var(--text-dim);font-size:13px;margin-top:2px;}
  .qb-round-row .rr-actions{display:flex;gap:8px;margin-top:10px;align-items:center;}
  .qb-round-row .rr-actions .qb-btn{margin:0;width:auto;white-space:nowrap;}
  .qb-round-row.played{opacity:0.55;}
  .qb-round-row.now{border:1px solid var(--gold);}
  .qb-group{border:1px solid #2c3350;border-radius:14px;padding:12px;margin-bottom:14px;}
  .qb-group.played{opacity:0.6;}
  .qb-group-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
  /* the builder now opens inline inside the (narrow) library column, so it
     stacks its two columns and gets a visual seam from what's above it */
  .qb-builder{border-top:1px dashed #3a4160;margin-top:14px;padding-top:14px;}
  .qb-admin-card:not(.qb-full) .qb-form-cols{grid-template-columns:1fr;}
  .qb-score-adj:disabled{opacity:0.25;cursor:not-allowed;}
  .qb-stage-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .qb-stage-row input.qb-label-input{flex:3;}
  .qb-stage-row input.qb-points-input{flex:1;}
  .qb-stage-row .qb-input{margin-bottom:0;}
  .qb-now-playing{
    background:var(--panel-light);border-radius:12px;padding:16px;margin-bottom:14px;
  }
  .qb-now-playing .np-label{color:var(--text-dim);font-size:12px;text-transform:uppercase;letter-spacing:1px;}

<script>

  let joinDraftPu = [];        // the 3 powerups picked at sign-up (duplicates allowed)
  let codeDraft = '';

  let formOpen = false;      // false | 'add' | id-of-round-being-edited
  let formLabel = '';
  let formSong = '';
  let formArtist = '';
  let formStages = [];       // [{label, points}]

  let formGroupId = null;    // which round (group) the question being built belongs to; null for sudden deaths

  let formQuestion = '';     // question / text / sudden death rounds

  let formTextAnswer = '';   // text rounds: what the host will accept (case doesn't matter)
  let formSDAnswer = '';     // sudden death: the answer only the host sees

    '🦆','🦥','🦔','🐐','🦞','🦩','🦜','🐌','🦑','🦧','🐫','🦬','🥔','🥦','🧀','🌭','👽','🤖','🧙','🥸','🫠','🧌'];

  function defaultState(){

      quizTitle:null,       // host-set name for the night, shown on the projector
      status:'idle',        // idle | live | reveal
      roundId:null,
      roundLabel:null,
      songTitle:null,
      artist:null,
      stages:[],
      stageIndex:0,
      roundNumber:0, roundTotal:0,
      buzzEpoch:'', buzzersOpenedAt:0,
      showStandings:false, showPodium:false, showLobby:false,
      // rounds are groups of questions: roundLabel/roundNumber/roundTotal describe
      // "General Knowledge · Question 2 of 5"; group fields say "Round 1 of 3"
      groupNumber:0, groupTotal:0, showRoundIntro:null, endOfRound:null,
      lockedOut:[],
      // wager round: a clue for the next song shows on the projector first and
      // players may bet points into a kitty; whoever wins the question takes the
      // otherwise it's gone. Betting is optional, everyone keeps their buzzer.
      wagerActive:false, wagerPhase:'', anteEpoch:'', wagerClue:null, wagerImage:null, bets:{}, betWon:0, betsLost:0,
      // betMatched: the house matched a lone bet (see loneBetBonus) — only used
      // for the reveal-screen messaging, the points are already inside betWon
      betMatched:0,
      // an unwon kitty isn't burned: it rolls into the next wager round and keeps
      // growing until somebody finally wins it. Survives round loads (see
      // loadRoundToPlay) exactly like quizTitle does. kittyRolled is just the
      // "…and it rolls over!" note for the reveal screen.
      carryKitty:0, kittyRolled:0,
      // question rounds: multiple choice (qAnswers set), typed text (textMode)
      // or a slide-to-guess number (sliderMode). All three share qMode's
      // everyone-answers-on-the-clock flow.
      // a question round opens with a 3-2-1 on the projector so it isn't a jump
      // scare. The host's tab owns the clock: while countdown is true there's no
      // answerEpoch, so nothing is answerable and nothing is server-stamped yet.
      countdown:false,
      qMode:false, textMode:false, sliderMode:false, reviewing:false, question:null, qImage:null, qAnswers:[], qCorrect:0,
      textAnswer:null, qPoints:0, qBonus:0, qSeconds:0, answerEpoch:'', qResults:[], pendingAnswers:[],
      // slider rounds: players drag between min and max in steps of sliderStep.
      // Nearest guess wins; sliderBand (optional) lets everyone within ±band
      // score too; landing on the closest reachable notch is a bullseye.
      sliderMin:0, sliderMax:0, sliderStep:1, sliderAnswer:0, sliderBand:0, sliderUnit:'',
      // powerups: puEpoch keys this question's plays (minted at load so plays
      // work during the 3-2-1); puEvents is what happened, resolved at scoring
      // by the host for the reveal screens (bombs, oils, autos, doubles)
      puEpoch:'', puEvents:[],
      // sudden death: fastest finger on the buzzer, question shown on the projector.
      // sdEligible restricts the buzzers to the tied leaders when a tie exists
      suddenDeath:false, sdEligible:[],
      winnerId:null, winnerName:null, winnerAvatar:null, pointsAwarded:null
    };
  }

  // ---------- shared backend: Firebase Realtime Database via its plain REST API ----------
  // Players never need accounts. The host (owner of this file) does a one-time free
  // Firebase setup and pastes the database URL below. Each game lives under
  // /games/<game code> in the database; the code travels in the ?bucket= URL param
  // exactly like the old kvdb.io bucket id did.
  const FIREBASE_DB_URL = 'https://music-quiz-cac11-default-rtdb.europe-west1.firebasedatabase.app'; // host's own database, players never need this

  function backendConfigured(){
    return /^https:\/\//.test(FIREBASE_DB_URL);
  }
  function kvUrl(key){
    return FIREBASE_DB_URL.replace(/\/+$/, '') + '/games/' + encodeURIComponent(bucket) + '/' + encodeURIComponent(key) + '.json';
  }
  // Game codes are typed on phones, so: lowercase only, no confusable characters.
  function makeGameCode(){
    const alphabet = 'abcdefghjkmnpqrstuvwxyz23456789';
    const rand = new Uint32Array(8);
    crypto.getRandomValues(rand);
    let code = '';
    rand.forEach(n => { code += alphabet[n % alphabet.length]; });
    return code;
  }
  async function kvGet(key){
    if(!bucket || !backendConfigured()) return null;
    try{
      const res = await fetch(kvUrl(key), { cache:'no-store' });
      if(!res.ok) return null;
      const text = await res.text();
      // Firebase returns the literal JSON "null" for paths that don't exist yet
      return (text === '' || text === 'null') ? null : text;
    }catch(e){ console.error(e); return null; }
  }
  async function kvSet(key, value){
    if(!bucket || !backendConfigured()) return false;
    try{
      const res = await fetch(kvUrl(key), { method:'PUT', body:value });
      return res.ok;
    }catch(e){ console.error(e); return false; }
  }

  async function getPlayers(){
    const text = await kvGet('qb-players');
    try{ return text ? JSON.parse(text) : []; }catch(e){ return []; }
  }
  async function savePlayers(list){
    await kvSet('qb-players', JSON.stringify(list));
  }
  // ---------- one host mutation of qb-players at a time ----------
  // qb-players is a single document, and the host tab changes it from several
  // places (scoring, powerup folds, manual score edits). Each used to do its own
  // read → change → write, so two overlapping cycles silently clobbered each
  // other: the 1.2s poll's powerup fold and a question's scoring pass would each
  // save their own stale copy. That erased banked picks AND rolled `puClaimed`
  // back, so the phone was offered the same pick again next question — the
  // "everyone keeps getting bombs" bug. Serialising the WHOLE cycle fixes it:
  // read and write are one critical section, so the next caller always sees
  // whatever the previous one just wrote. (Sign-up writes come from a phone, so
  // they can't be covered here; they append and are unaffected by this bug.)
  let playersQueue = Promise.resolve();
  function withPlayers(mutate){
    const run = playersQueue.then(async () => {
      const players = await getPlayers();
      const out = await mutate(players);
      await savePlayers(players);
      return out;
    });
    playersQueue = run.then(() => {}, () => {});   // a thrown mutation must not wedge the queue
    return run;
  }
  async function getGameState(){
    const text = await kvGet('qb-state');
    try{ return text ? JSON.parse(text) : defaultState(); }catch(e){ return defaultState(); }
  }
  async function saveGameState(s){
    await kvSet('qb-state', JSON.stringify(s));
  }
  async function getRounds(){
    const text = await kvGet('qb-rounds');
    try{ return text ? JSON.parse(text) : []; }catch(e){ return []; }
  }
  async function saveRounds(list){
    await kvSet('qb-rounds', JSON.stringify(list));
  }

  // ---------- the library: rounds are named groups of questions ----------
  // storage stays under qb-rounds as [ ...groups, ...sudden deaths ]; anything
  // saved before groups existed is folded into a single "Round 1" on first read
  function upgradeLibrary(list){
    const groups = [], suddens = [], legacy = [];
    (list || []).forEach(item => {
      if(!item) return;
      if(item.type === 'group') groups.push(item);
      else if(item.type === 'sudden') suddens.push(item);
      else legacy.push(item);
    });
    let migrated = false;
    if(legacy.length){
      // old flat items carried titles like "Round 3" — inside a group those read
      // as "Round 1, Round 1", so give them proper question numbers instead
      legacy.forEach((q, i) => {
        if(!q.label || /^(round|q|question)\s*\d*$/i.test(String(q.label).trim())) q.label = 'Question ' + (i + 1);
      });
      // deterministic id: this migration must be saved back or the group would
      // get a different id on every read and nothing could ever target it
      groups.push({ id: 'g_migrated', type:'group', name:'Round ' + (groups.length + 1), questions: legacy });
      migrated = true;
    }
    groups.forEach(g => { if(!Array.isArray(g.questions)) g.questions = []; });
    return { groups, suddens, migrated };
  }
  async function getLibrary(){
    const lib = upgradeLibrary(await getRounds());
    if(lib.migrated){
      await saveLibrary(lib);   // one-time write so the migrated group's id is stable
      lib.migrated = false;
    }
    return lib;
  }
  async function saveLibrary(lib){
    await saveRounds([...lib.groups, ...lib.suddens]);
  }

  function makeId(prefix){
    return (prefix||'p') + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
  }

  async function sha256Hex(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ---------- race-free buzzing ----------
  // Every buzz writes to its own key under the current "buzz epoch" (a fresh id
  // minted whenever buzzers open), stamped with Firebase's *server* clock via the
  // {'.sv':'timestamp'} placeholder. Nobody ever overwrites anyone: every view
  // derives the winner as the entry with the earliest server timestamp.
  const ANSWER_SECONDS = 15;    // to answer after buzzing on a song round
  const QUESTION_SECONDS = 15;  // to pick an answer on a multiple-choice question
  const TEXT_SECONDS = 25;      // to type an answer on a text round
  const MAX_BET = 10;           // wager cap; bets may push a score negative
  const DEFAULT_POINTS = 3;     // a normal question
  const SLIDER_POINTS = 6;      // sliders are hardest to get exactly right
  const ANSWER_COLORS = ['#e63946', '#2e86de', '#f4b942', '#4cc38a'];
  const ANSWER_SHAPES = ['▲', '◆', '●', '■'];
  function buzzUrl(epoch, playerId){
    return FIREBASE_DB_URL.replace(/\/+$/, '') + '/games/' + encodeURIComponent(bucket)
      + '/qb-buzz-' + encodeURIComponent(epoch)
      + (playerId ? '/' + encodeURIComponent(playerId) : '') + '.json';
  }
  async function fetchBuzzes(epoch){
    if(!bucket || !epoch) return {};
    try{
      const res = await fetch(buzzUrl(epoch), { cache:'no-store' });
      if(!res.ok) return {};
      return (await res.json()) || {};
    }catch(e){ return {}; }
  }
  function earliestBuzz(buzzes, lockedOut){
    const locked = lockedOut || [];
    const list = Object.values(buzzes || {}).filter(b => b && b.id && !locked.includes(b.id));
    list.sort((a, b) => ((a.ts || 0) - (b.ts || 0)) || (a.id < b.id ? -1 : 1));
    return list[0] || null;
  }
  function clearBuzzes(epoch){
    if(!bucket || !epoch) return;
    try{ fetch(buzzUrl(epoch), { method:'DELETE' }); }catch(e){}
  }
  // stamp the moment buzzers opened with the server clock, so reaction times
  // compare server-time to server-time and phone clock drift never matters
  async function stampBuzzersOpened(){
    if(!bucket) return;
    try{
      await fetch(FIREBASE_DB_URL.replace(/\/+$/, '') + '/games/' + encodeURIComponent(bucket) + '/qb-state/buzzersOpenedAt.json',
        { method:'PUT', body:'{".sv":"timestamp"}' });
    }catch(e){}
  }

  // ---------- wager bets ----------
  // Like buzzing, each player writes only their own bet key, so simultaneous
  // bets never clobber each other. Scores aren't touched until the host closes
  // betting (single writer), which avoids racing on the shared players array.
  function anteUrl(epoch, playerId){
    return FIREBASE_DB_URL.replace(/\/+$/, '') + '/games/' + encodeURIComponent(bucket)
      + '/qb-ante-' + encodeURIComponent(epoch)
      + (playerId ? '/' + encodeURIComponent(playerId) : '') + '.json';
  }
  async function fetchAntes(epoch){
    if(!bucket || !epoch) return {};
    try{
      const res = await fetch(anteUrl(epoch), { cache:'no-store' });
      if(!res.ok) return {};
      return (await res.json()) || {};
    }catch(e){ return {}; }
  }
  function sumAntes(antes){
    return Object.values(antes || {}).reduce((t, a) => t + (a && a.amount ? a.amount : 0), 0);
  }
  // a player has "decided" once they've either staked something or tapped "no bet";
  // the host waits on this, not on the clock, before closing the kitty
  function antesDecided(antes){
    return Object.values(antes || {}).filter(a => a && a.id && (a.amount > 0 || a.pass)).length;
  }
  // What's actually on the table: this round's stakes plus anything that rolled
  // over from wager rounds nobody won.
  function kittyTotal(s){
    return Object.values(s.bets || {}).reduce((t, n) => t + n, 0) + (s.carryKitty || 0);
  }
  // Betting alone used to be pointless: the only stake in the pot was your own,
  // so "winning the kitty" just handed your points straight back. Now the house
  // matches a lone bet — if exactly one player staked and THEY win the question,
  // they're paid their stake a second time on top of the pot. Lose and it still
  // rolls over as usual, so a brave solo bet is a real double-or-nothing.
  function loneBetBonus(s, winnerId){
    const ids = Object.keys(s.bets || {});
    return (ids.length === 1 && ids[0] === winnerId) ? (s.bets[ids[0]] || 0) : 0;
  }
  // You can only win the kitty if you put something in it. Without this a player
  // who passed could edge out a bettor on speed/distance and walk off with the
  // stakes they never risked — which makes betting a mug's game. Non-bettors
  // still win the question's normal points, they just can't touch the pot.
  function stakedIn(s, id){
    return ((s.bets || {})[id] || 0) > 0;
  }

  // ---------- powerups ----------
  // Players carry up to 3 powerups in a bank, chosen at sign-up, and earn a new
  // pick every PU_EVERY points climbed. Question rounds only (MC / typed / slider).
  // One play per player per question; a play is an own-key write under the
  // question's puEpoch, so it's race-free like buzzes/answers/bets, and the
  // host tab resolves everything at scoring time (single writer).
  const POWERUPS = {
    auto:   { icon:'✅', name:'Auto-Correct', target:'self',
              blurb:'Score this question’s base points even if you get it wrong. Speed bonuses still have to be earned.' },
    bomb:   { icon:'💣', name:'Bomb', target:'player',
              blurb:'Pick a victim: they lose 10 points at the reveal — but only if YOU answer this question correctly. Get it wrong and the bomb fizzles, powerup wasted.' },
    fifty:  { icon:'✂️', name:'50/50', target:'self',
              blurb:'Snips two wrong answers off a multiple-choice question, leaving you a coin flip. Multiple choice only.' },
    double: { icon:'🎲', name:'Double or Nothing', target:'self',
              blurb:'Whatever you win on this question is doubled. Score nothing and the powerup burned for nothing.' },
    oil:    { icon:'🛢️', name:'Oil Slick', target:'player',
              blurb:'Rains oil down a rival’s phone for 5 seconds — screen blocked, panic guaranteed. Time it cruelly.' },
    carpet: { icon:'🧨', name:'Carpet Bomb', target:'all',
              blurb:'−5 points off EVERY rival at once — no aiming, no escape. Only drops if YOU answer this question correctly.' },
    virus:  { icon:'🦠', name:'Virus', target:'player',
              blurb:'Infect a rival: −3 now and −3 every question after, until they answer one correctly and cure themselves. Only infects if YOU answer this question correctly.' },
    // Not choosable and never re-earned: everyone is issued exactly one nuke for
    // the whole night, held outside the 3 slots. When it was a normal pick
    // everybody kept taking it and the night turned into a warzone; as a
    // one-per-game last resort it stays a real moment.
    nuke:   { icon:'☢️', name:'Tactical Nuke', target:'all', granted:true,
              blurb:'−20 points to EVERY other player and −10 to yourself — and nobody wins anything on this question. Only detonates if YOU answer correctly. You get ONE for the whole quiz.' }
  };
  // the powerups a player can actually choose (the nuke is issued, not picked)
  const PU_CHOOSABLE = Object.entries(POWERUPS).filter(([, d]) => !d.granted);
  const PU_MAX_SLOTS = 3;
  const PU_EVERY = 25;        // a fresh powerup pick every 25 points climbed
  const BOMB_DAMAGE = 10;
  const NUKE_DAMAGE = 20;     // what every other player loses when a nuke detonates
  const NUKE_SELF_COST = 10;  // what the nuker pays for pressing the button
  const CARPET_DAMAGE = 5;    // every rival, all at once (the bomber flies above it)
  const VIRUS_DAMAGE = 3;     // on infection, then again every question until cured
  // the nuke lives outside the 3 slots: one per player per game, never re-earned
  function hasNuke(p){ return !!(p && p.nuke); }
  function puList(p){ return (p && Array.isArray(p.pu)) ? p.pu.filter(t => POWERUPS[t] && !POWERUPS[t].granted) : []; }
  // picks earned but not yet taken; a claim waits until a slot is free
  function puPending(p){
    return Math.max(0, (p && p.puOwed) || 0);
  }
  // Picks are earned by CLIMBING, not by reaching a high-water mark: every
  // PU_EVERY points gained above your low point banks one. Sinking lowers the
  // bar with you, so a bombed player who fights back up 25 earns another —
  // which is the whole point of a catch-up mechanic. (It used to track the
  // highest rung ever reached, so being knocked down meant re-climbing to your
  // old peak before earning anything, punishing exactly the player it should
  // have been helping.) Host tab only — it owns qb-players.
  function refreshPuEarned(players){
    players.forEach(p => {
      const score = p.score || 0;
      // First sight under this spacing — a fresh player, someone who joined
      // before powerups existed, or a changed PU_EVERY. Carry over whatever
      // they were genuinely owed and start measuring the climb from here, so
      // points already scored can't retroactively mint a backlog of picks.
      if(p.puLadder !== PU_EVERY){
        p.puOwed = Math.max(0, (p.puOwed || 0) || ((p.puHi || 0) - (p.puClaimed || 0)));
        p.puFloor = score;
        p.puLadder = PU_EVERY;
        delete p.puHi; delete p.puClaimed;   // superseded by puOwed/puFloor
      }
      if(typeof p.puFloor !== 'number' || !isFinite(p.puFloor)) p.puFloor = score;
      if(score < p.puFloor) p.puFloor = score;      // knocked back: the bar follows you down
      while(score >= p.puFloor + PU_EVERY){         // climbed a rung: bank a pick
        p.puOwed = (p.puOwed || 0) + 1;
        p.puFloor += PU_EVERY;
      }
      if(p.nuke === undefined) p.nuke = true;       // everyone is issued exactly one
    });
  }
  function powerUrl(epoch, playerId){
    return FIREBASE_DB_URL.replace(/\/+$/, '') + '/games/' + encodeURIComponent(bucket)
      + '/qb-power-' + encodeURIComponent(epoch)
      + (playerId ? '/' + encodeURIComponent(playerId) : '') + '.json';
  }
  async function fetchPowers(epoch){
    if(!bucket || !epoch) return {};
    try{
      const res = await fetch(powerUrl(epoch), { cache:'no-store' });
      if(!res.ok) return {};
      return (await res.json()) || {};
    }catch(e){ return {}; }
  }
  // a threshold claim: the phone writes only its own key here; the host folds
  // it into qb-players on its next poll and deletes the key (single writer)
  function puPickUrl(playerId){
    return FIREBASE_DB_URL.replace(/\/+$/, '') + '/games/' + encodeURIComponent(bucket)
      + '/qb-pupick' + (playerId ? '/' + encodeURIComponent(playerId) : '') + '.json';
  }

  // ---------- slider rounds ----------
  // The host gives a min, a max and the true answer; players drag to a guess.
  // The step is derived from the range so the slider always has roughly 50-200
  // notches: a 2m-10m range slides in 100,000s, while 1990-2025 slides in 1s.
  // Snapped to a 1/2/5 x 10^n ladder so the numbers under the thumb stay round.
  function niceStep(range){
    if(!(range > 0)) return 1;
    const raw = range / 100;
    if(raw <= 1) return 1;   // small ranges (years, ages) stay whole numbers
    const mag = Math.pow(10, Math.floor(Math.log10(raw)));
    const norm = raw / mag;
    return (norm <= 1 ? 1 : norm <= 2 ? 2 : norm <= 5 ? 5 : 10) * mag;
  }
  function sliderStepFor(r){
    const step = Number(r.sliderStep) || 0;
    return step > 0 ? step : niceStep((Number(r.sliderMax) || 0) - (Number(r.sliderMin) || 0));
  }
  // the closest the slider can physically get to the answer is half a step, so
  // anyone that close counts as a bullseye — with a step of 1 this is an exact hit
  function isBullseye(dist, step){
    return dist <= (step || 1) / 2;
  }
  // Thousands separators help on "160,000,000" and ruin "2,007", so they're
  // decided per question from the top of its range: anything under 10k is the
  // sort of number (a year, a percentage, an age) you write bare.
  function groupNums(sliderMax){
    return Math.abs(Number(sliderMax) || 0) >= 10000;
  }
  function fmtNum(n, group){
    const v = Number(n) || 0;
    return group === false ? String(v) : v.toLocaleString('en-GB');
  }
  function fmtGuess(n, unit, group){
    return fmtNum(n, group) + (unit ? ' ' + unit : '');
  }
  // ---------- multiple-choice answers ----------
  // every player answers (no lockout), each writing only their own key with a
  // server timestamp, so simultaneous answers never clash and times are exact
  function answerUrl(epoch, playerId){
    return FIREBASE_DB_URL.replace(/\/+$/, '') + '/games/' + encodeURIComponent(bucket)
      + '/qb-answer-' + encodeURIComponent(epoch)
      + (playerId ? '/' + encodeURIComponent(playerId) : '') + '.json';
  }
  async function fetchAnswers(epoch){
    if(!bucket || !epoch) return {};
    try{
      const res = await fetch(answerUrl(epoch), { cache:'no-store' });
      if(!res.ok) return {};
      return (await res.json()) || {};
    }catch(e){ return {}; }
  }

  // ---------- sound effects: synthesized with Web Audio, so no audio files needed ----------
  let audioCtx = null;
  let soundOn = true;
  try{ soundOn = localStorage.getItem('qb-sound') !== 'off'; }catch(e){}

  function ensureAudio(){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    if(!audioCtx) audioCtx = new AC();
    if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    return audioCtx;
  }

  // Best-effort iPhone silent-switch workaround. Web Audio on iOS plays through
  // the "ringer" channel, which the physical mute switch silences. Playing a
  // looping (silent) <audio> element flips the page's audio session to the
  // "media" channel on many iOS versions, so buzzers survive silent mode. It is
  // NOT guaranteed on every iOS build, so we still tell people to unmute.
  let silentAudioEl = null;
  function makeSilentWavUrl(){
    // 0.15s of 8-bit mono silence (unsigned midpoint 128) — built at runtime so
    // there's no giant base64 blob in the source
    const rate = 8000, samples = Math.floor(rate * 0.15), dataLen = samples;
    const buf = new ArrayBuffer(44 + dataLen), dv = new DataView(buf);
    const wr = (off, s) => { for(let i = 0; i < s.length; i++) dv.setUint8(off + i, s.charCodeAt(i)); };
    wr(0, 'RIFF'); dv.setUint32(4, 36 + dataLen, true); wr(8, 'WAVE'); wr(12, 'fmt ');
    dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
    dv.setUint32(24, rate, true); dv.setUint32(28, rate, true); dv.setUint16(32, 1, true);
    dv.setUint16(34, 8, true); wr(36, 'data'); dv.setUint32(40, dataLen, true);
    for(let i = 0; i < dataLen; i++) dv.setUint8(44 + i, 128);
    let bin = ''; const bytes = new Uint8Array(buf);
    for(let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return 'data:audio/wav;base64,' + btoa(bin);
  }
  function primeMediaChannel(){
    try{
      if(!silentAudioEl){
        silentAudioEl = new Audio(makeSilentWavUrl());
        silentAudioEl.loop = true;
        silentAudioEl.volume = 0.01;
        silentAudioEl.setAttribute('playsinline', '');
      }
      if(silentAudioEl.paused) silentAudioEl.play().catch(()=>{});
    }catch(e){}
  }

  // browsers block sound until the page has been interacted with once, so any
  // first tap anywhere (joining, buzzing, an admin click) unlocks the audio and
  // primes the media channel for iPhones
  function unlockAudio(){ ensureAudio(); primeMediaChannel(); }
  document.addEventListener('pointerdown', unlockAudio, true);
  // cast tabs and backgrounded phones auto-suspend the context; wake it back up
  // whenever the page becomes visible again so the projector never goes quiet
  document.addEventListener('visibilitychange', () => { if(!document.hidden){ ensureAudio(); primeMediaChannel(); } });

  function tone(freq, at, dur, type, vol, endFreq){
    const t0 = audioCtx.currentTime + at;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if(endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, t0 + dur);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  }
  const SOUNDS = {
    // the classic game-show lockout buzzer: harsh, low, unmistakable
    buzz(){ tone(240, 0, 0.45, 'sawtooth', 0.4, 190); tone(120, 0, 0.45, 'square', 0.3, 95); },
    correct(){ [523, 659, 784, 1047].forEach((f, i) => tone(f, i * 0.09, 0.25, 'triangle', 0.3)); },
    wrong(){ tone(233, 0, 0.22, 'square', 0.25, 200); tone(196, 0.2, 0.45, 'square', 0.25, 147); },
    reveal(){ tone(392, 0, 0.2, 'triangle', 0.25); tone(330, 0.18, 0.35, 'triangle', 0.25); },
    join(){ tone(880, 0, 0.09, 'sine', 0.2); tone(1175, 0.08, 0.14, 'sine', 0.2); },
    layer(){ tone(587, 0, 0.1, 'triangle', 0.22); tone(659, 0.1, 0.16, 'triangle', 0.22); },
    timesup(){ for(let i = 0; i < 3; i++){ tone(520, i * 0.3, 0.24, 'square', 0.4, 480); tone(260, i * 0.3, 0.24, 'sawtooth', 0.35, 240); } },
    // powerups: an arming chime, a gloopy splat for the oil slick victim, and
    // a proper detonation for the projector when a bomb goes off at the reveal
    arm(){ tone(660, 0, 0.1, 'triangle', 0.3); tone(990, 0.1, 0.18, 'triangle', 0.3, 1320); },
    splat(){ [300, 220, 160, 120].forEach((f, i) => tone(f, i * 0.09, 0.13, 'sawtooth', 0.4, f * 0.55)); },
    boom(){ tone(120, 0, 0.8, 'sawtooth', 0.5, 35); tone(60, 0, 0.9, 'square', 0.45, 28); tone(2400, 0, 0.12, 'square', 0.18, 300); },
    // carpet bomb: a stick of bombs whistling down, then a walking barrage
    carpet(){
      for(let i = 0; i < 4; i++){
        tone(1300, i * 0.16, 0.15, 'sine', 0.16, 320);              // the whistle
        tone(95, 0.42 + i * 0.2, 0.42, 'sawtooth', 0.42, 32);       // and the hit
        tone(160, 0.42 + i * 0.2, 0.26, 'square', 0.24, 44);
      }
    },
    // virus: a queasy descending warble, sickly rather than explosive
    virus(){
      tone(430, 0, 0.5, 'sawtooth', 0.3, 175);
      tone(205, 0.1, 0.5, 'square', 0.2, 88);
      for(let i = 0; i < 5; i++) tone(330 - i * 32, 0.48 + i * 0.09, 0.13, 'triangle', 0.2, 265 - i * 32);
    },
    // each ongoing infection tick: a short sickly blip
    tick(){ tone(300, 0, 0.18, 'sawtooth', 0.28, 150); tone(150, 0.05, 0.2, 'square', 0.2, 78); },
    // cured: a bright rising sparkle, the opposite of the infection warble
    cured(){ [523, 659, 880, 1319].forEach((f, i) => tone(f, i * 0.07, 0.3, 'sine', 0.28)); },
    // air-raid siren for the tactical nuke: three rising-falling sweeps over a rumble
    siren(){
      for(let i = 0; i < 3; i++){
        tone(480, i * 1.0, 0.5, 'sawtooth', 0.4, 1150);
        tone(1150, i * 1.0 + 0.5, 0.5, 'sawtooth', 0.4, 480);
      }
      tone(55, 0, 3.0, 'square', 0.18, 45);
    },
    // the projector countdown's once-a-second ticks: soft blip, then urgent,
    // then critical — played by the display (the room's speaker), never phones,
    // so every ear hears one clock and per-phone drift doesn't matter
    tick(){ tone(1100, 0, 0.03, 'sine', 0.12); },
    tickWarn(){ tone(1400, 0, 0.05, 'square', 0.16); },
    tickCrit(){ tone(1760, 0, 0.07, 'square', 0.22); tone(880, 0, 0.07, 'square', 0.15); },
    // the 3-2-1 that opens a question: three fat pips, then a fanfare on GO, so
    // the question landing never feels like a jump scare
    pip(){ tone(587, 0, 0.16, 'square', 0.34); tone(294, 0, 0.16, 'triangle', 0.22); },
    go(){ [523, 659, 784, 1047].forEach((f, i) => tone(f, i * 0.05, 0.34, 'square', 0.3)); tone(196, 0, 0.42, 'sawtooth', 0.24, 392); }
  };

  // every player gets their own comedy buzzer, assigned at random when they join
  const BUZZ_SOUNDS = [
    { label:'Classic buzzer',   fn(){ tone(240,0,0.45,'sawtooth',0.4,190); tone(120,0,0.45,'square',0.3,95); } },
    { label:'Angry duck',       fn(){ tone(380,0,0.12,'sawtooth',0.45,240); tone(360,0.16,0.16,'sawtooth',0.45,210); } },
    { label:'Foghorn',          fn(){ tone(105,0,1.1,'sawtooth',0.45,92); tone(52,0,1.1,'square',0.3,46); } },
    { label:'Laser battle',     fn(){ for(let i=0;i<3;i++) tone(1800,i*0.13,0.11,'square',0.3,220); } },
    { label:'Boing',            fn(){ tone(420,0,0.3,'sawtooth',0.4,150); tone(150,0.28,0.2,'sawtooth',0.3,260); } },
    { label:'Police siren',     fn(){ tone(520,0,0.4,'sine',0.45,960); tone(960,0.4,0.4,'sine',0.45,520); } },
    { label:'Doorbell',         fn(){ tone(659,0,0.35,'sine',0.4); tone(523,0.3,0.5,'sine',0.4); } },
    { label:'8-bit power-up',   fn(){ [262,330,392,523,659,784].forEach((f,i)=>tone(f,i*0.07,0.07,'square',0.3)); } },
    { label:'Sad trombone',     fn(){ [233,220,208].forEach((f,i)=>tone(f,i*0.28,0.25,'sawtooth',0.35,f*0.97)); tone(196,0.84,0.7,'sawtooth',0.35,180); } },
    { label:'UFO landing',      fn(){ tone(500,0,0.25,'sine',0.45,900); tone(900,0.25,0.25,'sine',0.45,500); tone(500,0.5,0.25,'sine',0.45,900); } },
    { label:'Startled chicken', fn(){ [0,0.14,0.28].forEach(t=>tone(760,t,0.09,'square',0.3,520)); tone(980,0.5,0.4,'square',0.35,540); } },
    { label:'Kazoo solo',       fn(){ [330,360,330,300,330].forEach((f,i)=>tone(f,i*0.11,0.12,'square',0.3,f+20)); } },
    { label:'Whoopee cushion',  fn(){ let t=0; for(let i=0;i<7;i++){ const f=95-i*6; tone(f,t,0.1,'sawtooth',0.45,f*0.6); t+=0.075; } } },
    { label:'Car alarm',        fn(){ for(let i=0;i<4;i++) tone(i%2?620:470,i*0.15,0.13,'square',0.35); } },
    { label:'Dial-up modem',    fn(){ tone(1200,0,0.1,'square',0.25); tone(2000,0.12,0.1,'square',0.25); tone(900,0.24,0.12,'sawtooth',0.3,1600); tone(400,0.38,0.25,'square',0.25,1400); } },
    { label:'Opera diva',       fn(){ tone(440,0,0.18,'triangle',0.4,520); tone(520,0.18,0.2,'triangle',0.45,660); tone(660,0.38,0.5,'triangle',0.5,880); } }
  ];
  function soundIndexFor(p){
    if(p && Number.isInteger(p.buzzSound)) return p.buzzSound;
    // older players joined before buzzer sounds existed: hash their id so
    // everyone still gets a stable, personal sound
    const id = p && p.id ? p.id : '';
    let h = 0;
    for(const c of id) h = (h + c.charCodeAt(0)) % 9973;
    return h;
  }
  function playFx(fn){
    if(!soundOn) return;
    const ctx = ensureAudio();
    if(!ctx) return;
    // on the very first tap the context is still resuming, so queue the sound
    // for the moment it's ready instead of silently dropping it (iOS especially)
    if(ctx.state === 'running'){
      try{ fn(); }catch(e){}
    } else if(ctx.resume){
      ctx.resume().then(() => { try{ fn(); }catch(e){} }).catch(()=>{});
    }
  }
  function playBuzzFor(x){
    const raw = x && Number.isInteger(x.sound) ? x.sound : soundIndexFor(x);
    const i = ((raw % BUZZ_SOUNDS.length) + BUZZ_SOUNDS.length) % BUZZ_SOUNDS.length;
    playFx(BUZZ_SOUNDS[i].fn);
  }

  // ~11 seconds of synthesized hype for the podium reveal; the stabs and the
  // final chord line up with 3rd/2nd/1st appearing on screen
  function playPodiumSong(){
    playFx(() => {
      const bass = [110, 110, 82.4, 98];
      for(let bar = 0; bar < 10; bar++){
        const f = bass[bar % 4];
        for(let e = 0; e < 4; e++) tone(f, bar + e * 0.25, 0.2, 'sawtooth', 0.2);
      }
      const arp = [220, 262, 330, 440];
      for(let i = 0; i < 40; i++) tone(arp[i % 4] * (i % 8 > 3 ? 2 : 1), i * 0.25, 0.12, 'triangle', 0.16);
      for(let i = 0; i < 20; i++) tone(6000, i * 0.5 + 0.25, 0.03, 'square', 0.05);
      [2.5, 5].forEach(t => [440, 523, 659].forEach(f => tone(f, t, 0.5, 'sawtooth', 0.16)));
      tone(200, 7.6, 1.0, 'sawtooth', 0.25, 1400);
      [440, 554, 659, 880].forEach(f => { tone(f, 8.6, 1.8, 'sawtooth', 0.2); tone(f / 2, 8.6, 1.8, 'triangle', 0.2); });
    });
  }
  function playSound(name){
    if(SOUNDS[name]) playFx(SOUNDS[name]);
  }
  function toggleSound(){
    const wasBlocked = soundOn && (!audioCtx || audioCtx.state !== 'running');
    if(!soundOn || wasBlocked){
      soundOn = true;
      ensureAudio();
      // confirmation blip, delayed a tick so the context has time to resume
      setTimeout(() => playSound('join'), 60);
    } else {
      soundOn = false;
    }
    try{ localStorage.setItem('qb-sound', soundOn ? 'on' : 'off'); }catch(e){}
    render();
  }
  function soundButtonLabel(){
    if(!soundOn) return '&#128263; Sound off';
    if(!audioCtx || audioCtx.state !== 'running') return '&#128263; Tap to turn on sound';
    return '&#128266; Sound on';
  }

  // ---------- device identity: lets a refreshed phone rejoin as the same player ----------
  // Keyed by bucket so a fresh game code next quiz night starts clean.
  // localStorage can throw in some private-browsing modes; failures just mean no resume.
  const IDENTITY_PREFIX = 'qb-identity:';
  function loadStoredIdentity(){
    if(!bucket) return null;
    try{
      const raw = localStorage.getItem(IDENTITY_PREFIX + bucket);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }
  function saveStoredIdentity(id, name, avatar){
    if(!bucket) return;
    try{ localStorage.setItem(IDENTITY_PREFIX + bucket, JSON.stringify({ id, name, avatar })); }catch(e){}
  }
  function clearStoredIdentity(){
    if(!bucket) return;
    try{ localStorage.removeItem(IDENTITY_PREFIX + bucket); }catch(e){}
  }
  async function resumeStoredPlayer(){
    const stored = loadStoredIdentity();
    if(!stored || !stored.id) return null;
    const players = await getPlayers();
    const me = players.find(p => p.id === stored.id);
    if(!me){
      // an empty list may just be a failed fetch, so only forget the identity
      // when the list came back with players and ours genuinely isn't among them
      if(players.length) clearStoredIdentity();
      return null;
    }
    return me;
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function sortedPlayers(players){ return [...players].sort((a,b)=>b.score-a.score); }
  // two or more players level at the top of the board; empty array otherwise
  function tiedLeaders(players){
    const sorted = sortedPlayers(players);
    if(sorted.length < 2) return [];
    const tied = sorted.filter(p => p.score === sorted[0].score);
    return tied.length >= 2 ? tied : [];
  }

  // the powerups a player is holding, shown beside their name on every board
  function puHeldHTML(p){
    // an unspent nuke shows too, so the room can see who's still armed
    const icons = puList(p).map(t => POWERUPS[t].icon).concat(hasNuke(p) ? [POWERUPS.nuke.icon] : []);
    // a standing infection rides alongside, so the room can see who's bleeding
    const sick = p && p.virus ? `<span class="qb-pu-held" style="color:#7ee08a;" title="Infected">🦠</span>` : '';
    return (icons.length ? `<span class="qb-pu-held">${icons.join('')}</span>` : '') + sick;
  }
  function scoreboardHTML(players, big){
    const sorted = sortedPlayers(players);
    if(sorted.length === 0) return `<p class="qb-small">No players have joined yet.</p>`;
    return `<div class="${big ? 'qb-display-scoreboard' : ''}">` + sorted.map((p,i)=>`
      <div class="qb-score-row">
        <span class="name"><span class="qb-rank">${i+1}.</span> ${p.avatar} ${esc(p.name)}${puHeldHTML(p)}</span>
        <span class="pts">${p.score}</span>
      </div>
    `).join('') + `</div>`;
  }

  async function render(){
    root.setAttribute('data-view', view);   // lets CSS give the party screens their own look
    if(view === 'home') return renderHome();
    if(view === 'join') return renderJoin();
    if(view === 'player') return renderPlayer();
    if(view === 'display') return renderDisplay();

  }

  function backLink(target, label){
    return `<button class="qb-back-link" data-action="goto" data-target="${target}">${label}</button>`;
  }

  function noSessionHTML(targetView){
    return `
      <div class="qb-card">
        <h2 class="qb-title" style="font-size:20px;margin-top:0;">Missing game code</h2>
        <p class="qb-small">This link doesn't have a game code in it. Ask your host to resend the link, or enter the code they gave you.</p>

  // ---------- HOME ----------

  // ---------- JOIN ----------
  let joinPlayersCache = [];
  async function renderJoin(useCache){

      <div class="qb-card">

        <label class="qb-label">Your name</label>

            ? `<button class="qb-pu-slot filled" data-action="join-remove-pu" data-idx="${i}" title="Tap to put it back">${POWERUPS[joinDraftPu[i]].icon}</button>`

    players.push({ id, name, avatar: joinDraftAvatar, score: 0, buzzSound: sound,

  function showVirusHit(headline, note, cured){

  // 50/50 keeps the correct answer plus ONE wrong one. The kept wrong answer is
  // hashed from the epoch + player id so every repaint (and a phone refresh)
  // cuts the same two — no re-rolling the snip by reloading.
  function fiftyCuts(state, playerId){
    const wrongs = (state.qAnswers || []).map((_, i) => i).filter(i => i !== state.qCorrect);
    if(wrongs.length < 2) return [];
    let h = 0;
    const seed = (state.puEpoch || '') + playerId;
    for(const c of seed) h = (h * 31 + c.charCodeAt(0)) >>> 0;
    const keep = wrongs[h % wrongs.length];
    return wrongs.filter(i => i !== keep);
  }

      const step = state.sliderStep || 1;

  async function renderAdmin(){
    if(!bucket){
      root.innerHTML = `${backLink('home','&larr; Back')}${sessionSetupHTML()}`;
      bindActions();
      bindSetupInputs();
      return;
    }
    if(!await isAdminUnlocked()){
      root.innerHTML = `
        ${backLink('home','&larr; Back')}
        <div class="qb-card">
          <h2 class="qb-title" style="font-size:22px;margin-top:0;">Host access only</h2>
          <p class="qb-small">This is the quiz host's control screen. Enter the admin password to open it.</p>
          <input class="qb-input" id="qb-admin-pass-try" type="password" placeholder="Admin password" />
          <button class="qb-btn qb-btn-primary" data-action="unlock-admin">Unlock</button>
        </div>
      `;
      bindActions();
      return;
    }
    const seq = ++adminSeq;
    const [state, players, lib] = await Promise.all([getGameState(), getPlayers(), getLibrary()]);
    const liveBuzz = (state.status === 'live' && state.buzzEpoch)
      ? earliestBuzz(await fetchBuzzes(state.buzzEpoch), state.lockedOut) : null;
    if(seq !== adminSeq) return;   // a newer render superseded this one

    if(liveBuzz){
      const key = (state.buzzEpoch || '') + ':' + liveBuzz.id;
      if(!adminBuzzTimer || adminBuzzTimer.key !== key) adminBuzzTimer = { key, endsAt: Date.now() + ANSWER_SECONDS * 1000 };
    } else if(state.status !== 'live' || !adminBuzzTimer || adminBuzzTimer.key.indexOf((state.buzzEpoch || '') + ':') !== 0){
      adminBuzzTimer = null;   // same transient-fetch protection as the display
    }

    const betting = state.wagerActive && state.wagerPhase === 'betting';
    const liveAntes = betting ? await fetchAntes(state.anteEpoch) : {};
    const answering = state.qMode && state.status === 'live' && !!state.answerEpoch; // false while a wager's betting phase hides the question
    const liveAnswers = answering ? await fetchAnswers(state.answerEpoch) : {};
    // host's private intel: powerups armed on the live question
    const livePowers = (state.qMode && state.status === 'live' && state.puEpoch) ? await fetchPowers(state.puEpoch) : {};
    // bank any earned powerup picks phones have asked for (queued, single writer)
    await foldPuPicks();
    if(seq !== adminSeq) return;

    // question countdown: the host's tab is the single writer, so it also does
    // the automatic scoring the moment its own clock runs out (see adminTick)
    if(answering && !state.reviewing){
      if(!adminQTimer || adminQTimer.epoch !== state.answerEpoch){
        adminQTimer = { epoch: state.answerEpoch, endsAt: Date.now() + (state.qSeconds || QUESTION_SECONDS) * 1000 + 800, fired: false };
      }
    } else {
      adminQTimer = null;
    }
    // the 3-2-1 opening a question: start the local clock once per round
    if(state.countdown && state.status === 'live'){
      if(!adminCountdown || adminCountdown.roundId !== state.roundId){
        adminCountdown = { roundId: state.roundId, endsAt: Date.now() + COUNTDOWN_SECONDS * 1000, fired: false };
      }
    } else {
      adminCountdown = null;
    }
    // all in? end the question early after a 2s beat (adminTick fires it), so
    // the host never has to click "end it now". Not for text rounds — typed
    // answers can be revised until the clock runs out.
    const allIn = answering && !state.reviewing && !state.textMode && players.length > 0
      && Object.values(liveAnswers).filter(a => a && a.id).length >= players.length;
    if(allIn){
      // Fire straight from here rather than parking a timer for adminTick to
      // notice — waiting on the next 250ms tick was pure dead air. The flag is
      // set synchronously before the await inside scoreQuestion, so two
      // overlapping polls can't both score the same question.
      if(adminAutoEnd !== state.answerEpoch){
        adminAutoEnd = state.answerEpoch;
        scoreQuestion(false);
        return;                // this paint is stale; scoring re-renders
      }
    } else if(!answering){
      adminAutoEnd = null;     // question's over: ready for the next one
    }

    // if the admin tab was refreshed mid-review, rebuild the verdicts from the auto-matches
    if(state.reviewing && !reviewMarks){
      reviewMarks = {};
      (state.pendingAnswers || []).forEach(p => { reviewMarks[p.id] = !!p.auto; });
    }
    if(!state.reviewing && reviewMarks && !state.qMode) reviewMarks = null;

    // shared betting panel: any question type can be a wager round
    let bettingPanel = '';
    if(betting){
      const inList = Object.values(liveAntes).filter(a => a && a.id);
      const decided = antesDecided(liveAntes);
      const allIn = players.length > 0 && decided >= players.length;
      const waiting = players.filter(p => !inList.some(a => a.id === p.id && (a.amount > 0 || a.pass))).map(p => p.name);
      // the host shouldn't have to guess whether a quiet phone is thinking or done:
      // a "no bet" tap counts as deciding, and this chimes once when the last one lands
      if(allIn && prevAllDecided !== state.anteEpoch){
        prevAllDecided = state.anteEpoch;
        playSound('join');
      }
      bettingPanel = `
        <div class="qb-buzzed-banner ${allIn ? 'ready' : ''}">
          <div class="qb-small">💰 WAGER ROUND &middot; betting open &middot; the clue is on the projector, the question is still hidden</div>
          <div class="who">${sumAntes(liveAntes) + (state.carryKitty || 0)} pts in the kitty${state.carryKitty ? ` (${state.carryKitty} rolled over)` : ''}</div>
          <div class="qb-small">${decided} of ${players.length} decided${waiting.length && !allIn ? ` &middot; waiting on ${esc(waiting.join(', '))}` : ''}</div>
          <div class="qb-small" style="margin-bottom:12px;">${inList.length ? inList.map(a => `${a.avatar || ''} ${esc(a.name || '')} ${a.pass ? '(no bet)' : `(${a.amount})`}`).join(', ') : 'Nobody has decided yet'}</div>
          <button class="qb-btn qb-btn-gold" data-action="close-betting">${allIn ? '✅ Everyone\'s decided &mdash; ' : ''}${state.qMode ? 'Close betting &amp; reveal the question' : 'Close betting &amp; start the song'}</button>
        </div>
      `;
    }

    let nowPlayingSection = '';
    if(state.roundId && state.qMode){
      const answeredList = Object.values(liveAnswers).filter(a => a && a.id);
      const typeTag = state.sliderMode ? '🎚️ slider range' : state.textMode ? '⌨️ type the answer' : '❓ multiple choice';
      const correctShown = state.sliderMode ? fmtGuess(state.sliderAnswer, state.sliderUnit, groupNums(state.sliderMax))
        : state.textMode ? (state.textAnswer || '')
        : ((state.qAnswers || [])[state.qCorrect] || '');
      let phasePanel;
      if(betting){
        phasePanel = bettingPanel;
      } else if(state.countdown && state.status === 'live'){
        phasePanel = `<div class="qb-buzzed-banner"><div class="who">3&hairsp;&middot;&hairsp;2&hairsp;&middot;&hairsp;1&hellip;</div><div class="qb-small">The projector is counting the room in &mdash; the question opens in a moment.</div></div>`;
      } else if(state.status !== 'live'){
        phasePanel = `<p class="qb-small">Scored &amp; revealed. Load the next round when you're ready.</p>`;
      } else if(state.reviewing){
        phasePanel = `
          <div class="qb-buzzed-banner" style="text-align:left;">
            <div class="qb-small" style="text-align:center;margin-bottom:10px;">⏰ Time's up &mdash; exact &amp; near-miss answers are pre-ticked. Adjust any you like, then confirm. Nobody scores until you do.</div>
            ${(state.pendingAnswers || []).length ? (state.pendingAnswers || []).map(a => `
              <div class="qb-review-row">
                <button class="qb-btn qb-btn-small ${reviewMarks && reviewMarks[a.id] ? 'qb-btn-gold' : 'qb-btn-ghost'}" style="width:44px;" data-action="toggle-review-mark" data-id="${a.id}">${reviewMarks && reviewMarks[a.id] ? '✓' : '✗'}</button>
                <span class="txt">${a.avatar || ''} ${esc(a.name || '')}: &ldquo;${esc(a.text || '')}&rdquo;</span>
                <span class="ms">${a.ms ? (a.ms / 1000).toFixed(1) + 's' : ''}${a.exact ? ' · exact' : a.auto ? ` · close (${a.dist} off)` : (a.dist <= 4 ? ` · ${a.dist} off` : '')}</span>
              </div>
            `).join('') : '<p class="qb-small">Nobody answered in time.</p>'}
            <button class="qb-btn qb-btn-gold" data-action="confirm-review" style="margin-top:10px;">Confirm &amp; score it</button>
          </div>
        `;
      } else {
        phasePanel = `
          <div class="qb-buzzed-banner">
            <div class="qb-small">${state.textMode
              ? `Typing closes after ${state.qSeconds || TEXT_SECONDS}s, then you review before any points are given`
              : state.sliderMode
                ? `Guesses lock in when the ${state.qSeconds || QUESTION_SECONDS}s are up, then it scores itself &mdash; closest to ${esc(fmtGuess(state.sliderAnswer, state.sliderUnit, groupNums(state.sliderMax)))} wins${state.sliderBand ? `, plus anyone within ±${esc(fmtNum(state.sliderBand, groupNums(state.sliderMax)))}` : ''}`
                : `Answers lock in automatically when the ${state.qSeconds || QUESTION_SECONDS}s are up`}</div>
            <div class="who">${answeredList.length} of ${players.length} ${state.sliderMode ? 'guessed' : 'answered'}</div>
            ${adminAutoEnd === state.answerEpoch && !state.textMode ? `<div class="qb-small" style="color:var(--gold);">🚦 Everyone's in &mdash; scoring it now&hellip;</div>` : ''}
            <button class="qb-btn qb-btn-gold" data-action="end-question">${state.textMode ? "Everyone's in &mdash; end it now" : 'End it now'}</button>
          </div>
        `;
      }
      nowPlayingSection = `
        <div class="qb-admin-section">
          <h3>Question round</h3>
          <div class="qb-now-playing">
            <div class="np-label">${esc(state.roundLabel || '')}${state.roundTotal ? ` &middot; Question ${state.roundNumber} of ${state.roundTotal}` : ''} &middot; ${typeTag} &middot; ${state.qPoints} pts, +${state.qBonus} fastest bonus</div>
            <div class="np-song">${esc(state.question || '')}</div>
            <div class="qb-small">Answer (only you can see this): <strong>${esc(correctShown)}</strong></div>
            ${(() => {
              const played = Object.values(livePowers).filter(pw => pw && pw.id && POWERUPS[pw.type]);
              return played.length ? `<div class="qb-small" style="margin-top:4px;">Powerups armed: ${played.map(pw => `${POWERUPS[pw.type].icon} ${esc(pw.name || '')}${pw.targetName ? ` → ${esc(pw.targetName)}` : ''}`).join(' &middot; ')}</div>` : '';
            })()}
          </div>
          ${phasePanel}
        </div>
      `;
    }
    if(state.roundId && !state.qMode){
      const currentStage = (state.stages && state.stages[state.stageIndex]) || null;
      const isLastStage = state.stageIndex >= state.stages.length - 1;

      let buzzedSection = '';
      if(state.status === 'live' && !betting && liveBuzz){
        const halfPts = currentStage ? Math.ceil(currentStage.points / 2) : 0;
        const remainAdmin = adminBuzzTimer ? Math.ceil((adminBuzzTimer.endsAt - Date.now()) / 1000) : ANSWER_SECONDS;
        const remainText = remainAdmin > 0 ? remainAdmin + 's to answer' : "time's up — your call";
        buzzedSection = `
          <div class="qb-buzzed-banner">
            <div class="qb-small">Buzzed in &middot; <span id="qb-admin-countdown">${remainText}</span></div>
            <div class="who">${liveBuzz.avatar || ''} ${esc(liveBuzz.name || '')}</div>
            <div class="qb-row-2">
              <button class="qb-btn qb-btn-gold" data-action="mark-correct">Correct (+${currentStage ? currentStage.points : 0})</button>
              <button class="qb-btn" data-action="mark-correct-half">Half right (+${halfPts})</button>
              <button class="qb-btn qb-btn-primary" data-action="mark-wrong">Wrong</button>
            </div>
          </div>
        `;
      }

      let stageControls = '';
      if(state.status === 'live' && !betting && !liveBuzz){
        stageControls = `
          <div class="qb-row-2">
            ${!isLastStage ? `<button class="qb-btn" data-action="next-stage">No one got it, add next layer</button>` : ''}
            <button class="qb-btn qb-btn-ghost" data-action="reveal-no-winner">Reveal answer</button>
          </div>
        `;
      }

      nowPlayingSection = `
        <div class="qb-admin-section">
          <h3>${state.suddenDeath ? '⚡ Sudden death' : 'Now playing'}</h3>
          <div class="qb-now-playing">
            <div class="np-label">${esc(state.roundLabel || '')}${state.roundTotal ? ` &middot; Question ${state.roundNumber} of ${state.roundTotal}` : ''} &middot; ${state.suddenDeath ? 'answer is on your screen only' : 'hidden from players until reveal'}${state.wagerActive ? ' &middot; 💰 wager, ' + (state.wagerPhase === 'playing' ? Object.values(state.bets || {}).reduce((t, n) => t + n, 0) : sumAntes(liveAntes)) + ' pts staked' : ''}</div>
            ${state.suddenDeath ? `
              <div class="np-song">${esc(state.question || '')}</div>
              <div class="qb-small">Answer (only you can see this): <strong>${esc(state.songTitle || '')}</strong></div>
            ` : `
              <div class="np-song">${esc(state.songTitle || '')}${state.artist ? ` &mdash; ${esc(state.artist)}` : ''}</div>
              <div class="qb-small">${state.status === 'reveal' ? 'Revealed' : `Layer ${state.stageIndex + 1} of ${state.stages.length}: ${esc(currentStage ? currentStage.label : '')} (${currentStage ? currentStage.points : 0} pts)`}</div>
            `}
          </div>
          ${bettingPanel}
          ${buzzedSection}
          ${stageControls}
        </div>
      `;
    }

    const typeBadge = r => {
      const wager = r.isWager ? ' <span class="qb-wager-tag">💰 WAGER</span>' : '';
      if(r.type === 'question') return '<span class="qb-wager-tag" style="background:#2e86de;color:#fff;">❓ CHOICE</span>' + wager;
      if(r.type === 'text') return '<span class="qb-wager-tag" style="background:#4cc38a;color:#12141c;">⌨️ TYPED</span>' + wager;
      if(r.type === 'slider') return '<span class="qb-wager-tag" style="background:#b06cf0;color:#fff;">🎚️ SLIDER</span>' + wager;
      if(r.type === 'sudden') return '<span class="qb-wager-tag" style="background:#e63946;color:#fff;">⚡ SUDDEN DEATH</span>';
      return wager;
    };
    const roundMeta = r => {
      if(r.type === 'question') return `${esc(r.question || '')} &middot; ${r.points} pts +${r.bonus} fastest &middot; ${r.seconds || QUESTION_SECONDS}s`;
      if(r.type === 'text') return `${esc(r.question || '')} &middot; "${esc(r.textAnswer || '')}" &middot; ${r.points} pts +${r.bonus} fastest &middot; ${r.seconds || TEXT_SECONDS}s`;
      if(r.type === 'slider') return `${esc(r.question || '')} &middot; ${esc(fmtGuess(r.sliderAnswer, r.sliderUnit, groupNums(r.sliderMax)))} &middot; ${esc(fmtNum(r.sliderMin, groupNums(r.sliderMax)))}&ndash;${esc(fmtNum(r.sliderMax, groupNums(r.sliderMax)))} in ${esc(fmtNum(sliderStepFor(r), groupNums(r.sliderMax)))}s${r.sliderBand ? ` &middot; &plusmn;${esc(fmtNum(r.sliderBand, groupNums(r.sliderMax)))} band` : ''} &middot; ${r.points} pts +${r.bonus} bullseye &middot; ${r.seconds || QUESTION_SECONDS}s`;
      if(r.type === 'sudden') return `${esc(r.question || '')} &middot; ${esc(r.answer || '')} &middot; ${r.points} pts`;
      return `${esc(r.songTitle)} &mdash; ${esc(r.artist)} &middot; ${(r.stages || []).length} layers${r.isWager ? ' &middot; clue: ' + esc(r.wagerClue || '') : ''}`;
    };
    // gid is set for questions inside a round, absent for sudden deaths
    const roundRowHTML = (r, idx, list, gid) => `
        <div class="qb-round-row ${state.roundId === r.id ? 'now' : r.played ? 'played' : ''}">
          <div class="rr-top">
            <div>
              <div class="rr-title">${esc(r.label)} ${typeBadge(r)}${state.roundId === r.id ? ' <span class="qb-wager-tag" style="background:var(--gold);color:#12141c;">▶ NOW</span>' : r.played ? ' <span class="qb-small">✓ played</span>' : ''}</div>
              <div class="rr-meta">${roundMeta(r)}</div>
            </div>
          </div>
          <div class="rr-actions">
            <button class="qb-btn qb-btn-primary qb-btn-small" style="flex:1;" data-action="load-round" data-id="${r.id}" ${gid ? `data-gid="${gid}"` : ''}>${r.played ? 'Play again' : 'Load to play'}</button>
            <button class="qb-score-adj" data-action="move-round" data-id="${r.id}" ${gid ? `data-gid="${gid}"` : ''} data-dir="-1" title="Move up" ${idx === 0 ? 'disabled' : ''}>▲</button>
            <button class="qb-score-adj" data-action="move-round" data-id="${r.id}" ${gid ? `data-gid="${gid}"` : ''} data-dir="1" title="Move down" ${idx === list.length - 1 ? 'disabled' : ''}>▼</button>
            <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="edit-round" data-id="${r.id}" ${gid ? `data-gid="${gid}"` : ''}>Edit</button>
            <button class="qb-remove-x" data-action="delete-round" data-id="${r.id}" ${gid ? `data-gid="${gid}"` : ''}>&times;</button>
          </div>
        </div>
      `;
    const roundsListHTML = lib.groups.length === 0
      ? `<p class="qb-small">No rounds yet. A round is a named group of questions &mdash; add one and fill it up.</p>`
      : lib.groups.map((g, gi) => {
          const qs = g.questions || [];
          const playedCount = qs.filter(q => q.played).length;
          const announced = state.showRoundIntro && state.showRoundIntro.gid === g.id;
          return `
          <div class="qb-group ${qs.length && playedCount === qs.length ? 'played' : ''}">
            <div class="qb-group-head">
              <div>
                <div class="rr-title" style="font-size:16px;">${g.name.trim().toLowerCase() === `round ${gi + 1}` ? esc(g.name) : `Round ${gi + 1}: ${esc(g.name)}`}</div>
                <div class="rr-meta">${qs.length} question${qs.length === 1 ? '' : 's'}${playedCount ? ` &middot; ${playedCount} played` : ''}</div>
              </div>
              <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
                <button class="qb-btn qb-btn-small ${announced ? 'qb-btn-gold' : 'qb-btn-ghost'}" data-action="announce-round" data-gid="${g.id}" title="Show this round's intro on the projector">${announced ? 'Hide intro' : '📣 Announce'}</button>
                <button class="qb-score-adj" data-action="rename-group" data-gid="${g.id}" title="Rename this round">&#9998;</button>
                <button class="qb-score-adj" data-action="move-group" data-gid="${g.id}" data-dir="-1" title="Move round up" ${gi === 0 ? 'disabled' : ''}>▲</button>
                <button class="qb-score-adj" data-action="move-group" data-gid="${g.id}" data-dir="1" title="Move round down" ${gi === lib.groups.length - 1 ? 'disabled' : ''}>▼</button>
                <button class="qb-remove-x" data-action="delete-group" data-gid="${g.id}" title="Delete this whole round">&times;</button>
              </div>
            </div>
            ${qs.length ? qs.map((q, qi) => roundRowHTML(q, qi, qs, g.id)).join('') : '<p class="qb-small">No questions in this round yet.</p>'}
            <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="add-round" data-gid="${g.id}" style="margin-top:4px;">+ Add question</button>
            ${formOpen && formGroupId === g.id ? roundBuilderFormHTML() : ''}
          </div>`;
        }).join('');
    const suddenListHTML = lib.suddens.length === 0
      ? `<p class="qb-small">None built yet. Add up to 3 in case the night ends level &mdash; they only run when you load one.</p>`
      : lib.suddens.map((r, i) => roundRowHTML(r, i, lib.suddens, null)).join('');

    // remember each panel's scroll position: the 1.2s poll rebuilds the DOM,
    // which would otherwise bounce every list back to the top mid-scroll
    const scrollKeep = {};
    root.querySelectorAll('[data-scrollkey]').forEach(el => { if(el.scrollTop) scrollKeep[el.getAttribute('data-scrollkey')] = el.scrollTop; });

    root.innerHTML = `
      ${backLink('home','&larr; Back')}
      <div class="qb-admin-layout">
        <div class="qb-admin-header">
          ${editingTitle ? `
            <input class="qb-input" id="qb-quiz-title" maxlength="40" value="${esc(state.quizTitle || 'The Music Quiz')}" style="max-width:340px;margin:0;" />
            <button class="qb-btn qb-btn-gold qb-btn-small" data-action="save-title">Save</button>
            <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="cancel-title">Cancel</button>
          ` : `
            <h2 class="qb-title">${esc(state.quizTitle || 'The Music Quiz')}</h2>
            <button class="qb-score-adj" data-action="edit-title" title="Rename the quiz (shows on the projector)">&#9998;</button>
          `}
          <span class="qb-small">host admin &middot; game code <span class="code">${esc(bucket)}</span> &middot; ${players.length} player${players.length===1?'':'s'} joined</span>
        </div>

        ${(() => {
          const tied = tiedLeaders(players);
          // fires after the last question of the LAST round, and again if a
          // sudden death itself ends unresolved
          const finalQ = state.roundTotal && state.roundNumber === state.roundTotal && (!state.groupTotal || state.groupNumber === state.groupTotal);
          const tieMoment = state.status === 'reveal' && tied.length && (state.suddenDeath || finalQ);
          if(!tieMoment) return '';
          const suddens = lib.suddens.filter(r => !r.played);
          return `<div class="qb-admin-card qb-full" style="border:1px solid var(--gold);">
            <div class="qb-admin-section">
              <h3>⚡ It's a tie for the lead!</h3>
              <p class="qb-small" style="margin-top:0;">${esc(tied.map(p => p.name).join(', '))} are level at the top after the final round. Run a sudden death round before the podium &mdash; only their buzzers will work.</p>
              ${suddens.length
                ? suddens.map(r => `<button class="qb-btn qb-btn-gold qb-btn-small" data-action="load-round" data-id="${r.id}" style="margin-bottom:8px;">⚡ Run &ldquo;${esc(r.label)}&rdquo; now</button>`).join('')
                : '<p class="qb-small">No unplayed sudden death rounds left &mdash; add one in the round library.</p>'}
            </div>
          </div>`;
        })()}
        ${nowPlayingSection ? `<div class="qb-admin-card qb-full live" data-scrollkey="live">${nowPlayingSection}</div>` : ''}

        <div class="qb-admin-cols">
        <div class="qb-admin-card" data-scrollkey="projector">
          ${projectorCardHTML(state)}
          ${undoStack.length ? `
          <div class="qb-admin-section">
            <h3>Fix a mistake</h3>
            <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="undo" title="Puts scores and the round back to how they were just before that action">&#8630; Undo ${esc(undoStack[undoStack.length-1].label)}</button>
          </div>` : ''}
        </div>

        <div class="qb-admin-card" data-scrollkey="library">
          <div class="qb-admin-section">
            <h3>📚 Rounds</h3>
            ${roundsListHTML}
            <button class="qb-btn qb-btn-ghost" data-action="add-group" style="margin-top:6px;">+ Add a round</button>
          </div>
          <div class="qb-admin-section">
            <h3>⚡ Sudden death</h3>
            <p class="qb-small" style="margin-top:0;">Tie-breakers for the end of the night. They sit outside the running order, so they don't count towards &ldquo;Round X of Y&rdquo;.</p>
            ${suddenListHTML}
            <button class="qb-btn qb-btn-ghost" data-action="add-round" data-type="sudden" style="margin-top:6px;">+ Add a sudden death</button>
            ${formOpen && !formGroupId && formType === 'sudden' ? roundBuilderFormHTML() : ''}
          </div>
        </div>

        <div class="qb-col">
        <div class="qb-admin-card" data-scrollkey="players">
          <div class="qb-admin-section">
            <h3>👥 Players (${players.length})</h3>
            ${players.length === 0 ? '<p class="qb-small">Nobody has joined yet. Send them to the sign up page.</p>' : ''}
            ${sortedPlayers(players).map(p => p.id === editingPlayerId ? `
              <div class="qb-player-admin-row" style="flex-direction:column;align-items:stretch;gap:10px;">
                <label class="qb-label" style="margin-bottom:0;">Display name</label>
                <input class="qb-input" id="qb-edit-name" maxlength="20" value="${esc(editName)}" style="margin-bottom:0;" />
                <div class="qb-avatar-grid">
                  ${AVATARS.map(a => `<div class="qb-avatar ${a===editAvatar?'selected':''}" data-action="edit-pick-avatar" data-avatar="${a}">${a}</div>`).join('')}
                </div>
                <div class="qb-row-2">
                  <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="cancel-edit-player">Cancel</button>
                  <button class="qb-btn qb-btn-gold qb-btn-small" data-action="save-edit-player">Save</button>
                </div>
              </div>
            ` : p.id === editingScoreId ? `
              <div class="qb-player-admin-row">
                <span>${p.avatar} ${esc(p.name)}</span>
                <span style="display:flex;align-items:center;gap:8px;">
                  <input class="qb-input" id="qb-edit-score" type="number" value="${p.score}"
                    style="margin:0;width:90px;text-align:center;padding:6px 8px;" />
                  <button class="qb-btn qb-btn-gold qb-btn-small" data-action="save-edit-score">Save</button>
                  <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="cancel-edit-score">Cancel</button>
                </span>
              </div>
            ` : `
              <div class="qb-player-admin-row">
                <span>${p.avatar} ${esc(p.name)}${puHeldHTML(p)}${puPending(p) > 0 ? ' <span class="qb-wager-tag" title="Earned a powerup pick — they choose it on their phone">🎁 pick due</span>' : ''}</span>
                <span style="display:flex;align-items:center;gap:8px;">
                  <button class="qb-score-adj" data-action="edit-player" data-id="${p.id}" title="Edit name and picture">&#9998;</button>
                  <button class="qb-score-adj" data-action="adjust-score" data-id="${p.id}" data-delta="-1" title="Take a point off">&minus;</button>
                  <button class="qb-score-adj" data-action="edit-score" data-id="${p.id}" title="Type a new score"
                    style="width:auto;min-width:56px;color:var(--gold);font-weight:800;">${p.score} pts</button>
                  <button class="qb-score-adj" data-action="adjust-score" data-id="${p.id}" data-delta="1" title="Add a point">+</button>
                  <button class="qb-remove-x" data-action="remove-player" data-id="${p.id}" title="Remove this player">&times;</button>
                </span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="qb-admin-card" data-scrollkey="session">
          ${sessionCardHTML()}
        </div>
        </div>
        </div>
      </div>
    `;
    root.querySelectorAll('[data-scrollkey]').forEach(el => {
      const v = scrollKeep[el.getAttribute('data-scrollkey')];
      if(v) el.scrollTop = v;
    });
    bindActions();

    // the slider form's live "steps of 100,000 — 80 notches" note only makes
    // sense if it re-reads the range as the host fills it in. On change (not
    // input), so it fires when they leave the box rather than mid-keystroke.
    root.querySelectorAll('.qb-slider-cfg').forEach(el => {
      el.onchange = () => { readFormFromDOM(); renderAdmin(); };
    });

    // bring the freshly opened inline builder into view so the host isn't left
    // hunting for it after clicking "+ Add question" halfway down a long list
    if(formJustOpened){
      formJustOpened = false;
      const builderEl = document.getElementById('qb-builder');
      if(builderEl) builderEl.scrollIntoView({ behavior:'smooth', block:'center' });
    }

    if(!adminPoll){
      // no bucket means the "Start hosting" screen: nothing to poll, and a
      // re-render there would wipe whatever the host is typing every second
      adminPoll = setInterval(() => { if(view === 'admin' && bucket && !formOpen && !editingPlayerId && !editingScoreId && !editingTitle) renderAdmin(); }, 1200);
      adminTick = setInterval(() => {
        if(view !== 'admin') return;
        const el = document.getElementById('qb-admin-countdown');
        if(el && adminBuzzTimer){
          const remain = Math.ceil((adminBuzzTimer.endsAt - Date.now()) / 1000);
          el.textContent = remain > 0 ? remain + 's to answer' : "time's up — your call";
        }
        // 3-2-1 done: open the question for real, exactly once
        if(adminCountdown && !adminCountdown.fired && Date.now() >= adminCountdown.endsAt){
          adminCountdown.fired = true;
          startCountedQuestion(adminCountdown.roundId);
        }
        // question round: when this tab's clock runs out, score it exactly once
        if(adminQTimer && !adminQTimer.fired && Date.now() >= adminQTimer.endsAt){
          adminQTimer.fired = true;
          scoreQuestion(false);
        }
        // (the everyone's-answered auto-end fires straight from renderAdmin —
        // no timer to poll here, so there's no dead air before the reveal)
      }, 250);
    }
  }

  // ---------- action binding ----------
  function bindActions(){
    root.querySelectorAll('[data-action]').forEach(el => {
      el.onclick = async () => {
        const action = el.getAttribute('data-action');
        if(action === 'goto'){
          view = el.getAttribute('data-target');
          render();
        } else if(action === 'enter-code'){
          enterCode(el.getAttribute('data-target'));
        } else if(action === 'start-session'){
          startNewSession();
        } else if(action === 'join-session'){
          joinExistingSession();
        } else if(action === 'copy-link'){
          copyLink(el.getAttribute('data-kind'));
        } else if(action === 'pick-avatar'){
          joinDraftAvatar = el.getAttribute('data-avatar');
          // update the selection in place: re-rendering here would refocus the
          // name box and make the phone screen jump around
          root.querySelectorAll('[data-action="pick-avatar"]').forEach(a => a.classList.toggle('selected', a === el));
        } else if(action === 'pick-buzzer'){
          joinDraftSound = parseInt(el.getAttribute('data-sound'), 10);
          root.querySelectorAll('[data-action="pick-buzzer"]').forEach(b => b.classList.toggle('selected', b === el));
          playBuzzFor({ sound: joinDraftSound });   // preview the chosen buzzer (tap also unlocks audio)
        } else if(action === 'join-add-pu'){
          const t = el.getAttribute('data-type');
          if(joinDraftPu.length < PU_MAX_SLOTS && POWERUPS[t] && !POWERUPS[t].granted){
            joinDraftPu.push(t);
            playSound('join');
            renderJoin(true);   // cached players, so the repaint doesn't steal focus
          }
        } else if(action === 'join-remove-pu'){
          joinDraftPu.splice(parseInt(el.getAttribute('data-idx'), 10), 1);
          renderJoin(true);
        } else if(action === 'play-pu'){
          const t = el.getAttribute('data-type');
          if(POWERUPS[t] && POWERUPS[t].target === 'player'){
            puArming = { type: t };   // open the who-to-hit list
            renderPlayer();
          } else {
            playPowerup(t, null);
          }
        } else if(action === 'pu-target'){
          playPowerup(el.getAttribute('data-type'), el.getAttribute('data-target'));
        } else if(action === 'pu-cancel'){
          puArming = null;
          renderPlayer();
        } else if(action === 'claim-pu'){
          claimPowerup(el.getAttribute('data-type'));
        } else if(action === 'submit-join'){
          submitJoin();
        } else if(action === 'resume-player'){
          resumePlayerAction();
        } else if(action === 'claim-player'){
          claimPlayer(el.getAttribute('data-id'));
        } else if(action === 'buzz'){
          buzzIn();
        } else if(action === 'place-bet'){
          placeBet();
        } else if(action === 'cancel-bet'){
          cancelBet();
        } else if(action === 'pass-bet'){
          passBet();
        } else if(action === 'answer-choice'){
          answerQuestion(parseInt(el.getAttribute('data-choice'), 10));
        } else if(action === 'answer-text'){
          answerText();
        } else if(action === 'answer-slider'){
          answerSlider();
        } else if(action === 'end-question'){
          withUndo('ending the question early', () => scoreQuestion(true));
        } else if(action === 'toggle-review-mark'){
          const rid = el.getAttribute('data-id');
          if(reviewMarks) reviewMarks[rid] = !reviewMarks[rid];
          renderAdmin();
        } else if(action === 'confirm-review'){
          withUndo('scoring the typed answers', confirmTextScores);
        } else if(action === 'move-round'){
          const gid = el.getAttribute('data-gid');
          if(gid) moveQuestion(gid, el.getAttribute('data-id'), parseInt(el.getAttribute('data-dir'), 10));
          else moveSudden(el.getAttribute('data-id'), parseInt(el.getAttribute('data-dir'), 10));
        } else if(action === 'start-fresh'){
          startFresh();
        } else if(action === 'load-code'){
          loadByCode();
        } else if(action === 'close-betting'){
          withUndo('closing the betting', closeBetting);
        } else if(action === 'mark-correct'){
          withUndo('marking that answer correct', () => markCorrect(false));
        } else if(action === 'mark-correct-half'){
          withUndo('awarding half points', () => markCorrect(true));
        } else if(action === 'mark-wrong'){
          withUndo('marking that answer wrong', markWrong);
        } else if(action === 'next-stage'){
          withUndo('adding the next layer', nextStage);
        } else if(action === 'reveal-no-winner'){
          withUndo('revealing the answer', revealNoWinner);
        } else if(action === 'remove-player'){
          withUndo('removing a player', () => removePlayer(el.getAttribute('data-id')));
        } else if(action === 'reset-game'){
          withUndo('resetting the game', resetGame);
        } else if(action === 'adjust-score'){
          adjustScore(el.getAttribute('data-id'), parseInt(el.getAttribute('data-delta'), 10));
        } else if(action === 'edit-player'){
          const players = await getPlayers();
          const p = players.find(x => x.id === el.getAttribute('data-id'));
          if(p) openPlayerEditor(p);
        } else if(action === 'edit-pick-avatar'){
          const nameEl = document.getElementById('qb-edit-name');
          if(nameEl) editName = nameEl.value;
          editAvatar = el.getAttribute('data-avatar');
          renderAdmin();
        } else if(action === 'save-edit-player'){
          savePlayerEdit();
        } else if(action === 'cancel-edit-player'){
          closePlayerEditor();
        } else if(action === 'edit-score'){
          openScoreEditor(el.getAttribute('data-id'));
        } else if(action === 'save-edit-score'){
          saveScoreEdit();
        } else if(action === 'cancel-edit-score'){
          closeScoreEditor();
        } else if(action === 'edit-title'){
          editingTitle = true;
          renderAdmin();
        } else if(action === 'save-title'){
          saveTitle();
        } else if(action === 'cancel-title'){
          editingTitle = false;
          renderAdmin();
        } else if(action === 'unlock-admin'){
          unlockAdmin();
        } else if(action === 'toggle-lobby'){
          toggleLobby();
        } else if(action === 'toggle-standings'){
          toggleStandings();
        } else if(action === 'toggle-podium'){
          togglePodium();
        } else if(action === 'undo'){
          undoLast();
        } else if(action === 'toggle-sound'){
          toggleSound();
        } else if(action === 'add-group'){
          addGroup();
        } else if(action === 'rename-group'){
          renameGroup(el.getAttribute('data-gid'));
        } else if(action === 'delete-group'){
          deleteGroup(el.getAttribute('data-gid'));
        } else if(action === 'move-group'){
          moveGroup(el.getAttribute('data-gid'), parseInt(el.getAttribute('data-dir'), 10));
        } else if(action === 'announce-round'){
          announceRound(el.getAttribute('data-gid'));
        } else if(action === 'add-round'){
          openAddForm(el.getAttribute('data-type'), el.getAttribute('data-gid'));
        } else if(action === 'edit-round'){
          const gid = el.getAttribute('data-gid');
          const lib = await getLibrary();
          const r = gid
            ? ((lib.groups.find(x => x.id === gid) || {}).questions || []).find(q => q.id === el.getAttribute('data-id'))
            : lib.suddens.find(x => x.id === el.getAttribute('data-id'));
          if(r) openEditForm(r, gid);
        } else if(action === 'delete-round'){
          const gid = el.getAttribute('data-gid');
          if(gid) deleteQuestion(gid, el.getAttribute('data-id'));
          else deleteSudden(el.getAttribute('data-id'));
        } else if(action === 'load-round'){
          withUndo('loading that question', () => loadRoundToPlay(el.getAttribute('data-id'), el.getAttribute('data-gid')));
        } else if(action === 'toggle-wager'){
          readFormFromDOM();   // the checkbox's own .checked is already the new value
          renderAdmin();
        } else if(action === 'pick-round-type'){
          readFormFromDOM();
          const t = el.getAttribute('data-type');
          formType = ['question', 'text', 'slider'].includes(t) ? t : 'song';
          // sensible time prefill for the chosen type (typing and sliding both
          // need longer than tapping a colour); still editable
          formQSeconds = (formType === 'text' || formType === 'slider') ? TEXT_SECONDS : QUESTION_SECONDS;
          // sliders are the hardest to nail, so they're worth more by default
          formQPoints = formType === 'slider' ? SLIDER_POINTS : DEFAULT_POINTS;
          renderAdmin();
        } else if(action === 'add-stage'){
          readFormFromDOM();
          addStageRow();
        } else if(action === 'remove-stage'){
          readFormFromDOM();
          removeStageRow(parseInt(el.getAttribute('data-idx'), 10));
        } else if(action === 'cancel-form'){
          closeForm();
        } else if(action === 'save-round'){
          saveRoundForm();
        }
      };
    });
  }

  render();
})();
</script>

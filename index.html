<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#12141c;
    --panel:#1b1f2e;
    --panel-light:#242a3d;
    --buzz:#e63946;
    --buzz-dark:#a4222d;
    --gold:#f4b942;
    --text:#f1efea;
    --text-dim:#8a8fa3;
    --good:#4cc38a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{margin:0;padding:0;background:transparent;}
  button,.qb-avatar{touch-action:manipulation;user-select:none;-webkit-user-select:none;}
  #qb-root{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 48px;
  }
  .qb-title{
    font-family:'Archivo Black','Inter',sans-serif;
    letter-spacing:0.5px;
  }
  .qb-card{
    background:var(--panel);
    border-radius:18px;
    padding:28px 24px;
    width:100%;
    max-width:520px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
  }
  .qb-btn{
    display:block;
    width:100%;
    padding:16px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:var(--panel-light);
    transition:transform .12s ease, background .12s ease;
  }
  .qb-btn:hover{background:#2c3348;}
  .qb-btn:active{transform:scale(0.98);}
  .qb-btn-primary{background:var(--buzz);}
  .qb-btn-primary:hover{background:#ff4c58;}
  .qb-btn-gold{background:var(--gold);color:#1b1f2e;}
  .qb-btn-gold:hover{background:#ffca5c;}
  .qb-btn-ghost{background:transparent;border:1px solid #3a4160;}
  .qb-btn-small{padding:10px;margin:0;font-size:13px;}
  .qb-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .qb-input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid #3a4160;
    background:var(--panel-light);
    color:var(--text);
    font-size:16px;
    margin-bottom:14px;
  }
  .qb-label{font-size:13px;color:var(--text-dim);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:1px;}
  .qb-avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:18px;}
  .qb-avatar{
    font-size:28px;
    text-align:center;
    padding:10px 0;
    border-radius:10px;
    background:var(--panel-light);
    cursor:pointer;
    border:2px solid transparent;
  }
  .qb-avatar.selected{border-color:var(--gold);background:#333c58;}

  /* Buzzer */
  .qb-buzzer-wrap{display:flex;flex-direction:column;align-items:center;gap:22px;padding:30px 0;}
  .qb-buzzer{
    width:230px;height:230px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ff5561, var(--buzz) 60%, var(--buzz-dark) 100%);
    border:none;
    box-shadow:0 10px 0 var(--buzz-dark), 0 16px 30px rgba(230,57,70,0.4);
    font-family:'Archivo Black',sans-serif;
    font-size:30px;
    color:#fff;
    cursor:pointer;
    letter-spacing:1px;
  }
  .qb-buzzer:active{transform:translateY(6px);box-shadow:0 4px 0 var(--buzz-dark), 0 8px 20px rgba(230,57,70,0.4);}
  .qb-buzzer:disabled{
    background:radial-gradient(circle at 35% 30%, #4a4f60, #383d4d 60%, #2b2f3c 100%);
    box-shadow:0 10px 0 #1e2130;
    color:var(--text-dim);
    cursor:not-allowed;
  }
  .qb-status-line{font-size:18px;font-weight:600;text-align:center;min-height:26px;}
  .qb-status-sub{color:var(--text-dim);font-size:14px;text-align:center;}
  .qb-stage-pill{
    display:inline-block;background:var(--panel-light);color:var(--gold);
    padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;
    letter-spacing:0.5px;margin-bottom:10px;
  }

  /* Scoreboard */
  .qb-scoreboard{width:100%;}
  .qb-score-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-light);
    padding:10px 14px;border-radius:10px;margin-bottom:8px;
  }
  .qb-score-row .name{display:flex;align-items:center;gap:10px;font-weight:600;}
  .qb-score-row .pts{font-family:'Archivo Black',sans-serif;color:var(--gold);}
  .qb-rank{color:var(--text-dim);width:22px;display:inline-block;}

  /* Display (projector) mode */
  .qb-display{width:100%;max-width:1100px;text-align:center;}
  .qb-display .round-tag{color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;font-size:14px;margin-bottom:6px;}
  .qb-display .qb-title{font-size:44px;margin:0 0 20px;}
  .qb-display .qb-stage-pill{font-size:18px;padding:10px 22px;margin-bottom:26px;}
  .qb-buzz-flash{
    background:linear-gradient(135deg,var(--buzz),#ff5561);
    border-radius:24px;
    padding:50px 30px;
    margin-bottom:34px;
    animation:qb-pulse 0.9s ease-in-out infinite;
  }
  @keyframes qb-pulse{0%{box-shadow:0 0 0 0 rgba(230,57,70,0.6);}70%{box-shadow:0 0 0 40px rgba(230,57,70,0);}100%{box-shadow:0 0 0 0 rgba(230,57,70,0);}}
  .qb-buzz-flash .who{font-family:'Archivo Black',sans-serif;font-size:64px;}
  .qb-buzz-avatar{font-size:80px;}
  .qb-idle-box{
    background:var(--panel);
    border:2px dashed #3a4160;
    border-radius:24px;
    padding:60px 30px;
    margin-bottom:34px;
    color:var(--text-dim);
    font-size:22px;
  }
  .qb-reveal-box{
    background:var(--panel);
    border:2px solid var(--gold);
    border-radius:24px;
    padding:44px 30px;
    margin-bottom:34px;
  }
  .qb-reveal-box .song{font-family:'Archivo Black',sans-serif;font-size:42px;color:var(--gold);margin:4px 0;}
  .qb-reveal-box .artist{font-size:20px;color:var(--text-dim);margin-bottom:14px;}
  .qb-reveal-box .winner-line{font-size:22px;font-weight:700;margin-top:14px;}
  .qb-display-scoreboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
  .qb-display-scoreboard .qb-score-row{font-size:20px;padding:16px 20px;}
  .qb-lobby{display:flex;flex-wrap:wrap;gap:40px;align-items:flex-start;justify-content:center;margin-bottom:30px;}
  .qb-qr-box{
    background:#fff;border-radius:20px;padding:20px;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .qb-qr-box .qb-qr-caption{color:#12141c;font-weight:700;font-size:14px;}
  .qb-lobby-joined{flex:1;min-width:280px;text-align:left;}
  .qb-lobby-joined h3{margin:0 0 14px;font-size:16px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}
  .qb-lobby-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
  .qb-lobby-chip{
    background:var(--panel-light);border-radius:12px;padding:12px;
    display:flex;align-items:center;gap:8px;font-weight:600;
  }
  .qb-lobby-chip .av{font-size:22px;}
  .qb-join-strip{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:26px;}
  .qb-join-strip .qb-qr-mini{background:#fff;border-radius:12px;padding:8px;}
  .qb-join-strip .strip-code{font-family:'Archivo Black',sans-serif;font-size:22px;color:var(--gold);}

  /* Admin */
  .qb-admin-section{margin-bottom:26px;}
  .qb-admin-section h3{margin:0 0 12px;font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);}
  .qb-buzzed-banner{
    background:var(--panel-light);
    border-radius:12px;
    padding:18px;
    text-align:center;
    margin-bottom:14px;
  }
  .qb-buzzed-banner .who{font-family:'Archivo Black',sans-serif;font-size:26px;margin:6px 0 14px;}
  .qb-row-2{display:flex;gap:10px;}
  .qb-row-2 .qb-btn{flex:1;}
  .qb-player-admin-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-light);padding:10px 12px;border-radius:10px;margin-bottom:8px;
  }
  .qb-remove-x{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;}
  .qb-remove-x:hover{color:var(--buzz);}
  .qb-score-adj{
    width:30px;height:30px;border-radius:8px;border:1px solid #3a4160;
    background:transparent;color:var(--text);font-size:16px;font-weight:700;
    cursor:pointer;line-height:1;
  }
  .qb-score-adj:hover{background:#2c3348;}

  /* exploding result banner on the display */
  .qb-banner-overlay{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;z-index:50;
  }
  .qb-banner{
    font-family:'Archivo Black',sans-serif;
    font-size:52px;text-align:center;padding:34px 54px;border-radius:24px;
    max-width:80vw;
    box-shadow:0 20px 80px rgba(0,0,0,0.6);
    animation:qb-explode 0.5s cubic-bezier(.17,.89,.32,1.28) both, qb-banner-out 0.45s ease 2.8s both;
  }
  .qb-banner.correct{background:var(--gold);color:#1b1f2e;}
  .qb-banner.wrong{background:var(--buzz);color:#fff;}
  @keyframes qb-explode{
    0%{transform:scale(0.2) rotate(-6deg);opacity:0;}
    60%{transform:scale(1.12) rotate(2deg);opacity:1;}
    100%{transform:scale(1) rotate(0deg);}
  }
  @keyframes qb-banner-out{to{transform:scale(1.15);opacity:0;}}
  .qb-banner-particle{
    position:absolute;left:50%;top:50%;font-size:36px;
    animation:qb-particle 1.5s ease-out forwards;
  }
  @keyframes qb-particle{
    from{transform:translate(-50%,-50%) scale(1);opacity:1;}
    to{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.6);opacity:0;}
  }

  /* standings screen on the projector */
  .qb-standings{max-width:640px;margin:0 auto 34px;}
  .qb-standing-row{
    display:flex;align-items:center;gap:18px;
    background:var(--panel);border-radius:14px;padding:16px 24px;margin-bottom:10px;
    font-size:26px;font-weight:700;
  }
  .qb-standing-row.leader{background:var(--panel-light);border:2px solid var(--gold);}
  .qb-standing-row .rank{width:52px;text-align:center;}
  .qb-standing-row .who{flex:1;text-align:left;}
  .qb-standing-row .pts{font-family:'Archivo Black',sans-serif;color:var(--gold);font-size:30px;}

  /* rules card on the lobby screen */
  .qb-rules{
    background:var(--panel);border-radius:20px;padding:24px 32px;margin:0 auto 30px;
    max-width:780px;text-align:left;
  }
  .qb-rules h3{margin:0 0 12px;color:var(--gold);font-family:'Archivo Black',sans-serif;letter-spacing:1px;font-size:20px;text-transform:uppercase;}
  .qb-rules ol{margin:0;padding-left:24px;font-size:19px;line-height:1.75;}
  .qb-back-link{align-self:flex-start;background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;margin-bottom:16px;padding:0;}
  .qb-back-link:hover{color:var(--text);}
  .qb-small{font-size:13px;color:var(--text-dim);}
  .qb-round-row{
    background:var(--panel-light);border-radius:12px;padding:14px 16px;margin-bottom:10px;
  }
  .qb-round-row .rr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .qb-round-row .rr-title{font-weight:700;}
  .qb-round-row .rr-meta{color:var(--text-dim);font-size:13px;margin-top:2px;}
  .qb-round-row .rr-actions{display:flex;gap:8px;margin-top:10px;}
  .qb-round-row .rr-actions .qb-btn{margin:0;}
  .qb-stage-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .qb-stage-row input.qb-label-input{flex:3;}
  .qb-stage-row input.qb-points-input{flex:1;}
  .qb-stage-row .qb-input{margin-bottom:0;}
  .qb-now-playing{
    background:var(--panel-light);border-radius:12px;padding:16px;margin-bottom:14px;
  }
  .qb-now-playing .np-label{color:var(--text-dim);font-size:12px;text-transform:uppercase;letter-spacing:1px;}
  .qb-now-playing .np-song{font-weight:700;font-size:16px;margin:4px 0 2px;}
</style>

<div id="qb-root"></div>

<script>
(function(){
  const root = document.getElementById('qb-root');
  const KNOWN_VIEWS = ['home','join','player','display','admin'];

  function getUrlParams(){
    try{ return new URLSearchParams(window.location.search); }
    catch(e){ return new URLSearchParams(); }
  }
  function getInitialView(){
    const v = getUrlParams().get('view');
    return KNOWN_VIEWS.includes(v) ? v : 'home';
  }
  function getInitialBucket(){
    const b = getUrlParams().get('bucket');
    return b ? b.trim() : null;
  }
  function buildLinkWithParams(viewName){
    try{
      const url = new URL(window.location.href);
      url.searchParams.set('view', viewName);
      if(bucket) url.searchParams.set('bucket', bucket);
      else url.searchParams.delete('bucket');
      return url.toString();
    }catch(e){ return window.location.href; }
  }
  function updateUrlBar(){
    try{ window.history.replaceState(null, '', buildLinkWithParams(view)); }catch(e){}
  }

  let bucket = getInitialBucket();
  let view = getInitialView();
  let myPlayerId = null;
  let myPlayerName = null;
  let joinDraftName = '';
  let joinDraftAvatar = null;
  let codeDraft = '';

  // admin round-builder form state (local, not shared, only the host edits this)
  let formOpen = false;      // false | 'add' | id-of-round-being-edited
  let formLabel = '';
  let formSong = '';
  let formArtist = '';
  let formStages = [];       // [{label, points}]

  const AVATARS = ['🦊','🐸','🐧','🐢','🦁','🐨','🐯','🐵','🦄','🐙','🦖','🐝','🐮','🐼','🐔','🦉','🐳','🦅'];

  function defaultState(){
    return {
      status:'idle',        // idle | live | reveal
      roundId:null,
      roundLabel:null,
      songTitle:null,
      artist:null,
      stages:[],
      stageIndex:0,
      buzzedId:null, buzzedName:null, buzzedAvatar:null,
      lockedOut:[],
      winnerId:null, winnerName:null, winnerAvatar:null, pointsAwarded:null
    };
  }

  // ---------- shared backend: Firebase Realtime Database via its plain REST API ----------
  // Players never need accounts. The host (owner of this file) does a one-time free
  // Firebase setup and pastes the database URL below. Each game lives under
  // /games/<game code> in the database; the code travels in the ?bucket= URL param
  // exactly like the old kvdb.io bucket id did.
  const FIREBASE_DB_URL = 'https://music-quiz-cac11-default-rtdb.europe-west1.firebasedatabase.app'; // host's own database, players never need this

  function backendConfigured(){
    return /^https:\/\//.test(FIREBASE_DB_URL);
  }
  function kvUrl(key){
    return FIREBASE_DB_URL.replace(/\/+$/, '') + '/games/' + encodeURIComponent(bucket) + '/' + encodeURIComponent(key) + '.json';
  }
  // Game codes are typed on phones, so: lowercase only, no confusable characters.
  function makeGameCode(){
    const alphabet = 'abcdefghjkmnpqrstuvwxyz23456789';
    const rand = new Uint32Array(8);
    crypto.getRandomValues(rand);
    let code = '';
    rand.forEach(n => { code += alphabet[n % alphabet.length]; });
    return code;
  }
  async function kvGet(key){
    if(!bucket || !backendConfigured()) return null;
    try{
      const res = await fetch(kvUrl(key), { cache:'no-store' });
      if(!res.ok) return null;
      const text = await res.text();
      // Firebase returns the literal JSON "null" for paths that don't exist yet
      return (text === '' || text === 'null') ? null : text;
    }catch(e){ console.error(e); return null; }
  }
  async function kvSet(key, value){
    if(!bucket || !backendConfigured()) return false;
    try{
      const res = await fetch(kvUrl(key), { method:'PUT', body:value });
      return res.ok;
    }catch(e){ console.error(e); return false; }
  }

  async function getPlayers(){
    const text = await kvGet('qb-players');
    try{ return text ? JSON.parse(text) : []; }catch(e){ return []; }
  }
  async function savePlayers(list){
    await kvSet('qb-players', JSON.stringify(list));
  }
  async function getGameState(){
    const text = await kvGet('qb-state');
    try{ return text ? JSON.parse(text) : defaultState(); }catch(e){ return defaultState(); }
  }
  async function saveGameState(s){
    await kvSet('qb-state', JSON.stringify(s));
  }
  async function getRounds(){
    const text = await kvGet('qb-rounds');
    try{ return text ? JSON.parse(text) : []; }catch(e){ return []; }
  }
  async function saveRounds(list){
    await kvSet('qb-rounds', JSON.stringify(list));
  }

  function makeId(prefix){
    return (prefix||'p') + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
  }

  async function sha256Hex(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // ---------- sound effects: synthesized with Web Audio, so no audio files needed ----------
  let audioCtx = null;
  let soundOn = true;
  try{ soundOn = localStorage.getItem('qb-sound') !== 'off'; }catch(e){}

  function ensureAudio(){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return null;
    if(!audioCtx) audioCtx = new AC();
    if(audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    return audioCtx;
  }
  // browsers block sound until the page has been interacted with once, so any
  // first tap anywhere (joining, buzzing, an admin click) unlocks the audio
  document.addEventListener('pointerdown', ensureAudio, true);

  function tone(freq, at, dur, type, vol, endFreq){
    const t0 = audioCtx.currentTime + at;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if(endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, t0 + dur);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  }
  const SOUNDS = {
    // the classic game-show lockout buzzer: harsh, low, unmistakable
    buzz(){ tone(240, 0, 0.45, 'sawtooth', 0.4, 190); tone(120, 0, 0.45, 'square', 0.3, 95); },
    correct(){ [523, 659, 784, 1047].forEach((f, i) => tone(f, i * 0.09, 0.25, 'triangle', 0.3)); },
    wrong(){ tone(233, 0, 0.22, 'square', 0.25, 200); tone(196, 0.2, 0.45, 'square', 0.25, 147); },
    reveal(){ tone(392, 0, 0.2, 'triangle', 0.25); tone(330, 0.18, 0.35, 'triangle', 0.25); },
    join(){ tone(880, 0, 0.09, 'sine', 0.2); tone(1175, 0.08, 0.14, 'sine', 0.2); },
    layer(){ tone(587, 0, 0.1, 'triangle', 0.22); tone(659, 0.1, 0.16, 'triangle', 0.22); }
  };
  function playSound(name){
    if(!soundOn || !SOUNDS[name]) return;
    const ctx = ensureAudio();
    if(!ctx || ctx.state !== 'running') return;
    try{ SOUNDS[name](); }catch(e){}
  }
  function toggleSound(){
    const wasBlocked = soundOn && (!audioCtx || audioCtx.state !== 'running');
    if(!soundOn || wasBlocked){
      soundOn = true;
      ensureAudio();
      // confirmation blip, delayed a tick so the context has time to resume
      setTimeout(() => playSound('join'), 60);
    } else {
      soundOn = false;
    }
    try{ localStorage.setItem('qb-sound', soundOn ? 'on' : 'off'); }catch(e){}
    render();
  }
  function soundButtonLabel(){
    if(!soundOn) return '&#128263; Sound off';
    if(!audioCtx || audioCtx.state !== 'running') return '&#128263; Tap to turn on sound';
    return '&#128266; Sound on';
  }

  // ---------- device identity: lets a refreshed phone rejoin as the same player ----------
  // Keyed by bucket so a fresh game code next quiz night starts clean.
  // localStorage can throw in some private-browsing modes; failures just mean no resume.
  const IDENTITY_PREFIX = 'qb-identity:';
  function loadStoredIdentity(){
    if(!bucket) return null;
    try{
      const raw = localStorage.getItem(IDENTITY_PREFIX + bucket);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }
  function saveStoredIdentity(id, name, avatar){
    if(!bucket) return;
    try{ localStorage.setItem(IDENTITY_PREFIX + bucket, JSON.stringify({ id, name, avatar })); }catch(e){}
  }
  function clearStoredIdentity(){
    if(!bucket) return;
    try{ localStorage.removeItem(IDENTITY_PREFIX + bucket); }catch(e){}
  }
  async function resumeStoredPlayer(){
    const stored = loadStoredIdentity();
    if(!stored || !stored.id) return null;
    const players = await getPlayers();
    const me = players.find(p => p.id === stored.id);
    if(!me){
      // an empty list may just be a failed fetch, so only forget the identity
      // when the list came back with players and ours genuinely isn't among them
      if(players.length) clearStoredIdentity();
      return null;
    }
    return me;
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function sortedPlayers(players){ return [...players].sort((a,b)=>b.score-a.score); }

  function scoreboardHTML(players, big){
    const sorted = sortedPlayers(players);
    if(sorted.length === 0) return `<p class="qb-small">No players have joined yet.</p>`;
    return `<div class="${big ? 'qb-display-scoreboard' : ''}">` + sorted.map((p,i)=>`
      <div class="qb-score-row">
        <span class="name"><span class="qb-rank">${i+1}.</span> ${p.avatar} ${esc(p.name)}</span>
        <span class="pts">${p.score}</span>
      </div>
    `).join('') + `</div>`;
  }

  async function render(){
    if(view === 'home') return renderHome();

  // ---------- HOME ----------
  function renderHome(){
    root.innerHTML = `
      <h1 class="qb-title" style="font-size:34px;margin-bottom:4px;">The Music Quiz</h1>

  // ---------- JOIN ----------
  let joinPlayersCache = [];

  // ---------- PLAYER ----------
  let playerPoll = null;
  let prevPlayerSound = null;
  async function renderPlayer(){
    if(!myPlayerId){
      const resumed = await resumeStoredPlayer();
      if(resumed){
        myPlayerId = resumed.id;
        myPlayerName = resumed.name;
      } else {
        view = 'join';
        return renderJoin();
      }
    }
    const [state, players] = await Promise.all([getGameState(), getPlayers()]);
    const me = players.find(p => p.id === myPlayerId);
    if(!me && players.length){
      // the host removed this player, send them back to sign-up
      clearStoredIdentity();
      myPlayerId = null;
      myPlayerName = null;
      view = 'join';
      return renderJoin();
    }
    if(me){
      // the host may have edited this player's name or avatar; the shared record
      // always wins, and the stored identity is refreshed so it sticks on this phone
      if(me.name !== myPlayerName) myPlayerName = me.name;
      const stored = loadStoredIdentity();
      if(stored && (stored.name !== me.name || stored.avatar !== me.avatar)){
        saveStoredIdentity(me.id, me.name, me.avatar);
      }
    }
    const myScore = me ? me.score : 0;
    const myAvatar = me ? me.avatar : '';

    let buzzerDisabled = true;
    let statusLine = '';
    let statusSub = '';
    let stagePill = '';

    const iAmLockedOut = (state.lockedOut || []).includes(myPlayerId);
    const iBuzzedIn = state.buzzedId === myPlayerId;
    const currentStage = (state.stages && state.stages[state.stageIndex]) || null;

    // phones only make sound for things that happened to *this* player;
    // the room-wide sounds come from the display
    if(prevPlayerSound){
      if(state.status === 'reveal' && prevPlayerSound.status !== 'reveal' && state.winnerId === myPlayerId) playSound('correct');
      if(iAmLockedOut && !prevPlayerSound.lockedOut) playSound('wrong');
    }
    prevPlayerSound = { status: state.status, lockedOut: iAmLockedOut };

    if(state.status === 'idle'){
      statusLine = 'Waiting for the host to load the next round';
      statusSub = '';
    } else if(state.status === 'reveal'){
      statusLine = `It was ${esc(state.songTitle || '')} by ${esc(state.artist || '')}`;
      if(state.winnerId === myPlayerId){
        statusSub = `You got it! +${state.pointsAwarded} points`;
      } else if(state.winnerId){
        statusSub = `${state.winnerName || 'Someone'} got it first`;
      } else {
        statusSub = 'Nobody got it that time';
      }
    } else if(state.status === 'live'){
      stagePill = currentStage ? `<div class="qb-stage-pill">${esc(currentStage.label)} &middot; ${currentStage.points} pt${currentStage.points===1?'':'s'}</div>` : '';
      if(iBuzzedIn){
        statusLine = "You buzzed in! Answer out loud now";
        statusSub = 'Waiting for the host to mark it right or wrong';
      } else if(state.buzzedId){
        statusLine = `${state.buzzedAvatar || ''} ${esc(state.buzzedName || 'Someone')} buzzed in first`;
        statusSub = 'Buzzers are locked while they answer';
      } else if(iAmLockedOut){
        statusLine = 'Wrong this time &mdash; your buzzer is locked';
        statusSub = "You get one guess per song, so you're out for the rest of this one. You'll be back in as soon as the next round starts.";
      } else {
        statusLine = 'Buzz in when you know it!';
        statusSub = 'Only one guess per layer';
        buzzerDisabled = false;
      }
    }

    root.innerHTML = `
      <div class="qb-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-weight:700;">${myAvatar} ${esc(myPlayerName || '')}</span>
          <span class="pts" style="font-family:'Archivo Black',sans-serif;color:var(--gold);">${myScore} pts</span>
        </div>
        <div class="qb-buzzer-wrap">
          ${stagePill}
          <button class="qb-buzzer" data-action="buzz" ${buzzerDisabled ? 'disabled' : ''}>BUZZ</button>
          <div class="qb-status-line">${statusLine}</div>
          <div class="qb-status-sub">${statusSub}</div>
        </div>
        <div class="qb-scoreboard">
          ${scoreboardHTML(players, false)}
        </div>
      </div>
      <p class="qb-small" style="margin-top:14px;">Your place is saved on this phone &mdash; if the page refreshes you'll rejoin with your score.</p>
    `;
    bindActions();

    if(!playerPoll){
      playerPoll = setInterval(() => { if(view === 'player') renderPlayer(); }, 800);
    }
  }

  async function buzzIn(){
    if(!myPlayerId) return;
    const state = await getGameState();
    if(state.status !== 'live') return;
    if(state.buzzedId) return;
    if((state.lockedOut || []).includes(myPlayerId)) return;
    const players = await getPlayers();
    const me = players.find(p => p.id === myPlayerId);
    state.buzzedId = myPlayerId;
    state.buzzedName = me ? me.name : myPlayerName;
    state.buzzedAvatar = me ? me.avatar : '';
    playSound('buzz');
    await saveGameState(state);
    renderPlayer();
  }

  // ---------- DISPLAY ----------
  let displayPoll = null;
  let prevDisplaySnap = null;

  // big self-destructing result banner, appended to <body> so the 900ms
  // display re-render can't wipe it mid-animation
  function showBanner(kind, html){
    document.querySelectorAll('.qb-banner-overlay').forEach(el => el.remove());
    const overlay = document.createElement('div');
    overlay.className = 'qb-banner-overlay';
    const emojis = kind === 'correct' ? ['🎉','⭐','✨','🎊'] : ['💥','❌','💢','😬'];
    let particles = '';
    for(let i = 0; i < 16; i++){
      const ang = (Math.PI * 2 * i) / 16;
      const dist = 240 + Math.random() * 180;
      particles += `<span class="qb-banner-particle" style="--dx:${Math.round(Math.cos(ang) * dist)}px;--dy:${Math.round(Math.sin(ang) * dist)}px;">${emojis[i % emojis.length]}</span>`;
    }
    overlay.innerHTML = `${particles}<div class="qb-banner ${kind}">${html}</div>`;
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 3400);
  }
  function standingsHTML(players){

  // The join link and QR encode this page's own URL, so they only work on other
  // phones when the page itself is hosted somewhere phones can reach.
  function pageReachableByPhones(){
    if(location.protocol === 'file:') return false;

  function joinStripHTML(){

          <div class="strip-code">${esc(bucket)}</div>
        </div>

    `;
  }

  async function renderDisplay(){
    if(!bucket){
      root.innerHTML = `${backLink('home','&larr; Back')}${noSessionHTML('display')}`;
      bindActions();
      return;
    }
    const [state, players] = await Promise.all([getGameState(), getPlayers()]);
    const currentStage = (state.stages && state.stages[state.stageIndex]) || null;
    const isLobby = !state.roundId;
    const showStandings = !!state.showStandings;

    // the display is the tab being cast, so it's the room's speaker and hype man:
    // whenever the polled state shows something happened, play a sound and, for
    // right/wrong verdicts, fire the big exploding banner
    if(prevDisplaySnap){
      const prev = prevDisplaySnap;
      if(state.buzzedId && state.buzzedId !== prev.buzzedId) playSound('buzz');
      if(state.status === 'reveal' && prev.status !== 'reveal'){
        playSound(state.winnerId ? 'correct' : 'reveal');
        if(state.winnerId) showBanner('correct', `${state.winnerAvatar || ''} ${esc(state.winnerName || 'Someone')} got it correct!`);
      }
      const lockedCount = (state.lockedOut || []).length;
      if(state.status === 'live' && prev.status === 'live' && lockedCount > prev.lockedCount){
        playSound('wrong');
        showBanner('wrong', `${prev.buzzedAvatar || ''} ${esc(prev.buzzedName || 'Someone')} got it wrong!<div style="font-size:26px;margin-top:10px;">Buzzers open again</div>`);
      }
      if(state.status === 'live' && prev.status === 'live' && (state.stageIndex||0) > prev.stageIndex && lockedCount <= prev.lockedCount) playSound('layer');
      if(isLobby && players.length > prev.playerCount) playSound('join');
    }
    prevDisplaySnap = {
      buzzedId: state.buzzedId || null,
      buzzedName: state.buzzedName || null,
      buzzedAvatar: state.buzzedAvatar || null,
      status: state.status,
      lockedCount: (state.lockedOut || []).length,
      stageIndex: state.stageIndex || 0,
      playerCount: players.length
    };
    let stagePill = '';
    let centre;

    if(showStandings){
      centre = standingsHTML(players);
    } else if(isLobby){
      centre = `
        <div class="qb-lobby">
          <div class="qb-qr-box">

            <div class="qb-qr-caption">Scan to join</div>

          <h3>How it works</h3>

            <li>A song plays one instrument layer at a time &mdash; the fewer layers you need, the more points you get.</li>
            <li>Know it? Hit <strong>BUZZ</strong>. First buzz locks everyone else out.</li>
            <li>Say <strong>BOTH the ARTIST and the SONG NAME</strong> out loud &mdash; you need both to win the points.</li>
            <li>Right answer: the points are yours and the round ends.</li>
            <li>Wrong answer: you're out for the rest of that song, and everyone else's buzzers reopen.</li>
            <li>You only get <strong>one guess per song</strong>, so buzz when you're sure!</li>
          </ol>
        </div>
      `;
    } else if(state.status === 'reveal'){
      let winnerLine = 'Nobody got it that time';
      if(state.winnerId){
        winnerLine = `${state.winnerAvatar || ''} ${esc(state.winnerName || '')} got it, +${state.pointsAwarded} points`;
      }
      centre = `
        <div class="qb-reveal-box">
          <div class="qb-small">The answer was</div>
          <div class="song">${esc(state.songTitle || 'Unknown')}</div>
          <div class="artist">${esc(state.artist || '')}</div>
          <div class="winner-line">${winnerLine}</div>
        </div>
      `;
    } else if(state.status === 'live' && state.buzzedId){
      stagePill = currentStage ? `<div class="qb-stage-pill">${esc(currentStage.label)} &middot; ${currentStage.points} pt${currentStage.points===1?'':'s'} up for grabs</div>` : '';
      centre = `
        <div class="qb-buzz-flash">
          <div class="qb-buzz-avatar">${state.buzzedAvatar || ''}</div>
          <div class="who">${esc(state.buzzedName || 'Someone')}</div>
        </div>
      `;
    } else if(state.status === 'live'){
      stagePill = currentStage ? `<div class="qb-stage-pill">${esc(currentStage.label)} &middot; ${currentStage.points} pt${currentStage.points===1?'':'s'} up for grabs</div>` : '';
      centre = `<div class="qb-idle-box">Buzzers are live. Waiting for someone to answer&hellip;</div>`;
    } else {
      centre = `<div class="qb-idle-box">Waiting for the host to load the next round</div>`;
    }

    root.innerHTML = `
      <div class="qb-display">
        <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">
          ${backLink('home','&larr; Back')}
          <button class="qb-back-link" data-action="toggle-sound">${soundButtonLabel()}</button>
        </div>
        <div class="round-tag">${showStandings ? 'Current standings' : isLobby ? 'Get ready' : esc(state.roundLabel || 'Music round')}</div>
        <h1 class="qb-title">The Music Quiz</h1>
        ${stagePill}
        ${centre}
        ${showStandings ? '' : isLobby ? reachWarningHTML() : scoreboardHTML(players, true)}
        ${showStandings || (!isLobby && state.status !== 'live') ? joinStripHTML() : ''}
      </div>
    `;
    bindActions();

    if(!showStandings && isLobby){
      renderQrInto('qb-qr-canvas', 190);
    } else if(showStandings || state.status !== 'live'){
      renderQrInto('qb-qr-mini-canvas', 96);
    }

    if(!displayPoll){
      displayPoll = setInterval(() => { if(view === 'display') renderDisplay(); }, 900);
    }
  }

  // ---------- ADMIN ----------
  let adminPoll = null;

  // admin password gate. This keeps players from wandering into the host screen
  // by editing the URL; it is a lock on the door, not a vault (the app is all
  // client-side, so a determined snoop could still read the shared data).
  // The hash lives in the game's data; the host's own browser remembers the
  // password so they are never re-prompted on their machine.
  let adminUnlocked = false;
  async function getAdminHash(){
    const text = await kvGet('qb-admin');
    if(!text) return null;
    try{ return JSON.parse(text); }catch(e){ return null; }
  }
  async function isAdminUnlocked(){
    if(adminUnlocked) return true;
    const hash = await getAdminHash();
    if(!hash){ adminUnlocked = true; return true; } // games created before passwords existed
    try{
      const saved = localStorage.getItem('qb-adminpass:' + bucket);
      if(saved && await sha256Hex(saved) === hash){ adminUnlocked = true; return true; }
    }catch(e){}
    return false;
  }
  async function unlockAdmin(){
    const el = document.getElementById('qb-admin-pass-try');
    const pass = el ? el.value.trim() : '';
    if(!pass){ alert('Enter the admin password.'); return; }
    const hash = await getAdminHash();
    if(hash && await sha256Hex(pass) === hash){
      adminUnlocked = true;
      try{ localStorage.setItem('qb-adminpass:' + bucket, pass); }catch(e){}
      renderAdmin();
    } else {
      alert('Wrong password.');
    }
  }

  // host-side undo: snapshot the shared scores + game state just before each
  // host action, so a mis-click ("marked the wrong answer correct") can be
  // rolled back. Lives only in the host's tab; players can't undo anything.
  let undoStack = [];
  async function withUndo(label, fn){
    const [stateSnap, playersSnap] = await Promise.all([kvGet('qb-state'), kvGet('qb-players')]);
    const proceeded = await fn();
    if(proceeded === false) return; // action was a no-op or the host cancelled it
    undoStack.push({ label, state: stateSnap, players: playersSnap });
    if(undoStack.length > 12) undoStack.shift();
    renderAdmin();
  }
  async function undoLast(){
    const snap = undoStack.pop();
    if(!snap) return;
    // keep anyone who joined after the snapshot, so an undo never kicks a player
    let restored = [];
    try{ restored = snap.players ? JSON.parse(snap.players) : []; }catch(e){}
    const current = await getPlayers();
    current.forEach(p => { if(!restored.some(r => r.id === p.id)) restored.push(p); });
    await Promise.all([
      kvSet('qb-state', snap.state || JSON.stringify(defaultState())),
      kvSet('qb-players', JSON.stringify(restored))
    ]);
    renderAdmin();
  }

  async function toggleStandings(){
    const s = await getGameState();
    s.showStandings = !s.showStandings;
    await saveGameState(s);
    renderAdmin();
  }

  async function adjustScore(id, delta){
    const players = await getPlayers();
    const p = players.find(x => x.id === id);
    if(!p) return;
    p.score = (p.score || 0) + delta;
    await savePlayers(players);
    renderAdmin();
  }

  // host editing of a player's name/avatar; hostEdited marks the record as
  // host-owned so the player's phone adopts it and keeps it
  let editingPlayerId = null;
  let editName = '';
  let editAvatar = '';
  function openPlayerEditor(p){
    editingPlayerId = p.id;
    editName = p.name;
    editAvatar = p.avatar;
    renderAdmin();
  }
  function closePlayerEditor(){
    editingPlayerId = null;
    renderAdmin();
  }
  async function savePlayerEdit(){
    const nameEl = document.getElementById('qb-edit-name');
    const name = (nameEl ? nameEl.value : editName).trim();
    if(!name){ alert('The name cannot be empty.'); return; }
    const players = await getPlayers();
    const p = players.find(x => x.id === editingPlayerId);
    if(p){
      p.name = name;
      p.avatar = editAvatar;
      p.hostEdited = true;
    }
    await savePlayers(players);
    editingPlayerId = null;
    renderAdmin();
  }

  // sensible default labels so the host doesn't retype layers every round
  function newStageRow(n, points){
    return { label: n === 1 ? '1 Track Layer' : n + ' Track Layers', points: points };
  }

  async function openAddForm(){
    const rounds = await getRounds();
    formOpen = 'add';
    formLabel = 'Round ' + (rounds.length + 1);
    formSong = '';
    formArtist = '';
    formStages = [1,2,3,4,5].map(n => newStageRow(n, 6 - n));
    renderAdmin();
  }

  function openEditForm(round){
    formOpen = round.id;
    formLabel = round.label || '';
    formSong = round.songTitle || '';
    formArtist = round.artist || '';
    formStages = round.stages.map(s => ({label:s.label, points:s.points}));
    renderAdmin();
  }

  function closeForm(){
    formOpen = false;
    renderAdmin();
  }

  function addStageRow(){
    const lastPoints = formStages.length ? formStages[formStages.length-1].points : 6;
    formStages.push(newStageRow(formStages.length + 1, Math.max(1, lastPoints - 1)));
    renderAdmin();
  }

  function removeStageRow(idx){
    if(formStages.length <= 1) return;
    formStages.splice(idx, 1);
    renderAdmin();
  }

  function readFormFromDOM(){
    const labelEl = document.getElementById('qb-round-label');
    const songEl = document.getElementById('qb-round-song');
    const artistEl = document.getElementById('qb-round-artist');
    if(labelEl) formLabel = labelEl.value;
    if(songEl) formSong = songEl.value;
    if(artistEl) formArtist = artistEl.value;
    document.querySelectorAll('.qb-stage-row').forEach((rowEl, idx) => {
      const labelInput = rowEl.querySelector('.qb-label-input');
      const pointsInput = rowEl.querySelector('.qb-points-input');
      if(formStages[idx]){
        formStages[idx].label = labelInput ? labelInput.value : formStages[idx].label;
        formStages[idx].points = pointsInput ? (parseInt(pointsInput.value,10) || 0) : formStages[idx].points;
      }
    });
  }

  async function saveRoundForm(){
    readFormFromDOM();
    const song = formSong.trim();
    if(!song){ alert('Enter the song title first.'); return; }
    if(formStages.some(s => !s.label.trim())){ alert('Give every layer a label, e.g. "Drums only".'); return; }

    const rounds = await getRounds();
    if(formOpen === 'add'){
      rounds.push({
        id: makeId('r'),
        label: formLabel.trim() || `Round ${rounds.length + 1}`,
        songTitle: song,
        artist: formArtist.trim(),
        stages: formStages.map(s => ({label:s.label.trim(), points:s.points}))
      });
    } else {
      const existing = rounds.find(r => r.id === formOpen);
      if(existing){
        existing.label = formLabel.trim() || existing.label;
        existing.songTitle = song;
        existing.artist = formArtist.trim();
        existing.stages = formStages.map(s => ({label:s.label.trim(), points:s.points}));
      }
    }
    await saveRounds(rounds);
    formOpen = false;
    renderAdmin();
  }

  async function deleteRound(id){
    if(!confirm('Delete this round from the library?')) return;
    const rounds = await getRounds();
    await saveRounds(rounds.filter(r => r.id !== id));
    renderAdmin();
  }

  async function loadRoundToPlay(id){
    const rounds = await getRounds();
    const r = rounds.find(x => x.id === id);
    if(!r) return false;
    const s = defaultState();
    s.status = 'live';
    s.roundId = r.id;
    s.roundLabel = r.label;
    s.songTitle = r.songTitle;
    s.artist = r.artist;
    s.stages = r.stages;
    s.stageIndex = 0;
    await saveGameState(s);
    renderAdmin();
  }

  async function nextStage(){
    const s = await getGameState();
    if(s.stageIndex >= s.stages.length - 1) return false;
    s.stageIndex += 1;
    s.buzzedId = null; s.buzzedName = null; s.buzzedAvatar = null;
    // lockedOut is left as is on purpose: one guess per round, not per layer
    s.status = 'live';
    await saveGameState(s);
    renderAdmin();
  }

  async function revealNoWinner(){
    const s = await getGameState();
    if(s.status === 'reveal') return false;
    s.status = 'reveal';
    s.winnerId = null; s.winnerName = null; s.winnerAvatar = null; s.pointsAwarded = null;
    s.buzzedId = null; s.buzzedName = null; s.buzzedAvatar = null;
    await saveGameState(s);
    renderAdmin();
  }

  async function markCorrect(){
    const s = await getGameState();
    if(!s.buzzedId) return false;
    const stage = s.stages[s.stageIndex];
    const points = stage ? stage.points : 0;
    const players = await getPlayers();
    const p = players.find(pl => pl.id === s.buzzedId);
    if(p) p.score = (p.score || 0) + points;
    await savePlayers(players);

    s.status = 'reveal';
    s.winnerId = s.buzzedId;
    s.winnerName = s.buzzedName;
    s.winnerAvatar = s.buzzedAvatar;
    s.pointsAwarded = points;
    s.buzzedId = null; s.buzzedName = null; s.buzzedAvatar = null;
    await saveGameState(s);
    renderAdmin();
  }

  async function markWrong(){
    const s = await getGameState();
    if(!s.buzzedId) return false;
    s.lockedOut = s.lockedOut || [];
    if(!s.lockedOut.includes(s.buzzedId)) s.lockedOut.push(s.buzzedId);
    s.buzzedId = null; s.buzzedName = null; s.buzzedAvatar = null;
    s.status = 'live';
    await saveGameState(s);
    renderAdmin();
  }

  async function removePlayer(id){
    const players = await getPlayers();
    await savePlayers(players.filter(p => p.id !== id));
    renderAdmin();
  }

  async function resetGame(){
    if(!confirm('Reset all scores and end the current round? Your round library stays intact.')) return false;
    const players = await getPlayers();
    players.forEach(p => p.score = 0);
    await savePlayers(players);
    await saveGameState(defaultState());
    renderAdmin();
  }

  function roundBuilderFormHTML(){
    if(!formOpen) return '';
    return `
      <div class="qb-card" style="padding:20px;margin-bottom:16px;">
        <h3 style="margin-top:0;">${formOpen === 'add' ? 'Add a round' : 'Edit round'}</h3>
        <label class="qb-label">Round label (optional)</label>
        <input class="qb-input" id="qb-round-label" placeholder="e.g. Round 1" value="${esc(formLabel)}" />
        <label class="qb-label">Song title</label>
        <input class="qb-input" id="qb-round-song" placeholder="e.g. Don't Stop Me Now" value="${esc(formSong)}" />
        <label class="qb-label">Artist</label>
        <input class="qb-input" id="qb-round-artist" placeholder="e.g. Queen" value="${esc(formArtist)}" />
        <label class="qb-label">Layers, from hardest to easiest</label>
        ${formStages.map((s,i) => `
          <div class="qb-stage-row">
            <input class="qb-input qb-label-input" placeholder="e.g. Drums only" value="${esc(s.label)}" />
            <input class="qb-input qb-points-input" type="number" min="0" value="${s.points}" />
            <button class="qb-remove-x" data-action="remove-stage" data-idx="${i}">&times;</button>
          </div>
        `).join('')}
        <button class="qb-btn qb-btn-ghost qb-btn-small" style="margin-bottom:16px;" data-action="add-stage">+ Add another layer</button>
        <div class="qb-row-2">
          <button class="qb-btn qb-btn-ghost" data-action="cancel-form">Cancel</button>
          <button class="qb-btn qb-btn-primary" data-action="save-round">Save round</button>
        </div>
      </div>
    `;
  }

  async function startNewSession(){
    if(!backendConfigured()){
      alert('The database URL has not been set up yet. Open this file and paste your Firebase database URL into FIREBASE_DB_URL.');
      return;
    }
    const passEl = document.getElementById('qb-admin-pass');
    const pass = passEl ? passEl.value.trim() : '';
    if(!pass){
      alert('Set an admin password first. It keeps players out of this host screen if they fiddle with the link.');
      return;
    }
    const btn = document.getElementById('qb-start-session-btn');
    if(btn){ btn.disabled = true; btn.textContent = 'Starting…'; }
    bucket = makeGameCode();
    // writing the initial state both seeds the game and confirms the backend is reachable
    const ok = await kvSet('qb-state', JSON.stringify(defaultState()));
    if(!ok){
      bucket = null;
      alert("Couldn't start a session, check your connection and try again.");
      renderAdmin();
      return;
    }
    await kvSet('qb-admin', JSON.stringify(await sha256Hex(pass)));
    try{ localStorage.setItem('qb-adminpass:' + bucket, pass); }catch(e){}
    adminUnlocked = true;
    view = 'admin';
    updateUrlBar();
    renderAdmin();
  }

  async function joinExistingSession(){
    const el = document.getElementById('qb-code-input');
    const code = (el ? el.value : codeDraft).trim().toLowerCase();
    if(!code){ alert('Enter the game code first.'); return; }
    bucket = code;
    adminUnlocked = false; // different game, so the password check must run again
    view = 'admin';
    updateUrlBar();
    renderAdmin();
  }

  function copyLink(kind){
    const link = buildLinkWithParams(kind);
    try{
      navigator.clipboard.writeText(link);
      alert('Link copied: ' + link);
    }catch(e){
      prompt('Copy this link:', link);
    }
  }

  function sessionSetupHTML(){
    const setupWarning = backendConfigured() ? '' : `
        <p class="qb-small" style="color:#e0a03a;">One-time setup needed: paste your Firebase database URL into the FIREBASE_DB_URL constant near the top of this file's script. Players never need this &mdash; only you.</p>`;
    return `
      <div class="qb-card">
        <h2 class="qb-title" style="font-size:22px;margin-top:0;">Start hosting</h2>${setupWarning}
        <p class="qb-small">This creates a game code that links your admin, the projector display and your friends' phones together. No accounts needed.</p>
        <label class="qb-label">Admin password</label>
        <input class="qb-input" id="qb-admin-pass" type="password" maxlength="40" placeholder="Stops players opening this host screen" />
        <button class="qb-btn qb-btn-primary" id="qb-start-session-btn" data-action="start-session">Start new game</button>
        <p class="qb-small" style="margin-top:18px;">Already started one and lost the tab? Enter your game code:</p>
        <input class="qb-input" id="qb-code-input" placeholder="Game code" value="${esc(codeDraft)}" />
        <button class="qb-btn qb-btn-ghost" data-action="join-session">Continue with this code</button>
      </div>
    `;
  }

  function sessionInfoHTML(state){
    return `
      <div class="qb-admin-section">
        <h3>Session</h3>
        <div class="qb-now-playing">
          <div class="np-label">Game code</div>
          <div class="np-song">${esc(bucket)}</div>
        </div>
        <button class="qb-btn qb-btn-small" data-action="copy-link" data-kind="display">Copy projector display link</button>
        <button class="qb-btn qb-btn-small" data-action="copy-link" data-kind="join">Copy join link (or use the QR on the display)</button>
        <button class="qb-btn qb-btn-small ${state.showStandings ? 'qb-btn-gold' : ''}" data-action="toggle-standings">${state.showStandings ? 'Projector: back to the game screen' : 'Projector: show score standings'}</button>
        ${pageReachableByPhones() ? '' : `<p class="qb-small" style="color:#e0a03a;">These links point at this computer only, so other devices can't open them. Put the file online (e.g. GitHub Pages or Netlify) and host from that address.</p>`}
      </div>
    `;
  }

  async function renderAdmin(){
    if(!bucket){
      root.innerHTML = `${backLink('home','&larr; Back')}${sessionSetupHTML()}`;
      bindActions();
      return;
    }
    if(!await isAdminUnlocked()){
      root.innerHTML = `
        ${backLink('home','&larr; Back')}
        <div class="qb-card">
          <h2 class="qb-title" style="font-size:22px;margin-top:0;">Host access only</h2>
          <p class="qb-small">This is the quiz host's control screen. Enter the admin password to open it.</p>
          <input class="qb-input" id="qb-admin-pass-try" type="password" placeholder="Admin password" />
          <button class="qb-btn qb-btn-primary" data-action="unlock-admin">Unlock</button>
        </div>
      `;
      bindActions();
      return;
    }
    const [state, players, rounds] = await Promise.all([getGameState(), getPlayers(), getRounds()]);

    let nowPlayingSection = '';
    if(state.roundId){
      const currentStage = (state.stages && state.stages[state.stageIndex]) || null;
      const isLastStage = state.stageIndex >= state.stages.length - 1;

      let buzzedSection = '';
      if(state.status === 'live' && state.buzzedId){
        buzzedSection = `
          <div class="qb-buzzed-banner">
            <div class="qb-small">Buzzed in</div>
            <div class="who">${state.buzzedAvatar || ''} ${esc(state.buzzedName || '')}</div>
            <div class="qb-row-2">
              <button class="qb-btn qb-btn-gold" data-action="mark-correct">Correct (+${currentStage ? currentStage.points : 0})</button>
              <button class="qb-btn qb-btn-primary" data-action="mark-wrong">Wrong, they're out for this round</button>
            </div>
          </div>
        `;
      }

      let stageControls = '';
      if(state.status === 'live' && !state.buzzedId){
        stageControls = `
          <div class="qb-row-2">
            ${!isLastStage ? `<button class="qb-btn" data-action="next-stage">No one got it, add next layer</button>` : ''}
            <button class="qb-btn qb-btn-ghost" data-action="reveal-no-winner">Reveal answer</button>
          </div>
        `;
      }

      nowPlayingSection = `
        <div class="qb-admin-section">
          <h3>Now playing</h3>
          <div class="qb-now-playing">
            <div class="np-label">${esc(state.roundLabel || '')} &middot; hidden from players until reveal</div>
            <div class="np-song">${esc(state.songTitle || '')} &mdash; ${esc(state.artist || '')}</div>
            <div class="qb-small">${state.status === 'reveal' ? 'Revealed' : `Layer ${state.stageIndex + 1} of ${state.stages.length}: ${esc(currentStage ? currentStage.label : '')} (${currentStage ? currentStage.points : 0} pts)`}</div>
          </div>
          ${buzzedSection}
          ${stageControls}
        </div>
      `;
    }

    const roundsListHTML = rounds.length === 0
      ? `<p class="qb-small">No rounds built yet. Add your first one below.</p>`
      : rounds.map(r => `
        <div class="qb-round-row">
          <div class="rr-top">
            <div>
              <div class="rr-title">${esc(r.label)}</div>
              <div class="rr-meta">${esc(r.songTitle)} &mdash; ${esc(r.artist)} &middot; ${r.stages.length} layers</div>
            </div>
          </div>
          <div class="rr-actions">
            <button class="qb-btn qb-btn-primary qb-btn-small" style="flex:1;" data-action="load-round" data-id="${r.id}">Load to play</button>
            <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="edit-round" data-id="${r.id}">Edit</button>
            <button class="qb-remove-x" data-action="delete-round" data-id="${r.id}">&times;</button>
          </div>
        </div>
      `).join('');

    root.innerHTML = `
      ${backLink('home','&larr; Back')}
      <div class="qb-card">
        <h2 class="qb-title" style="font-size:22px;margin-top:0;">Host admin</h2>
        <p class="qb-small">${players.length} player${players.length===1?'':'s'} joined</p>

        ${sessionInfoHTML(state)}

        ${nowPlayingSection}

        ${undoStack.length ? `
        <div class="qb-admin-section">
          <h3>Fix a mistake</h3>
          <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="undo" title="Puts scores and the round back to how they were just before that action">&#8630; Undo ${esc(undoStack[undoStack.length-1].label)}</button>
        </div>` : ''}

        <div class="qb-admin-section">
          <h3>Round library</h3>
          ${roundsListHTML}
          <button class="qb-btn qb-btn-ghost" data-action="add-round" style="margin-top:6px;">+ Add a round</button>
        </div>

        ${roundBuilderFormHTML()}

        <div class="qb-admin-section">
          <h3>Players (${players.length})</h3>
          ${players.length === 0 ? '<p class="qb-small">Nobody has joined yet. Send them to the sign up page.</p>' : ''}
          ${sortedPlayers(players).map(p => p.id === editingPlayerId ? `
            <div class="qb-player-admin-row" style="flex-direction:column;align-items:stretch;gap:10px;">
              <label class="qb-label" style="margin-bottom:0;">Display name</label>
              <input class="qb-input" id="qb-edit-name" maxlength="20" value="${esc(editName)}" style="margin-bottom:0;" />
              <div class="qb-avatar-grid">
                ${AVATARS.map(a => `<div class="qb-avatar ${a===editAvatar?'selected':''}" data-action="edit-pick-avatar" data-avatar="${a}">${a}</div>`).join('')}
              </div>
              <div class="qb-row-2">
                <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="cancel-edit-player">Cancel</button>
                <button class="qb-btn qb-btn-gold qb-btn-small" data-action="save-edit-player">Save</button>
              </div>
            </div>
          ` : `
            <div class="qb-player-admin-row">
              <span>${p.avatar} ${esc(p.name)}</span>
              <span style="display:flex;align-items:center;gap:8px;">
                <button class="qb-score-adj" data-action="edit-player" data-id="${p.id}" title="Edit name and picture">&#9998;</button>
                <button class="qb-score-adj" data-action="adjust-score" data-id="${p.id}" data-delta="-1" title="Take a point off">&minus;</button>
                <span class="pts" style="color:var(--gold);min-width:48px;text-align:center;">${p.score} pts</span>
                <button class="qb-score-adj" data-action="adjust-score" data-id="${p.id}" data-delta="1" title="Add a point">+</button>
                <button class="qb-remove-x" data-action="remove-player" data-id="${p.id}" title="Remove this player">&times;</button>
              </span>
            </div>
          `).join('')}
        </div>

        <div class="qb-admin-section">
          <h3>Reset</h3>
          <button class="qb-btn qb-btn-ghost" data-action="reset-game">Reset scores &amp; end current round</button>
        </div>
      </div>
    `;
    bindActions();

    if(!adminPoll){
      adminPoll = setInterval(() => { if(view === 'admin' && !formOpen && !editingPlayerId) renderAdmin(); }, 1200);
    }
  }

  // ---------- action binding ----------
  function bindActions(){
    root.querySelectorAll('[data-action]').forEach(el => {
      el.onclick = async () => {
        const action = el.getAttribute('data-action');
        if(action === 'goto'){
          view = el.getAttribute('data-target');
          render();
        } else if(action === 'enter-code'){
          enterCode(el.getAttribute('data-target'));
        } else if(action === 'start-session'){
          startNewSession();
        } else if(action === 'join-session'){
          joinExistingSession();
        } else if(action === 'copy-link'){
          copyLink(el.getAttribute('data-kind'));
        } else if(action === 'pick-avatar'){
          joinDraftAvatar = el.getAttribute('data-avatar');
          const nameEl = document.getElementById('qb-name-input');
          if(nameEl) joinDraftName = nameEl.value;
          renderJoin(true);
        } else if(action === 'submit-join'){
          submitJoin();
        } else if(action === 'resume-player'){
          resumePlayerAction();
        } else if(action === 'claim-player'){
          claimPlayer(el.getAttribute('data-id'));
        } else if(action === 'buzz'){
          buzzIn();
        } else if(action === 'mark-correct'){
          withUndo('marking that answer correct', markCorrect);
        } else if(action === 'mark-wrong'){
          withUndo('marking that answer wrong', markWrong);
        } else if(action === 'next-stage'){
          withUndo('adding the next layer', nextStage);
        } else if(action === 'reveal-no-winner'){
          withUndo('revealing the answer', revealNoWinner);
        } else if(action === 'remove-player'){
          withUndo('removing a player', () => removePlayer(el.getAttribute('data-id')));
        } else if(action === 'reset-game'){
          withUndo('resetting the game', resetGame);
        } else if(action === 'adjust-score'){
          adjustScore(el.getAttribute('data-id'), parseInt(el.getAttribute('data-delta'), 10));
        } else if(action === 'edit-player'){
          const players = await getPlayers();
          const p = players.find(x => x.id === el.getAttribute('data-id'));
          if(p) openPlayerEditor(p);
        } else if(action === 'edit-pick-avatar'){
          const nameEl = document.getElementById('qb-edit-name');
          if(nameEl) editName = nameEl.value;
          editAvatar = el.getAttribute('data-avatar');
          renderAdmin();
        } else if(action === 'save-edit-player'){
          savePlayerEdit();
        } else if(action === 'cancel-edit-player'){
          closePlayerEditor();
        } else if(action === 'unlock-admin'){
          unlockAdmin();
        } else if(action === 'toggle-standings'){
          toggleStandings();
        } else if(action === 'undo'){
          undoLast();
        } else if(action === 'toggle-sound'){
          toggleSound();
        } else if(action === 'add-round'){
          openAddForm();
        } else if(action === 'edit-round'){
          readFormFromDOM();
          const rounds = await getRounds();
          const r = rounds.find(x => x.id === el.getAttribute('data-id'));
          if(r) openEditForm(r);
        } else if(action === 'delete-round'){
          deleteRound(el.getAttribute('data-id'));
        } else if(action === 'load-round'){
          withUndo('loading that round', () => loadRoundToPlay(el.getAttribute('data-id')));
        } else if(action === 'add-stage'){
          readFormFromDOM();
          addStageRow();
        } else if(action === 'remove-stage'){
          readFormFromDOM();
          removeStageRow(parseInt(el.getAttribute('data-idx'), 10));
        } else if(action === 'cancel-form'){
          closeForm();
        } else if(action === 'save-round'){
          saveRoundForm();
        }
      };
    });
  }

  render();
})();
</script>

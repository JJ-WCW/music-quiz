  function readFormFromDOM(){
    const labelEl = document.getElementById('qb-round-label');
    const songEl = document.getElementById('qb-round-song');
    const artistEl = document.getElementById('qb-round-artist');
    if(labelEl) formLabel = labelEl.value;
    if(songEl) formSong = songEl.value;
    if(artistEl) formArtist = artistEl.value;
    const wagerEl = document.getElementById('qb-round-wager');
    const clueEl = document.getElementById('qb-round-clue');
    const clueImgEl = document.getElementById('qb-round-clue-image');
    if(wagerEl) formWager = wagerEl.checked;
    if(clueEl) formClue = clueEl.value;
    if(clueImgEl) formClueImage = clueImgEl.value;
    const qEl = document.getElementById('qb-q-text');
    const imgEl = document.getElementById('qb-q-image');
    const qpEl = document.getElementById('qb-q-points');
    const qbEl = document.getElementById('qb-q-bonus');
    const taEl = document.getElementById('qb-text-correct');
    const sdEl = document.getElementById('qb-sd-answer');
    if(qEl) formQuestion = qEl.value;
    if(imgEl) formImage = imgEl.value;
    if(qpEl) formQPoints = Math.max(1, parseInt(qpEl.value, 10) || 1);
    if(qbEl) formQBonus = Math.max(0, parseInt(qbEl.value, 10) || 0);
    const qsEl = document.getElementById('qb-q-seconds');
    if(qsEl) formQSeconds = Math.min(120, Math.max(5, parseInt(qsEl.value, 10) || QUESTION_SECONDS));
    if(taEl) formTextAnswer = taEl.value;
    if(sdEl) formSDAnswer = sdEl.value;
    // slider fields: hosts type "2,000,000" as often as "2000000", so strip the
    // separators rather than bouncing them with a validation error
    const num = id => {
      const el = document.getElementById(id);
      if(!el) return null;
      const v = parseFloat(String(el.value).replace(/[,\s]/g, ''));
      return Number.isFinite(v) ? v : 0;
    };
    const sMin = num('qb-slider-min'); if(sMin !== null) formSliderMin = sMin;
    const sMax = num('qb-slider-max'); if(sMax !== null) formSliderMax = sMax;
    const sAns = num('qb-slider-answer'); if(sAns !== null) formSliderAnswer = sAns;
    const sStep = num('qb-slider-step'); if(sStep !== null) formSliderStep = Math.max(0, sStep);
    const sBand = num('qb-slider-band'); if(sBand !== null) formSliderBand = Math.max(0, sBand);
    const sUnitEl = document.getElementById('qb-slider-unit');
    if(sUnitEl) formSliderUnit = sUnitEl.value;
    document.querySelectorAll('.qb-q-answer').forEach((inp, i) => { if(i < 4) formAnswers[i] = inp.value; });
    const picked = document.querySelector('input[name="qb-q-correct"]:checked');
    if(picked) formCorrect = parseInt(picked.value, 10) || 0;
    document.querySelectorAll('.qb-stage-row').forEach((rowEl, idx) => {
      const labelInput = rowEl.querySelector('.qb-label-input');
      const pointsInput = rowEl.querySelector('.qb-points-input');
      if(formStages[idx]){
        formStages[idx].label = labelInput ? labelInput.value : formStages[idx].label;
        formStages[idx].points = pointsInput ? (parseInt(pointsInput.value,10) || 0) : formStages[idx].points;
      }
    });
  }

  async function saveRoundForm(){
    readFormFromDOM();
    // any question type (except sudden death) can be a wager round
    if(formType !== 'sudden' && formWager && !formClue.trim()){
      alert('Give the wager round a clue — that is what people bet on.');
      return;
    }
    const wagerBits = formType === 'sudden' ? {} : {
      isWager: formWager,
      wagerClue: formClue.trim(),
      wagerImage: formClueImage.trim()
    };
    let data;
    if(formType === 'question'){
      const q = formQuestion.trim();
      if(!q){ alert('Enter the question first.'); return; }
      if(formAnswers.some(a => !a.trim())){ alert('Fill in all four answers.'); return; }
      data = {
        type: 'question',
        question: q,
        imageUrl: formImage.trim(),
        answers: formAnswers.map(a => a.trim()),
        correctIndex: formCorrect,
        points: formQPoints,
        bonus: formQBonus,
        seconds: formQSeconds,
        ...wagerBits
      };
    } else if(formType === 'text'){
      const q = formQuestion.trim();
      if(!q){ alert('Enter the question first.'); return; }
      if(!formTextAnswer.trim()){ alert('Enter the answer you will accept.'); return; }
      data = {
        type: 'text',
        question: q,
        imageUrl: formImage.trim(),
        textAnswer: formTextAnswer.trim(),
        points: formQPoints,
        bonus: formQBonus,
        seconds: formQSeconds,
        ...wagerBits
      };
    } else if(formType === 'slider'){
      const q = formQuestion.trim();
      if(!q){ alert('Enter the question first.'); return; }
      if(!(formSliderMax > formSliderMin)){ alert('The slider maximum has to be bigger than the minimum.'); return; }
      if(formSliderAnswer < formSliderMin || formSliderAnswer > formSliderMax){
        alert('The correct answer has to sit inside the slider range, or nobody can reach it.');
        return;
      }
      data = {
        type: 'slider',
        question: q,
        imageUrl: formImage.trim(),
        sliderMin: formSliderMin,
        sliderMax: formSliderMax,
        sliderStep: formSliderStep,      // 0 means "work it out from the range"
        sliderAnswer: formSliderAnswer,
        sliderBand: formSliderBand,
        sliderUnit: formSliderUnit.trim(),
        points: formQPoints,
        bonus: formQBonus,
        seconds: formQSeconds,
        ...wagerBits
      };
    } else if(formType === 'sudden'){
      const q = formQuestion.trim();
      if(!q){ alert('Enter the sudden death question first.'); return; }
      if(!formSDAnswer.trim()){ alert('Enter the answer (only you will see it).'); return; }
      data = {
        type: 'sudden',
        question: q,
        answer: formSDAnswer.trim(),
        points: formQPoints
      };
    } else {
      const song = formSong.trim();
      if(!song){ alert('Enter the song title first.'); return; }
      if(formStages.some(s => !s.label.trim())){ alert('Give every layer a label, e.g. "Drums only".'); return; }
      data = {
        type: 'song',
        songTitle: song,
        artist: formArtist.trim(),
        stages: formStages.map(s => ({label:s.label.trim(), points:s.points})),
        ...wagerBits
      };
    }

    const lib = await getLibrary();
    if(formType === 'sudden'){
      if(formOpen === 'add'){
        lib.suddens.push({ id: makeId('r'), label: formLabel.trim() || `Sudden death ${lib.suddens.length + 1}`, ...data });
      } else {
        const existing = lib.suddens.find(r => r.id === formOpen);
        if(existing) Object.assign(existing, { label: formLabel.trim() || existing.label }, data);
      }
    } else {
      const g = lib.groups.find(x => x.id === formGroupId);
      if(!g){ alert('That round no longer exists — add the question again.'); formOpen = false; formGroupId = null; renderAdmin(); return; }
      if(formOpen === 'add'){
        g.questions.push({ id: makeId('r'), label: formLabel.trim() || `Question ${g.questions.length + 1}`, ...data });
      } else {
        const existing = g.questions.find(q => q.id === formOpen);
        if(existing) Object.assign(existing, { label: formLabel.trim() || existing.label }, data);
      }
    }
    await saveLibrary(lib);
    formOpen = false;
    formGroupId = null;
    renderAdmin();
  }

  async function loadRoundToPlay(id, gid){
    const lib = await getLibrary();
    let r = null, g = null, gi = -1, qi = -1;
    if(gid){
      gi = lib.groups.findIndex(x => x.id === gid);
      g = lib.groups[gi];
      if(g){
        qi = (g.questions || []).findIndex(q => q.id === id);
        r = g.questions[qi];
      }
    } else {
      r = lib.suddens.find(x => x.id === id);
    }
    if(!r) return false;
    const prev = await getGameState();
    // guard against the classic mis-click: nuking a question that is still live
    if(prev.status === 'live' && prev.roundId && prev.roundId !== id){
      if(!confirm(`"${prev.roundLabel || 'A round'}" still has a live question. Abandon it and load this one instead?`)) return false;
    }
    const s = defaultState();
    s.quizTitle = prev.quizTitle || null;      // survives round loads
    s.carryKitty = prev.carryKitty || 0;       // an unwon kitty follows the game until someone wins it
    s.roundId = r.id;
    if(g){
      // "General Knowledge · Question 2 of 5", plus "Round 1 of 3" for context
      s.roundLabel = g.name;
      s.roundNumber = qi + 1;
      s.roundTotal = g.questions.length;
      s.groupNumber = gi + 1;
      s.groupTotal = lib.groups.length;
    } else {
      // sudden deaths sit outside the running order: no numbering, and they
      // never count as "the final round" for the tie detection
      s.roundLabel = r.label;
      s.roundNumber = 0; s.roundTotal = 0;
      s.groupNumber = 0; s.groupTotal = 0;
    }
    s.status = 'live';
    if(r.type === 'question' || r.type === 'text' || r.type === 'slider'){
      // everyone answers on their phone against the clock, no lockout
      s.qMode = true;
      s.textMode = r.type === 'text';
      s.sliderMode = r.type === 'slider';
      // powerup plays key off this, NOT answerEpoch: it exists from the moment
      // the round loads, so powerups can be armed during the 3-2-1 countdown
      // before answerEpoch is minted. Fresh per load, so "Play again" is clean.
      s.puEpoch = makeId('u');
      s.question = r.question;
      s.qImage = r.imageUrl || null;
      s.qAnswers = r.type === 'question' ? (r.answers || []) : [];
      s.qCorrect = r.correctIndex || 0;
      s.textAnswer = r.textAnswer || '';
      if(s.sliderMode){
        s.sliderMin = Number(r.sliderMin) || 0;
        s.sliderMax = Number(r.sliderMax) || 0;
        s.sliderStep = sliderStepFor(r);   // resolved here so every view agrees on it
        s.sliderAnswer = Number(r.sliderAnswer) || 0;
        s.sliderBand = Number(r.sliderBand) || 0;
        s.sliderUnit = r.sliderUnit || '';
      }
      s.qPoints = r.points || 1;
      s.qBonus = Number.isInteger(r.bonus) ? r.bonus : 0;
      s.qSeconds = r.seconds || (r.type === 'text' ? TEXT_SECONDS : QUESTION_SECONDS);
      s.buzzEpoch = '';   // no buzzing on these rounds
      if(r.isWager){
        // betting first: only the clue shows; the question and its timer stay
        // hidden until the host closes the kitty (which mints answerEpoch)
        s.wagerActive = true;
        s.wagerPhase = 'betting';
        s.wagerClue = r.wagerClue || '';
        s.wagerImage = r.wagerImage || null;
        s.anteEpoch = makeId('a');
        s.answerEpoch = '';
      } else {
        // 3-2-1 first: adminTick mints the epoch and stamps the clock when it ends
        s.countdown = true;
        s.answerEpoch = '';
      }
    } else if(r.type === 'sudden'){
      // fastest finger: the question shows on the projector, normal buzz rules —
      // except when the top of the board is tied, in which case only the tied
      // players' buzzers work (that's what sudden death is for)
      s.suddenDeath = true;
      s.question = r.question;
      s.songTitle = r.answer;   // the reveal box reads songTitle
      s.artist = '';
      s.stages = [{ label: '⚡ Sudden death', points: r.points || 1 }];
      s.stageIndex = 0;
      s.buzzEpoch = makeId('e');
      const playersNow = await getPlayers();
      s.sdEligible = tiedLeaders(playersNow).map(p => p.id);
    } else {
      s.songTitle = r.songTitle;
      s.artist = r.artist;
      s.stages = r.stages;
      s.stageIndex = 0;
      if(r.isWager){
        // betting phase first: the clue goes up and buzzers stay shut
        s.wagerActive = true;
        s.wagerPhase = 'betting';
        s.wagerClue = r.wagerClue || '';
        s.wagerImage = r.wagerImage || null;
        s.anteEpoch = makeId('a');
        s.buzzEpoch = '';
      } else {
        s.buzzEpoch = makeId('e');
      }
    }
    await saveGameState(s);
    // stamp the clock so buzz/answer times are exact server-time maths
    if(s.buzzEpoch || s.answerEpoch) await stampBuzzersOpened();
    // mark it played in the library (visual cue only, it stays loadable)
    if(!r.played){ r.played = true; await saveLibrary(lib); }
    renderAdmin();
  }

  // host closes betting: bets are deducted from scores now (single writer, no
  // race), locked into the state, and the song starts for everyone
  async function closeBetting(){
    const s = await getGameState();
    if(!s.wagerActive || s.wagerPhase !== 'betting') return false;
    const bets = await fetchAntes(s.anteEpoch);
    const betMap = {};
    await withPlayers(players => {
      Object.values(bets).forEach(b => {
        if(!b || !b.id) return;
        const p = players.find(pl => pl.id === b.id);
        if(!p) return;
        const staked = Math.max(0, Math.min(b.amount || 0, MAX_BET)); // cap, but scores may go negative
        if(!staked) return;
        p.score = (p.score || 0) - staked;
        betMap[b.id] = staked;
      });
    });
    s.bets = betMap;
    s.wagerPhase = 'playing';
    // song wagers open the buzzers; question/text wagers run the 3-2-1 first and
    // adminTick starts their answer window at the end of it
    if(s.qMode){ s.countdown = true; s.answerEpoch = ''; }
    else s.buzzEpoch = makeId('e');
    await saveGameState(s);
    if(!s.qMode) await stampBuzzersOpened();
    renderAdmin();
  }

  // the 3-2-1 has finished: open the question for real. Single writer (host tab),
  // and it re-reads state so a host who moved on mid-countdown isn't overridden.
  async function startCountedQuestion(roundId){
    const s = await getGameState();
    if(!s.countdown || s.roundId !== roundId || s.status !== 'live') return false;
    s.countdown = false;
    s.answerEpoch = makeId('q');
    await saveGameState(s);
    await stampBuzzersOpened();   // the answer window starts now, in server time
    renderAdmin();
  }

  async function nextStage(){
    const s = await getGameState();
    if(s.stageIndex >= s.stages.length - 1) return false;
    const oldEpoch = s.buzzEpoch;
    s.stageIndex += 1;
    // lockedOut is left as is on purpose: one guess per round, not per layer
    s.status = 'live';
    s.buzzEpoch = makeId('e');
    await saveGameState(s);
    await stampBuzzersOpened();
    clearBuzzes(oldEpoch);
    renderAdmin();
  }

  async function revealNoWinner(){
    const s = await getGameState();
    if(s.status === 'reveal') return false;
    s.status = 'reveal';
    s.winnerId = null; s.winnerName = null; s.winnerAvatar = null; s.pointsAwarded = null;
    // nobody won it, so the whole pot rolls into the next wager round rather
    // than evaporating (stakes were already deducted at close-betting)
    if(s.wagerActive) rollKittyOver(s);
    await saveGameState(s);
    scheduleEndOfRoundStandings(s);
    renderAdmin();
  }

  // After the LAST question of a round resolves, give the room a breather: let
  // the reveal sit for a few seconds, then bring the standings up automatically
  // with an "end of round" note. Skipped if the host has already moved on.
  function scheduleEndOfRoundStandings(s){
    if(!s.roundTotal || s.roundNumber !== s.roundTotal || s.suddenDeath) return;
    const endedId = s.roundId;
    const note = { name: s.roundLabel || '', number: s.groupNumber || 0, total: s.groupTotal || 0 };
    setTimeout(async () => {
      const cur = await getGameState();
      if(cur.roundId !== endedId || cur.status !== 'reveal') return;
      if(cur.showStandings || cur.showPodium || cur.showLobby || cur.showRoundIntro) return;
      cur.showStandings = true;
      cur.endOfRound = note;
      await saveGameState(cur);
      renderAdmin();
    }, 8000);
  }

  // a resolved buzz feeds the reaction-time stats shown on the buzz flash and podium
  function recordReaction(p, buzz, s){
    if(!p || !buzz || !buzz.ts || !s.buzzersOpenedAt) return;
    const r = buzz.ts - s.buzzersOpenedAt;
    if(r <= 0 || r > 120000) return;
    p.buzzes = (p.buzzes || 0) + 1;
    if(!p.bestReaction || r < p.bestReaction) p.bestReaction = r;
  }

  // hand earned powerup picks over: phones only write their wish to qb-pupick;
  // this (the host tab, sole owner of qb-players) banks it and clears the key.
  // Invalid or stale picks are deleted without effect.
  // Reads the phones' claim wishes, then banks them inside the players queue so
  // a question being scored at the same moment can't overwrite the result.
  async function foldPuPicks(){
    let picks = {};
    try{
      const res = await fetch(puPickUrl(), { cache:'no-store' });
      picks = res.ok ? ((await res.json()) || {}) : {};
    }catch(e){ return false; }
    if(!Object.keys(picks).length) return false;   // nothing asked for: skip the queue entirely
    return withPlayers(players => {
      let changed = false;
      for(const [pid, pick] of Object.entries(picks)){
        const p = players.find(x => x.id === pid);
        if(p && pick && POWERUPS[pick.type] && !POWERUPS[pick.type].granted
            && puPending(p) > 0 && puList(p).length < PU_MAX_SLOTS){
          p.pu = puList(p).concat(pick.type);
          p.puOwed = Math.max(0, (p.puOwed || 0) - 1);
          changed = true;
        }
        try{ fetch(puPickUrl(pid), { method:'DELETE' }); }catch(e){}
      }
      return changed;
    });
  }

  async function markCorrect(half){
    const s = await getGameState();
    const buzz = s.status === 'live' ? earliestBuzz(await fetchBuzzes(s.buzzEpoch), s.lockedOut) : null;
    if(!buzz) return false;
    const stage = s.stages[s.stageIndex];
    let points = stage ? stage.points : 0;
    if(half) points = Math.ceil(points / 2);
    // wager rounds are winner-takes-all, but only for someone who staked: the
    // winner scoops every stake plus anything rolled over from an unwon wager.
    // A lone bet is house-matched. A non-bettor winning leaves the pot to roll.
    const wonKitty = s.wagerActive && stakedIn(s, buzz.id);
    const matched = wonKitty ? loneBetBonus(s, buzz.id) : 0;
    const kitty = wonKitty ? kittyTotal(s) + matched : 0;
    await withPlayers(players => {
      const p = players.find(pl => pl.id === buzz.id);
      if(p){
        p.score = (p.score || 0) + points + kitty;
        recordReaction(p, buzz, s);
      }
      refreshPuEarned(players);   // song-round winnings climb the powerup rungs too
    });

    s.status = 'reveal';
    s.winnerId = buzz.id;
    s.winnerName = buzz.name;
    s.winnerAvatar = buzz.avatar;
    s.pointsAwarded = points;
    s.betWon = kitty;
    s.betMatched = matched;
    if(s.wagerActive){
      if(wonKitty){
        s.betsLost = 0; s.kittyRolled = 0; s.carryKitty = 0;  // the pot's been claimed, nothing carries on
        s.wagerActive = false;
      } else {
        rollKittyOver(s);   // right answer, but they hadn't staked — the pot lives on
      }
    }
    await saveGameState(s);
    scheduleEndOfRoundStandings(s);
    renderAdmin();
  }

  // nobody won the wager: bank the whole pot (this round's stakes plus anything
  // already carried) so it re-appears, bigger, on the next wager round
  function rollKittyOver(s){
    const total = kittyTotal(s);
    s.betsLost = total;
    s.kittyRolled = total;
    s.carryKitty = total;
    s.betWon = 0;
    s.betMatched = 0;
    s.wagerActive = false;
  }
  // wager question rounds: the best correct answer *that staked* takes the whole
  // kitty (rightOnes arrives already ranked). If nobody who bet got it right —
  // including when only non-bettors did — the pot rolls over to the next wager.
  function settleKitty(s, rightOnes, players){
    if(!s.wagerActive) return;
    // the pot goes to the best-placed player who actually staked; everyone else
    // getting the question right just takes the normal points
    const eligible = rightOnes.filter(r => stakedIn(s, r.id));
    if(eligible.length){
      const w = eligible[0];
      // a lone bet is house-matched: winning your own solo stake back would
      // otherwise be a net nothing (see loneBetBonus)
      const matched = loneBetBonus(s, w.id);
      const kitty = kittyTotal(s) + matched;
      if(kitty){
        w.kitty = kitty;
        const p = players.find(pl => pl.id === w.id);
        if(p) p.score = (p.score || 0) + kitty;
        s.betWon = kitty;
        s.betMatched = matched;
        s.kittyWinnerName = w.name || '';
      }
      s.carryKitty = 0;
      s.kittyRolled = 0;
      s.wagerActive = false;
    } else {
      rollKittyOver(s);
    }
  }

  // ---------- powerup resolution ----------
  // Runs inside scoring, host tab only, AFTER the normal points are settled so
  // "what you won" already includes any fastest/bullseye bonus:
  //   auto   — scored nothing? the base points are granted (never the bonus).
  //            Scored anyway? wasted. Either way the slot is spent.
  //   double — whatever you won on the question is added again (kitty excluded).
  //            Won nothing = burned for nothing: that's the gamble.
  //   bomb   — fires only if the bomber scored; the victim just loses 10, so a
  //            victim who got the question right nets (their winnings − 10).
  //   carpet — fires only if the bomber scored; −5 off every rival at once.
  //   virus  — fires only if the infector scored; −3 now, then −3 on every
  //            question until the victim answers one correctly and is cured.
  //   oil / fifty — no scoring effect, recorded for the reveal's storytelling.
  // A play of a type you don't hold is ignored; every real play consumes its
  // slot win or lose. Earned picks refresh here too, after the dust settles.
  async function applyPowerups(s, results, players){
    s.puEvents = [];
    // Standing infections bite FIRST, before any new ones land, so a player
    // infected this question takes the one hit rather than two. Answering
    // correctly is the cure, and cures instead of docking.
    players.forEach(p => {
      if(!p.virus) return;
      const r = results.find(x => x.id === p.id);
      if(r && r.correct){
        s.puEvents.push({ type:'cured', target: p.id, targetName: p.name || '', targetAvatar: p.avatar || '' });
        delete p.virus;
      } else {
        p.score = (p.score || 0) - VIRUS_DAMAGE;
        if(r) r.virusDelta = (r.virusDelta || 0) - VIRUS_DAMAGE;
        s.puEvents.push({ type:'tick', target: p.id, targetName: p.name || '', targetAvatar: p.avatar || '',
                          damage: VIRUS_DAMAGE, fromName: (p.virus && p.virus.byName) || '' });
      }
    });
    if(s.puEpoch){
      const plays = await fetchPowers(s.puEpoch);
      // nukes resolve LAST: they zero out everything the other powerups may
      // have granted, so ordering must not depend on Firebase's key order
      const ordered = Object.values(plays).sort((a, b) =>
        ((a && a.type === 'nuke') ? 1 : 0) - ((b && b.type === 'nuke') ? 1 : 0));
      ordered.forEach(pw => {
        if(!pw || !pw.id || !POWERUPS[pw.type]) return;
        const p = players.find(pl => pl.id === pw.id);
        if(!p) return;
        // the nuke is held on its own field, one per game; everything else
        // comes out of the 3 slots. Either way it's spent win or lose.
        if(POWERUPS[pw.type].granted){
          if(!hasNuke(p)) return;          // already used their one shot
          p.nuke = false;
        } else {
          const held = puList(p);
          const ix = held.indexOf(pw.type);
          if(ix < 0) return;               // playing a powerup you don't own does nothing
          held.splice(ix, 1);
          p.pu = held;
        }
        const r = results.find(x => x.id === pw.id);
        const ev = { type: pw.type, from: pw.id, fromName: pw.name || '', fromAvatar: pw.avatar || '',
                     target: pw.target || null, targetName: pw.targetName || '', targetAvatar: pw.targetAvatar || '' };
        if(pw.type === 'auto'){
          if(r && !(r.won > 0)){
            r.won = s.qPoints || 0;
            r.auto = true;
            r.answered = true;             // the reveal lists them with the answerers
            p.score = (p.score || 0) + r.won;
            ev.fired = true; ev.points = r.won;
          } else {
            if(r) r.auto = true;
            ev.fired = false;              // they scored on their own — powerup wasted
          }
        } else if(pw.type === 'double'){
          if(r && r.won > 0){
            p.score = (p.score || 0) + r.won;   // the same again = doubled
            ev.fired = true; ev.points = r.won;
            r.won *= 2;
            r.double = true;
          } else {
            ev.fired = false;
          }
        } else if(pw.type === 'bomb'){
          const tr = results.find(x => x.id === pw.target);
          const tp = players.find(pl => pl.id === pw.target);
          ev.fired = !!(r && r.correct && tp);
          if(ev.fired){
            tp.score = (tp.score || 0) - BOMB_DAMAGE;
            ev.damage = BOMB_DAMAGE;
            ev.targetWon = (tr && tr.won) || 0;          // spelled out at the reveal
            ev.targetNet = ev.targetWon - BOMB_DAMAGE;   // so there are no arguments
            if(tr){ tr.bombedBy = pw.name || 'Someone'; tr.bombDamage = BOMB_DAMAGE; }
          }
        } else if(pw.type === 'carpet'){
          // no aiming: everyone but the bomber takes it, and only if they scored
          ev.fired = !!(r && r.correct);
          if(ev.fired){
            ev.damage = CARPET_DAMAGE;
            ev.hits = [];
            players.forEach(pl => {
              if(pl.id === pw.id) return;              // the bomber flies above the blast
              pl.score = (pl.score || 0) - CARPET_DAMAGE;
              ev.hits.push({ id: pl.id, name: pl.name, avatar: pl.avatar });
              const xr = results.find(x => x.id === pl.id);
              if(xr) xr.carpetDelta = (xr.carpetDelta || 0) - CARPET_DAMAGE;
            });
          }
        } else if(pw.type === 'virus'){
          const tp = players.find(pl => pl.id === pw.target);
          ev.fired = !!(r && r.correct && tp);
          if(ev.fired){
            // the infection sticks to the player record and bites again every
            // question (top of applyPowerups) until they answer one correctly
            tp.virus = { by: pw.id, byName: pw.name || '' };
            tp.score = (tp.score || 0) - VIRUS_DAMAGE;
            ev.damage = VIRUS_DAMAGE;
            const tr = results.find(x => x.id === pw.target);
            if(tr) tr.virusDelta = (tr.virusDelta || 0) - VIRUS_DAMAGE;
          }
        } else if(pw.type === 'nuke'){
          // −20 to everyone else, −10 to the nuker, and NOBODY keeps what they
          // won on this question — but only if the nuker answered correctly
          ev.fired = !!(r && r.correct);
          if(ev.fired){
            ev.damage = NUKE_DAMAGE;
            ev.selfCost = NUKE_SELF_COST;
            // claw back every winning already paid out (incl. auto/double grants)
            results.forEach(x => {
              if(x.won > 0){
                const xp = players.find(pl => pl.id === x.id);
                if(xp) xp.score = (xp.score || 0) - x.won;
              }
              x.won = 0;
              x.fastest = false;
            });
            // any bomb that already spelled out its victim's maths now lies —
            // the victim's winnings just went to zero, so restate it
            s.puEvents.forEach(be => {
              if(be.type === 'bomb' && be.fired){ be.targetWon = 0; be.targetNet = -be.damage; }
            });
            ev.hits = [];
            players.forEach(pl => {
              if(pl.id === pw.id){
                pl.score = (pl.score || 0) - NUKE_SELF_COST;
              } else {
                pl.score = (pl.score || 0) - NUKE_DAMAGE;
                ev.hits.push({ id: pl.id, name: pl.name, avatar: pl.avatar });
                const xr = results.find(x => x.id === pl.id);
                if(xr) xr.nukeDelta = -NUKE_DAMAGE;
              }
            });
            const nr = results.find(x => x.id === pw.id);
            if(nr) nr.nukeDelta = -NUKE_SELF_COST;
          }
        } else {
          ev.fired = true;   // oil / fifty: flavour only
          if(pw.type === 'fifty' && r) r.fifty = true;
        }
        s.puEvents.push(ev);
      });
    }
    refreshPuEarned(players);   // rungs climbed this question earn their picks now
  }

  // ---------- question round scoring ----------
  // runs once, on the host's tab only (single writer): collects the answers,
  // scores everyone, hands the fastest-correct bonus out, and flips to reveal
  async function scoreQuestion(acceptAll){
    const s = await getGameState();
    if(!s.qMode || s.status !== 'live') return false;
    // typed-answer rounds go through host review instead of blind auto-scoring
    if(s.textMode) return startTextReview(acceptAll);
    // slider rounds are pure numbers, so they score themselves
    if(s.sliderMode) return scoreSlider(s, acceptAll);
    const raw = await fetchAnswers(s.answerEpoch);
    // answers are only valid inside the window, measured in pure server time
    const cutoff = (s.buzzersOpenedAt || 0) + (s.qSeconds || QUESTION_SECONDS) * 1000 + 600; // small grace for network lag
    const valid = {};
    Object.values(raw).forEach(a => {
      if(!a || !a.id || !Number.isInteger(a.choice)) return;
      if(!acceptAll && s.buzzersOpenedAt && a.ts && a.ts > cutoff) return;
      valid[a.id] = a;
    });
    // read → score → write is one critical section, so a powerup fold landing
    // mid-scoring can't be overwritten (and can't overwrite these scores)
    let results = [];
    await withPlayers(async (players) => {
      results = players.map(p => {
        const a = valid[p.id];
        if(!a) return { id: p.id, name: p.name, avatar: p.avatar, answered: false };
        const ms = (s.buzzersOpenedAt && a.ts && a.ts > s.buzzersOpenedAt) ? a.ts - s.buzzersOpenedAt : null;
        return { id: p.id, name: p.name, avatar: p.avatar, answered: true, choice: a.choice, correct: a.choice === s.qCorrect, ms };
      });
      const rightOnes = results.filter(r => r.correct).sort((a, b) => (a.ms || 9e9) - (b.ms || 9e9));
      rightOnes.forEach((r, i) => {
        let won = s.qPoints || 0;
        if(i === 0 && rightOnes.length){ r.fastest = true; won += s.qBonus || 0; }
        r.won = won;
        const p = players.find(pl => pl.id === r.id);
        if(p) p.score = (p.score || 0) + won;
      });
      settleKitty(s, rightOnes, players);
      await applyPowerups(s, results, players);
    });
    s.qResults = results;
    s.status = 'reveal';
    await saveGameState(s);
    scheduleEndOfRoundStandings(s);
    renderAdmin();
  }

  // ---------- slider round scoring ----------
  // Nearest guess wins it, and ties genuinely share rather than racing: two
  // people equally close both get the points. A "close enough" band (optional,
  // per question) lets everyone inside it score too — that's what makes a huge
  // range like PS2 sales winnable, while leaving "guess the year" cut-throat.
  // Getting as close as the slider physically allows is a bullseye and takes the
  // bonus. The kitty still goes to one person: the closest, fastest deciding it.
  async function scoreSlider(s, acceptAll){
    const raw = await fetchAnswers(s.answerEpoch);
    const cutoff = (s.buzzersOpenedAt || 0) + (s.qSeconds || QUESTION_SECONDS) * 1000 + 600; // small grace for network lag
    const valid = {};
    Object.values(raw).forEach(a => {
      if(!a || !a.id || !Number.isFinite(a.value)) return;
      if(!acceptAll && s.buzzersOpenedAt && a.ts && a.ts > cutoff) return;
      valid[a.id] = a;
    });
    let results = [];
    await withPlayers(async (players) => {
      results = players.map(p => {
        const a = valid[p.id];
        if(!a) return { id: p.id, name: p.name, avatar: p.avatar, answered: false };
        return {
          id: p.id, name: p.name, avatar: p.avatar, answered: true,
          value: a.value, text: fmtGuess(a.value, s.sliderUnit, groupNums(s.sliderMax)),
          dist: Math.abs(a.value - s.sliderAnswer),
          ms: (s.buzzersOpenedAt && a.ts && a.ts > s.buzzersOpenedAt) ? a.ts - s.buzzersOpenedAt : null
        };
      });
      const guesses = results.filter(r => r.answered);
      if(guesses.length){
        const best = Math.min(...guesses.map(r => r.dist));
        const band = Number(s.sliderBand) || 0;
        guesses.forEach(r => {
          r.correct = r.dist === best || (band > 0 && r.dist <= band);
          if(!r.correct) return;
          r.bullseye = isBullseye(r.dist, s.sliderStep);
          r.won = (s.qPoints || 0) + (r.bullseye ? (s.qBonus || 0) : 0);
          const p = players.find(pl => pl.id === r.id);
          if(p) p.score = (p.score || 0) + r.won;
        });
      }
      // closest first, and the quicker thumb breaks a dead heat for the kitty
      const rightOnes = guesses.filter(r => r.correct).sort((a, b) => (a.dist - b.dist) || ((a.ms || 9e9) - (b.ms || 9e9)));
      settleKitty(s, rightOnes, players);
      await applyPowerups(s, results, players);
    });
    s.qResults = results;
    s.status = 'reveal';
    await saveGameState(s);
    scheduleEndOfRoundStandings(s);
    renderAdmin();
  }

  // ---------- text round: normalize, host review, score ----------
  // typos shouldn't start arguments: answers are compared with case, spaces,
  // accents and punctuation ignored, then the host gets the final say on each
  function normalizeAnswer(t){
    return String(t || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
  }
  // Levenshtein edit distance, so near-misses ("aniston" vs "annistonn") can be
  // pre-approved instead of the host ticking every typo by hand
  function editDistance(a, b){
    if(a === b) return 0;
    if(!a.length) return b.length;
    if(!b.length) return a.length;
    let prev = Array.from({length: b.length + 1}, (_, i) => i);
    for(let i = 1; i <= a.length; i++){
      const cur = [i];
      for(let j = 1; j <= b.length; j++){
        cur[j] = a[i-1] === b[j-1] ? prev[j-1] : 1 + Math.min(prev[j-1], prev[j], cur[j-1]);
      }
      prev = cur;
    }
    return prev[b.length];
  }
  // how many typos to forgive automatically, scaled to the answer's length
  function fuzzyTolerance(len){
    if(len <= 3) return 0;
    if(len <= 5) return 1;
    if(len <= 9) return 2;
    return 3;
  }
  let reviewMarks = null;   // the host's per-player verdicts while reviewing (admin tab only)

  async function startTextReview(acceptAll){
    const s = await getGameState();
    if(!s.qMode || !s.textMode || s.status !== 'live' || s.reviewing) return false;
    const raw = await fetchAnswers(s.answerEpoch);
    const cutoff = (s.buzzersOpenedAt || 0) + (s.qSeconds || TEXT_SECONDS) * 1000 + 600;
    const want = normalizeAnswer(s.textAnswer);
    const tol = fuzzyTolerance(want.length);
    const pending = [];
    Object.values(raw).forEach(a => {
      if(!a || !a.id || typeof a.text !== 'string') return;
      if(!acceptAll && s.buzzersOpenedAt && a.ts && a.ts > cutoff) return;
      const got = normalizeAnswer(a.text);
      const dist = want ? editDistance(got, want) : 99;
      pending.push({
        id: a.id, name: a.name || '', avatar: a.avatar || '', text: a.text,
        ms: (s.buzzersOpenedAt && a.ts && a.ts > s.buzzersOpenedAt) ? a.ts - s.buzzersOpenedAt : null,
        // exact match, or close enough that it's almost certainly a typo
        auto: !!want && dist <= tol,
        exact: !!want && dist === 0,
        dist
      });
    });
    pending.sort((a, b) => (a.ms || 9e9) - (b.ms || 9e9));
    s.pendingAnswers = pending;
    s.reviewing = true;
    await saveGameState(s);
    reviewMarks = {};
    pending.forEach(p => { reviewMarks[p.id] = p.auto; });
    renderAdmin();
  }

  async function confirmTextScores(){
    const s = await getGameState();
    if(!s.qMode || !s.textMode || !s.reviewing) return false;
    const pending = s.pendingAnswers || [];
    const marks = reviewMarks || {};
    let results = [];
    await withPlayers(async (players) => {
      results = players.map(p => {
        const a = pending.find(x => x.id === p.id);
        if(!a) return { id: p.id, name: p.name, avatar: p.avatar, answered: false };
        return { id: p.id, name: p.name, avatar: p.avatar, answered: true, text: a.text, correct: !!marks[a.id], ms: a.ms };
      });
      const rightOnes = results.filter(r => r.correct).sort((a, b) => (a.ms || 9e9) - (b.ms || 9e9));
      rightOnes.forEach((r, i) => {
        let won = s.qPoints || 0;
        if(i === 0){ r.fastest = true; won += s.qBonus || 0; }
        r.won = won;
        const p = players.find(pl => pl.id === r.id);
        if(p) p.score = (p.score || 0) + won;
      });
      settleKitty(s, rightOnes, players);
      await applyPowerups(s, results, players);
    });
    s.qResults = results;
    s.reviewing = false;
    s.status = 'reveal';
    await saveGameState(s);
    scheduleEndOfRoundStandings(s);
    reviewMarks = null;
    renderAdmin();
  }

  async function markWrong(){
    const s = await getGameState();
    const buzz = s.status === 'live' ? earliestBuzz(await fetchBuzzes(s.buzzEpoch), s.lockedOut) : null;
    if(!buzz) return false;
    await withPlayers(players => {
      const p = players.find(pl => pl.id === buzz.id);
      if(p) recordReaction(p, buzz, s);
    });
    s.lockedOut = s.lockedOut || [];
    if(!s.lockedOut.includes(buzz.id)) s.lockedOut.push(buzz.id);
    s.status = 'live';
    s.buzzEpoch = makeId('e'); // reopen the buzzers under a fresh epoch
    await saveGameState(s);
    await stampBuzzersOpened();
    renderAdmin();
  }

  async function removePlayer(id){
    const players = await getPlayers();
    const p = players.find(x => x.id === id);
    if(!confirm(`Remove ${p ? p.name : 'this player'} from the game? Their score goes with them.`)) return false;
    // splice in place: withPlayers saves the array it handed out
    await withPlayers(list => {
      const i = list.findIndex(x => x.id === id);
      if(i >= 0) list.splice(i, 1);
    });
    renderAdmin();
  }

  async function resetGame(){
    if(!confirm('Reset all scores and end the current round? Your round library stays intact.')) return false;
    await withPlayers(players => {
      players.forEach(p => {
        p.score = 0; delete p.bestReaction; delete p.buzzes;
        // powerups back to the sign-up picks, rungs back to zero
        if(Array.isArray(p.puChosen)) p.pu = p.puChosen.slice(0, PU_MAX_SLOTS);
        p.puOwed = 0; p.puFloor = 0; p.puLadder = PU_EVERY;
        p.nuke = true;   // a fresh night reissues everyone's one-shot nuke
        delete p.virus;  // and cures any standing infections
      });
    });
    try{ fetch(puPickUrl(), { method:'DELETE' }); }catch(e){}   // no stale claim wishes
    const fresh = defaultState();
    fresh.quizTitle = (await getGameState()).quizTitle || null; // a reset keeps the quiz name
    await saveGameState(fresh);
    // fresh night, fresh library: clear the "played" ticks too
    const lib = await getLibrary();
    lib.groups.forEach(g => (g.questions || []).forEach(q => { delete q.played; }));
    lib.suddens.forEach(r => { delete r.played; });
    await saveLibrary(lib);
    renderAdmin();
  }

  async function startNewSession(){
    if(!backendConfigured()){
      alert('The database URL has not been set up yet. Open this file and paste your Firebase database URL into FIREBASE_DB_URL.');
      return;
    }
    const passEl = document.getElementById('qb-admin-pass');
    const pass = passEl ? passEl.value.trim() : '';
    if(!pass){
      alert('Set an admin password first. It keeps players out of this host screen if they fiddle with the link.');
      return;
    }
    // optional custom game code: lowercase letters and digits only, 4+ chars,
    // and it must not already be someone's game
    const customEl = document.getElementById('qb-new-code');
    let custom = customEl ? customEl.value.toLowerCase().replace(/[^a-z0-9]/g, '') : '';
    if(customEl && customEl.value.trim() && !custom){
      alert('Game codes can only use letters and numbers.');
      return;
    }
    if(custom && custom.length < 4){
      alert('Make the game code at least 4 characters, so it is not too easy to guess.');
      return;
    }
    const btn = document.getElementById('qb-start-session-btn');
    if(btn){ btn.disabled = true; btn.textContent = 'Starting…'; }
    if(custom){
      try{
        const res = await fetch(FIREBASE_DB_URL.replace(/\/+$/, '') + '/games/' + encodeURIComponent(custom) + '.json?shallow=true', { cache:'no-store' });
        if(res.ok && await res.json() !== null){
          alert(`"${custom}" is already in use. Pick another code, or load it from the "Continue an existing game" section.`);
          if(btn){ btn.disabled = false; btn.textContent = 'Start new game'; }
          return;
        }
      }catch(e){ /* if the check itself fails, the seeding write below will surface the problem */ }
    }
    bucket = custom || makeGameCode();
    // writing the initial state both seeds the game and confirms the backend is reachable
    const ok = await kvSet('qb-state', JSON.stringify(defaultState()));
    if(!ok){
      bucket = null;
      alert("Couldn't start a session, check your connection and try again.");
      renderAdmin();
      return;
    }
    await kvSet('qb-admin', JSON.stringify(await sha256Hex(pass)));
    try{ localStorage.setItem('qb-adminpass:' + bucket, pass); }catch(e){}
    adminUnlocked = true;
    view = 'admin';
    updateUrlBar();
    renderAdmin();
  }

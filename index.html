      const value = myAnswer && Number.isFinite(myAnswer.value) ? myAnswer.value : mid;
      centreHTML = `
        <div class="qb-buzzer-wrap" style="gap:12px;">
          <div class="qb-status-line" style="font-size:17px;">${esc(state.question || '')}</div>
          ${qCountdownHTML}
          ${qImageHTML}
          ${kittyNoteHTML}
          <div class="qb-slider-readout" id="qb-slider-val">${esc(fmtGuess(value, state.sliderUnit, groupNums(state.sliderMax)))}</div>
          <input class="qb-slider" id="qb-slider" type="range"
            min="${state.sliderMin}" max="${state.sliderMax}" step="${step}" value="${value}" />
          <div class="qb-slider-ends">
            <span>${esc(fmtNum(state.sliderMin, groupNums(state.sliderMax)))}</span>
            <span>${esc(fmtNum(state.sliderMax, groupNums(state.sliderMax)))}</span>
          </div>
          ${myAnswer ? `
            <div class="qb-status-sub">Guess locked in &mdash; <span id="qb-p-answered">${answeredCount} guessed so far</span>. You can still slide and re-lock until time's up.</div>
          ` : `
            <div class="qb-status-sub">Slide to your guess, then lock it in. Closest guess wins &mdash; nail it exactly for a bonus 🎯</div>
          `}
          <button class="qb-btn qb-btn-gold" data-action="answer-slider" style="max-width:340px;">${myAnswer ? 'Change my guess' : 'Lock it in'}</button>
        </div>
      `;
    } else if(answering && state.textMode){
      centreHTML = `
        <div class="qb-buzzer-wrap" style="gap:12px;">
          <div class="qb-status-line" style="font-size:17px;">${esc(state.question || '')}</div>
          ${qCountdownHTML}
          ${qImageHTML}
          ${kittyNoteHTML}
          ${myAnswer ? `
            <div class="qb-status-sub">You put: <strong>&ldquo;${esc(myAnswer.text || '')}&rdquo;</strong> &middot; <span id="qb-p-answered">${answeredCount} answered so far</span></div>
          ` : `
            <div class="qb-status-sub">Type your answer &mdash; spelling doesn't have to be perfect, the host has the final say.</div>
          `}
          <input class="qb-input" id="qb-text-answer" maxlength="60" placeholder="Your answer" autocomplete="off" style="text-align:center;max-width:340px;" />
          <button class="qb-btn qb-btn-gold" data-action="answer-text" style="max-width:340px;">${myAnswer ? 'Change my answer' : 'Lock it in'}</button>
        </div>
      `;
    } else if(answering){
      // a played 50/50 withers two wrong answers away on this phone only
      const cuts = (myPlay && myPlay.type === 'fifty') ? fiftyCuts(state, myPlayerId) : [];
      centreHTML = `
        <div class="qb-buzzer-wrap" style="gap:12px;">
          <div class="qb-status-line" style="font-size:17px;">${esc(state.question || '')}</div>
          ${qCountdownHTML}
          ${qImageHTML}
          ${kittyNoteHTML}
          ${myAnswer ? `
            <div class="qb-status-sub">Answer locked in &mdash; watch the screen! <span id="qb-p-answered">${answeredCount} answered so far.</span></div>
          ` : cuts.length ? `
            <div class="qb-status-sub">✂️ 50/50 played &mdash; two wrong answers are gone. Coin flip time!</div>
          ` : `
            <div class="qb-status-sub">Tap the colour that matches the right answer on the screen &mdash; fast!</div>
          `}
          <div class="qb-answer-grid phone" style="width:100%;">
            ${(state.qAnswers || []).map((a, i) => `
              <button class="qb-answer-sq ${myAnswer && myAnswer.choice === i ? 'chosen' : ''} ${cuts.includes(i) ? 'cut' : ''}" style="background:${ANSWER_COLORS[i]};"
                data-action="answer-choice" data-choice="${i}" ${myAnswer || cuts.includes(i) ? 'disabled' : ''}>
                <span class="shape">${ANSWER_SHAPES[i]}</span> ${esc(a)}
              </button>
            `).join('')}
          </div>
        </div>
      `;
    } else {
      centreHTML = `
        <div class="qb-buzzer-wrap">
          ${stagePill}
          <button class="qb-buzzer" data-action="buzz" ${buzzerDisabled ? 'disabled' : ''}>BUZZ</button>
          ${buzzCountdownHTML}
          <div class="qb-status-line">${statusLine}</div>
          <div class="qb-status-sub">${statusSub}</div>
        </div>
      `;
    }

    // ----- the powerup tray: always on show so players see their bank -----
    const myPu = puList(me);
    const rivals = players.filter(p => p.id !== myPlayerId);
    let trayHTML = '';
    if(me){
      if(puArming && puLive && !myPlay){
        // aiming: pick a victim (bomb / oil slick)
        trayHTML = `
          <div class="qb-pu-target">
            <div class="qb-pu-note">${POWERUPS[puArming.type].icon} <strong>${POWERUPS[puArming.type].name}</strong> &mdash; on who?</div>
            ${rivals.map(p => `<button data-action="pu-target" data-type="${puArming.type}" data-target="${p.id}">${p.avatar} ${esc(p.name)} &middot; ${p.score} pts</button>`).join('')}
            <button class="qb-btn qb-btn-ghost qb-btn-small" data-action="pu-cancel">Never mind</button>
          </div>
        `;
      } else {
        const slotBtn = (t, i) => {
          const d = POWERUPS[t];
          const needsRival = (d.target === 'player' || d.target === 'all') && !rivals.length;
          const offType = t === 'fifty' && (state.textMode || state.sliderMode || !(state.qAnswers || []).length);
          const usable = puLive && !myPlay && !needsRival && !offType;
          const why = !puLive ? '' : myPlay ? '' : offType ? '50/50 only works on multiple choice' : needsRival ? 'needs another player' : '';
          return `<button class="qb-pu-btn ${myPlay && myPlay.type === t && i === myPu.indexOf(t) ? 'played' : ''}" data-action="play-pu" data-type="${t}"
            ${usable ? '' : 'disabled'} title="${esc(d.name + (why ? ' — ' + why : ''))}">${d.icon}</button>`;
        };
        const emptySlots = Math.max(0, PU_MAX_SLOTS - myPu.length);
        // the nuke sits outside the 3 slots: one per player for the whole quiz,
        // never re-earned, so it stays the last-ditch leveller rather than
        // something everybody stockpiles
        const iHaveNuke = hasNuke(me);
        const nukeUsable = puLive && !myPlay && iHaveNuke && rivals.length > 0;
        trayHTML = `
          <div class="qb-pu-tray">
            ${myPu.map((t, i) => slotBtn(t, i)).join('')}
            ${Array.from({length: emptySlots}, (_, i) => `<span class="qb-pu-slot empty">${myPu.length + i + 1}</span>`).join('')}
          </div>
          <button class="qb-pu-nuke ${iHaveNuke ? '' : 'spent'}" data-action="play-pu" data-type="nuke" ${nukeUsable ? '' : 'disabled'}>
            ${iHaveNuke ? `${POWERUPS.nuke.icon} TACTICAL NUKE &middot; one per quiz` : `${POWERUPS.nuke.icon} Nuke spent`}
          </button>
          <div class="qb-pu-note">${
            myPlay ? `${POWERUPS[myPlay.type] ? POWERUPS[myPlay.type].icon + ' ' + POWERUPS[myPlay.type].name : 'Powerup'} played${myPlay.targetName ? ` on ${esc(myPlay.targetName)}` : ''} &mdash; one per question!`
            : puLive ? 'Powerups are live — tap one to play it (one per question)'
            : myPu.length ? 'Your powerups — they unlock on question rounds' : 'No powerups banked'}</div>
          ${me.virus ? `<div class="qb-infected-badge">🦠 INFECTED by ${esc(me.virus.byName || 'someone')} &mdash; &minus;${VIRUS_DAMAGE} every question until you answer one correctly!</div>` : ''}
        `;
        // a claim is banked until a slot frees up; then the picker appears
        if(puPending(me) > 0 && myPu.length < PU_MAX_SLOTS){
          trayHTML += `
            <div class="qb-pu-target" style="border:1px solid var(--gold);border-radius:14px;padding:12px;">
              <div class="qb-pu-note" style="color:var(--gold);">🎁 <strong>You've earned a new powerup!</strong> Pick one:</div>
              ${PU_CHOOSABLE.map(([t, d]) => `<button data-action="claim-pu" data-type="${t}">${d.icon} ${d.name}</button>`).join('')}
            </div>
          `;
        }
      }
    }

    // Everything that decides the *structure* of what's on screen. While this
    // holds steady, a rebuild would gain nothing and cost us the clue image (its
    // load restarts from scratch) and any half-dragged slider, so we patch instead.
    const shape = JSON.stringify([
      state.status, state.qMode, state.textMode, state.sliderMode, state.reviewing, state.countdown,
      state.answerEpoch, state.anteEpoch, state.buzzEpoch, state.wagerActive, state.wagerPhase,
      state.question, state.qImage, state.qAnswers, state.wagerClue, state.wagerImage, state.carryKitty,
      state.sliderMin, state.sliderMax, state.sliderStep, state.sliderUnit,
      myBet ? [myBet.amount, !!myBet.pass] : null,
      myAnswer ? [myAnswer.choice, myAnswer.text, myAnswer.value] : null,
      // powerups: the tray, an armed target list, a played state or a pending
      // claim all change the phone's structure, so they must sit in the shape
      myPu, myPlay ? [myPlay.type, myPlay.target] : null, puArming ? puArming.type : null,
      puLive, me ? puPending(me) : 0, hasNuke(me), !!(me && me.virus),
      myAvatar, myPlayerName, statusLine, statusSub, stagePill, buzzerDisabled, players.length
    ]);
    if(prevPlayerShape === shape && root.querySelector('.qb-card')){
      const set = (id, text) => { const el = document.getElementById(id); if(el) el.textContent = text; };
      set('qb-p-score', `${myScore} pts`);
      set('qb-p-kitty', pot);
      set('qb-p-pot', bettingPot);
      set('qb-p-decided', `${decidedCount} of ${players.length}`);
      const answeredEl = document.getElementById('qb-p-answered');
      if(answeredEl) answeredEl.textContent = `${answeredCount} ${state.sliderMode ? 'guessed' : 'answered'} so far`;
      const sb = document.getElementById('qb-p-scoreboard');
      if(sb) sb.innerHTML = scoreboardHTML(players, false);
      return;
    }
    prevPlayerShape = shape;

    root.innerHTML = `
      <div class="qb-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-weight:700;">${myAvatar} ${esc(myPlayerName || '')}</span>
          <span style="display:flex;align-items:center;gap:12px;">
            <button class="qb-back-link" style="margin:0;" data-action="toggle-sound" title="Buzzer sound on this phone">${soundOn ? '🔊' : '🔇'}</button>
            <span class="pts" id="qb-p-score" style="font-family:'Archivo Black',sans-serif;color:var(--gold);">${myScore} pts</span>
          </span>
        </div>
        ${centreHTML}
        ${trayHTML}
        <div class="qb-scoreboard" id="qb-p-scoreboard">
          ${scoreboardHTML(players, false)}
        </div>
      </div>
      <p class="qb-small" style="margin-top:14px;">Your place is saved on this phone &mdash; if the page refreshes you'll rejoin with your score.</p>
    `;
    bindActions();

    // live readout under the thumb as they drag; the value itself is only sent
    // when they lock it in
    const sliderEl = document.getElementById('qb-slider');
    if(sliderEl){
      sliderEl.oninput = () => {
        const out = document.getElementById('qb-slider-val');
        if(out) out.textContent = fmtGuess(parseFloat(sliderEl.value), state.sliderUnit, groupNums(state.sliderMax));
      };
    }

    if(!playerPoll){
      // No "are they typing?" guard here on purpose. The shape fingerprint above
      // already leaves inputs alone while the screen's shape holds, and skipping
      // the poll on focus would strand a phone whose slider or text box still has
      // focus (iOS doesn't move focus when you tap a button) on a dead question.
      playerPoll = setInterval(() => {
        if(view === 'player' && bucket) renderPlayer();
      }, 800);
      // fine ticker for the countdown: repaints the number/colour in place (the
      // 800ms poll deliberately leaves it alone). Visual only — the tick SOUNDS
      // come from the display, the room's one shared clock, so phones can drift
      // a second without the room hearing it
      playerTickLoop = setInterval(() => {
        if(view !== 'player') return;
        if(soundOn && audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
        const t = playerQTimer || playerBuzzTimer;
        const el = document.getElementById('qb-p-countdown');
        if(!t || !el) return;
        const remain = Math.max(0, Math.ceil((t.endsAt - Date.now()) / 1000));
        el.textContent = remain;
        el.classList.toggle('warn', remain <= 10 && remain > 3);
        el.classList.toggle('crit', remain <= 3);
      }, 200);
    }
  }

  async function buzzIn(){
    if(!myPlayerId) return;
    const state = await getGameState();
    if(state.status !== 'live' || !state.buzzEpoch) return;
    if((state.lockedOut || []).includes(myPlayerId)) return;
    // tie-break sudden death: only the tied leaders' buzzers work
    if(state.suddenDeath && (state.sdEligible || []).length && !(state.sdEligible || []).includes(myPlayerId)) return;
    const players = await getPlayers();
    const me = players.find(p => p.id === myPlayerId);
    playBuzzFor(me || { id: myPlayerId });
    // write only my own key; the earliest server timestamp decides who was first
    try{
      await fetch(buzzUrl(state.buzzEpoch, myPlayerId), { method:'PUT', body: JSON.stringify({
        id: myPlayerId,
        name: me ? me.name : myPlayerName,
        avatar: me ? me.avatar : '',
        sound: soundIndexFor(me || { id: myPlayerId }),
        ts: { '.sv':'timestamp' }
      }) });
    }catch(e){ console.error(e); }
    renderPlayer();
  }

  // ---------- playing a powerup ----------
  // Own-key write under the question's puEpoch — race-free like everything
  // else. One play per player per question: the phone locks its tray once its
  // own key exists, and the host resolves whatever is there at scoring time.
  async function playPowerup(type, targetId){
    if(!myPlayerId || !POWERUPS[type]) return;
    const state = await getGameState();
    const answering = state.qMode && state.status === 'live' && !!state.answerEpoch;
    if(!(state.qMode && state.status === 'live' && state.puEpoch && !state.reviewing && (state.countdown || answering))) return;
    if(type === 'fifty' && (state.textMode || state.sliderMode || !(state.qAnswers || []).length)) return;
    const players = await getPlayers();
    const me = players.find(p => p.id === myPlayerId);
    // the nuke is held on its own field (one per quiz); the rest live in slots
    if(POWERUPS[type].granted ? !hasNuke(me) : !puList(me).includes(type)) return;
    const existing = await fetchPowers(state.puEpoch);
    if(existing[myPlayerId]){ puArming = null; renderPlayer(); return; }  // already played this question
    const target = targetId ? players.find(p => p.id === targetId) : null;
    if(POWERUPS[type].target === 'player' && !target) return;
    playSound('arm');
    try{
      await fetch(powerUrl(state.puEpoch, myPlayerId), { method:'PUT', body: JSON.stringify({
        id: myPlayerId,
        name: me ? me.name : myPlayerName,
        avatar: me ? me.avatar : '',
        type,
        target: target ? target.id : null,
        targetName: target ? target.name : '',
        targetAvatar: target ? target.avatar : '',
        ts: { '.sv':'timestamp' }
      }) });
    }catch(e){ console.error(e); }
    puArming = null;
    renderPlayer();
  }
  // claiming an earned pick: the phone writes only its own key under qb-pupick;
  // the host tab (sole writer of qb-players) folds it into the bank and deletes
  // the key on its next poll, so the new icon appears within a second or two
  async function claimPowerup(type){
    if(!myPlayerId || !POWERUPS[type]) return;
    const players = await getPlayers();
    const me = players.find(p => p.id === myPlayerId);
    if(POWERUPS[type] && POWERUPS[type].granted) return;   // the nuke is issued, never claimed
    if(!me || puPending(me) <= 0 || puList(me).length >= PU_MAX_SLOTS) return;
    playSound('join');
    try{
      await fetch(puPickUrl(myPlayerId), { method:'PUT', body: JSON.stringify({ id: myPlayerId, type, ts: { '.sv':'timestamp' } }) });
    }catch(e){ console.error(e); }
    renderPlayer();
  }

  // player bets points on themselves for the wager round.
  // Writes only their own key, like buzzing, so simultaneous bets don't clash.
  async function placeBet(){
    if(!myPlayerId) return;
    const input = document.getElementById('qb-bet-amount');
    const wanted = input ? parseInt(input.value, 10) : 0;
    if(!Number.isFinite(wanted) || wanted <= 0){ alert('Enter how many points to bet.'); return; }
    const state = await getGameState();
    if(!state.wagerActive || state.wagerPhase !== 'betting' || !state.anteEpoch) return;
    const players = await getPlayers();
    const me = players.find(p => p.id === myPlayerId);
    // capped at MAX_BET but NOT at your score: you're allowed to go into the red
    const amount = Math.min(wanted, MAX_BET);
    try{
      await fetch(anteUrl(state.anteEpoch, myPlayerId), { method:'PUT', body: JSON.stringify({
        id: myPlayerId, name: me ? me.name : myPlayerName, avatar: me ? me.avatar : '', amount
      }) });
    }catch(e){ console.error(e); }
    playSound('join');
    renderPlayer();
  }
  async function cancelBet(){
    if(!myPlayerId) return;
    const state = await getGameState();
    if(!state.wagerActive || state.wagerPhase !== 'betting' || !state.anteEpoch) return;
    try{ await fetch(anteUrl(state.anteEpoch, myPlayerId), { method:'DELETE' }); }catch(e){}
    renderPlayer();
  }
  // "no bet": a nil stake is still an answer, so the host can see everyone has
  // decided and get on with the question instead of waiting on a quiet phone
  async function passBet(){
    if(!myPlayerId) return;
    const state = await getGameState();
    if(!state.wagerActive || state.wagerPhase !== 'betting' || !state.anteEpoch) return;
    const players = await getPlayers();
    const me = players.find(p => p.id === myPlayerId);
    try{
      await fetch(anteUrl(state.anteEpoch, myPlayerId), { method:'PUT', body: JSON.stringify({
        id: myPlayerId, name: me ? me.name : myPlayerName, avatar: me ? me.avatar : '', amount: 0, pass: true
      }) });
    }catch(e){ console.error(e); }
    playSound('join');
    renderPlayer();
  }

  // slider round: the guess can be re-slid and re-locked until time runs out
  async function answerSlider(){
    if(!myPlayerId) return;
    const el = document.getElementById('qb-slider');
    if(!el) return;
    const state = await getGameState();
    if(!state.qMode || !state.sliderMode || state.status !== 'live' || state.reviewing || !state.answerEpoch) return;
    // clamp to the host's range in case a fiddled slider sends something silly
    const value = Math.min(state.sliderMax, Math.max(state.sliderMin, parseFloat(el.value)));
    if(!Number.isFinite(value)) return;
    const players = await getPlayers();
    const me = players.find(p => p.id === myPlayerId);
    playBuzzFor(me || { id: myPlayerId });   // locking an answer sounds like YOU, not a generic blip
    try{
      await fetch(answerUrl(state.answerEpoch, myPlayerId), { method:'PUT', body: JSON.stringify({
        id: myPlayerId,
        name: me ? me.name : myPlayerName,
        avatar: me ? me.avatar : '',
        value,
        ts: { '.sv':'timestamp' }
      }) });
    }catch(e){ console.error(e); }
    renderPlayer();
  }

  // typed answer for a text round; can be changed until time runs out (the
  // newest write wins and carries the newer server timestamp)
  async function answerText(){
    if(!myPlayerId) return;
    const input = document.getElementById('qb-text-answer');
    const text = input ? input.value.trim() : '';
    if(!text){ alert('Type an answer first.'); return; }
    const state = await getGameState();
    if(!state.qMode || !state.textMode || state.status !== 'live' || state.reviewing || !state.answerEpoch) return;
    const players = await getPlayers();
    const me = players.find(p => p.id === myPlayerId);
    playBuzzFor(me || { id: myPlayerId });   // locking an answer sounds like YOU, not a generic blip
    try{
      await fetch(answerUrl(state.answerEpoch, myPlayerId), { method:'PUT', body: JSON.stringify({
        id: myPlayerId,
        name: me ? me.name : myPlayerName,
        avatar: me ? me.avatar : '',
        text,
        ts: { '.sv':'timestamp' }
      }) });
    }catch(e){ console.error(e); }
    renderPlayer();
  }

  // multiple-choice answer: one tap, locked in, timed by the server clock
  async function answerQuestion(choice){
    if(!myPlayerId) return;
    const state = await getGameState();
    if(!state.qMode || state.status !== 'live' || !state.answerEpoch) return;
    const players = await getPlayers();
    const me = players.find(p => p.id === myPlayerId);
    playBuzzFor(me || { id: myPlayerId });   // locking an answer sounds like YOU, not a generic blip
    try{
      await fetch(answerUrl(state.answerEpoch, myPlayerId), { method:'PUT', body: JSON.stringify({
        id: myPlayerId,
        name: me ? me.name : myPlayerName,
        avatar: me ? me.avatar : '',
        choice,
        ts: { '.sv':'timestamp' }
      }) });
    }catch(e){ console.error(e); }
    renderPlayer();
  }

  // ---------- DISPLAY ----------
  let displayPoll = null;
  let displayTick = null;
  let displayBuzzTimer = null;
  let displayQTimer = null;   // countdown for multiple-choice questions
  // the 3-2-1 opening a question. Purely visual and driven by the display's own
  // clock (like displayBuzzTimer): the host still owns when the question really
  // opens, so a second of drift here can't affect anyone's score.
  let displayStartCount = null;
  let prevDisplaySnap = null;
  // renders await several fetches, so a slow one can finish after a newer one
  // started; each render takes a ticket and abandons itself if it went stale
  let displaySeq = 0;
  let displayPuSeen = {};   // powerup plays this projector has already announced, epoch:player

  // the nuke's flashing INBOUND strip: imperative on/off against <body>, like
  // the banners, so the poll repaint can't restart its blink animation
  function ensureNukeAlert(on){
    const cur = document.getElementById('qb-nuke-alert');
    if(on && !cur){
      const el = document.createElement('div');
      el.id = 'qb-nuke-alert';
      el.className = 'qb-nuke-alert';
      el.innerHTML = '🚨 ☢️ TACTICAL NUKE INBOUND ☢️ 🚨';
      document.body.appendChild(el);
    } else if(!on && cur){
      cur.remove();
    }
  }

  // big self-destructing result banner, appended to <body> so the 900ms
  // display re-render can't wipe it mid-animation
  function showBanner(kind, html){
    document.querySelectorAll('.qb-banner-overlay').forEach(el => el.remove());
    const overlay = document.createElement('div');
    overlay.className = 'qb-banner-overlay';
    const emojis = kind === 'correct' ? ['🎉','⭐','✨','🎊']
      : kind === 'bomb' ? ['💣','💥','🔥','💢']
      : kind === 'nuke' ? ['☢️','💥','🔥','🚨']
      : kind === 'oil' ? ['🛢️','⚫','💧','🌧️']
      : ['💥','❌','💢','😬'];
    let particles = '';
    for(let i = 0; i < 16; i++){
      const ang = (Math.PI * 2 * i) / 16;
      const dist = 240 + Math.random() * 180;
      particles += `<span class="qb-banner-particle" style="--dx:${Math.round(Math.cos(ang) * dist)}px;--dy:${Math.round(Math.sin(ang) * dist)}px;">${emojis[i % emojis.length]}</span>`;
    }
    overlay.innerHTML = `${particles}<div class="qb-banner ${kind}">${html}</div>`;
    document.body.appendChild(overlay);
    // the nuke card's exit animation is delayed longer, so it lives longer
    setTimeout(() => overlay.remove(), kind === 'nuke' ? 5200 : 3400);
  }
  // small gold instruction strip used on the projector to explain what's happening
  function tipHTML(text){
    return `<div class="qb-tip">💡 ${text}</div>`;
  }
  // powerup drama for the reveal screen: bombs (with the maths spelled out so
  // there are no arguments about the damage) and oil slicks. Autos, doubles and
  // 50/50s show as badges on the result rows instead.
  function puEventLinesHTML(s){
    const evs = (s.puEvents || []).filter(e => ['bomb','oil','nuke','carpet','virus','tick','cured'].includes(e.type));
    return evs.map(e => {
      if(e.type === 'carpet'){
        return e.fired
          ? `<div class="qb-bomb-line">🧨💥 ${esc(e.fromName)} CARPET BOMBED THE ROOM! &minus;${e.damage} each
               <span class="maths">${(e.hits || []).map(h => `${h.avatar || ''} ${esc(h.name)} &minus;${e.damage}`).join(' &middot; ') || 'nobody in range'}</span></div>`
          : `<div class="qb-bomb-line dud">🧨💨 ${esc(e.fromName)}'s carpet bomb never left the bay &mdash; wrong answer!</div>`;
      }
      if(e.type === 'virus'){
        return e.fired
          ? `<div class="qb-bomb-line sick">🦠 ${esc(e.fromName)} INFECTED ${esc(e.targetName)}! &minus;${e.damage} points
               <span class="maths">&minus;${VIRUS_DAMAGE} more every question until ${esc(e.targetName)} answers one correctly</span></div>`
          : `<div class="qb-bomb-line dud">🦠💨 ${esc(e.fromName)}'s virus didn't take &mdash; you have to get it RIGHT to infect!</div>`;
      }
      if(e.type === 'tick'){
        return `<div class="qb-bomb-line sick">🦠 ${esc(e.targetName)} is still infected! &minus;${e.damage} points
               <span class="maths">Answer a question correctly to cure it${e.fromName ? ` &mdash; ${esc(e.fromName)}'s virus is still working` : ''}</span></div>`;
      }
      if(e.type === 'cured'){
        return `<div class="qb-bomb-line well">💊✨ ${esc(e.targetName)} answered right and CURED the virus!
               <span class="maths">No more &minus;${VIRUS_DAMAGE} a question &mdash; back to full health</span></div>`;
      }
      if(e.type === 'nuke'){
        return e.fired
          ? `<div class="qb-nuke-block">
               <div class="qb-bomb-line" style="font-size:30px;">☢️💥 ${esc(e.fromName)} DROPPED A TACTICAL NUKE!</div>
               <div class="qb-bomb-line" style="font-size:20px;">${(e.hits || []).map(h => `${h.avatar || ''} ${esc(h.name)} &minus;${e.damage}`).join(' &middot; ')}</div>
               <div class="qb-bomb-line" style="font-size:20px;color:#ffb347;">${esc(e.fromName)} pays &minus;${e.selfCost} for pressing the button</div>
               <span class="maths">…and NOBODY wins any points on this question. Scorched earth.</span>
             </div>`
          : `<div class="qb-bomb-line dud">☢️💨 ${esc(e.fromName)}'s nuke failed to launch &mdash; wrong answer, warhead wasted!</div>`;
      }
      if(e.type === 'bomb'){
        return e.fired
          ? `<div class="qb-bomb-line">💣💥 ${esc(e.fromName)} BOMBED ${esc(e.targetName)}! &minus;${e.damage} points
               <span class="maths">${esc(e.targetName)} ${e.targetWon
                 ? `won +${e.targetWon} on the question &minus; ${e.damage} bomb = ${e.targetNet >= 0 ? '+' : ''}${e.targetNet} overall`
                 : `won nothing on the question, so takes the full &minus;${e.damage}`}</span></div>`
          : `<div class="qb-bomb-line dud">💣💨 ${esc(e.fromName)}'s bomb on ${esc(e.targetName)} fizzled &mdash; you have to get it RIGHT to set it off!</div>`;
      }
      return `<div class="qb-bomb-line oil">🛢️ ${esc(e.fromName)} oiled ${esc(e.targetName)}'s screen!</div>`;
    }).join('');
  }
  // what happened to the kitty, for the reveal screen. An unwon kitty isn't
  // burned any more — it rolls into the next wager, which is worth shouting about.
  function kittyLineHTML(s){
    if(s.betWon) return `<div class="qb-pot-line">💰 ${esc(s.kittyWinnerName || s.winnerName || 'Someone')} scooped the ${s.betWon}-point kitty!${s.betMatched ? ` <strong>Only they dared to bet &mdash; the house doubled their ${s.betMatched}-point stake!</strong>` : ''}</div>`;
    if(s.kittyRolled) return `<div class="qb-pot-line roll">💰 Nobody got it &mdash; the ${s.kittyRolled}-point kitty <strong>rolls over to the next wager round!</strong></div>`;
    return '';
  }
  function standingsHTML(players){
    const sorted = sortedPlayers(players);
    if(!sorted.length) return `<div class="qb-idle-box">No players have joined yet</div>`;
    const medals = ['🥇','🥈','🥉'];
    const tied = tiedLeaders(players);
    const tiedIds = tied.map(p => p.id);
    return `<div class="qb-standings">` + sorted.map((p, i) => `
      <div class="qb-standing-row ${i === 0 || tiedIds.includes(p.id) ? 'leader' : ''}">
        <span class="rank">${tiedIds.includes(p.id) ? '🤝' : medals[i] || (i + 1) + '.'}</span>
        <span class="who">${p.avatar} ${esc(p.name)}${puHeldHTML(p)} ${tiedIds.includes(p.id) ? '<span class="qb-wager-tag">TIED FOR 1st</span>' : ''}</span>
        <span class="pts">${p.score}</span>
      </div>
    `).join('') + `</div>`
    + (tied.length ? tipHTML(`It's level at the top &mdash; a <strong>⚡ sudden death</strong> round settles it. Only the tied players' buzzers will work.`) : '');
  }

  function joinedPlayersHTML(players){
    if(players.length === 0) return `<p class="qb-small">Waiting for the first player to join&hellip;</p>`;
    return `<div class="qb-lobby-grid">` + players.map(p => `
      <div class="qb-lobby-chip"><span class="av">${p.avatar}</span> ${esc(p.name)}</div>
    `).join('') + `</div>`;
  }
  // the "who's answered" chips on a live question; patched in place each poll so
  // the rest of the question view (crucially the clue image) isn't rebuilt
  function answeredChipsHTML(list){
    return list.length
      ? list.map(a => `<span class="qb-lobby-chip"><span class="av">${a.avatar || ''}</span> ${esc(a.name || '')} ✔</span>`).join('')
      : 'Answers appear here as they come in&hellip;';
  }

  // The join link and QR encode this page's own URL, so they only work on other
  // phones when the page itself is hosted somewhere phones can reach.
  function pageReachableByPhones(){
    if(location.protocol === 'file:') return false;
    return location.hostname !== 'localhost' && location.hostname !== '127.0.0.1';
  }
  function reachWarningHTML(){
    if(pageReachableByPhones()) return '';
    return `<p class="qb-small" style="color:#e0a03a;max-width:520px;margin:14px auto 0;">Heads up: this page is only open on this computer, so phones can't use this QR or link. Put the file online (e.g. GitHub Pages or Netlify) and open the display from that address instead.</p>`;
  }
  function renderQrInto(elId, size){
    const el = document.getElementById(elId);
    if(!el) return;
    el.innerHTML = '';
    const link = buildLinkWithParams('join');
    if(window.QRCode){
      new QRCode(el, { text: link, width: size, height: size, colorDark: '#12141c', colorLight: '#ffffff' });
    } else {
      // QR library blocked or offline: show the link itself so the box is never just blank
      el.innerHTML = `<div style="max-width:${size}px;word-break:break-all;color:#12141c;font-size:12px;font-weight:600;">${esc(link)}</div>`;
    }
  }
  function joinStripHTML(){
    return `
      <div class="qb-join-strip">
        <div class="qb-qr-mini"><div id="qb-qr-mini-canvas"></div></div>
        <div style="text-align:left;">
          <div class="qb-small">Late to the party? Scan to join</div>
          <div class="strip-code">${esc(bucket)}</div>
        </div>
      </div>
    `;
  }

  async function renderDisplay(){
    if(!bucket){
      root.innerHTML = `${backLink('home','&larr; Back')}${noSessionHTML('display')}`;
      bindActions();
      return;
    }
    if(!displayPoll){
      displayPoll = setInterval(() => { if(view === 'display' && bucket) renderDisplay(); }, 900);
      // fine-grained ticker for the answer countdowns and the TIME'S UP moments
      displayTick = setInterval(() => {
        if(view !== 'display') return;
        // keep the cast tab's audio alive: browsers quietly suspend the context
        // on backgrounded/cast tabs, which is what silences the projector mid-game
        if(soundOn && audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
        // the display is the room's one shared clock, so IT does the tick
        // sounds (phones only show the numbers): a soft blip each second,
        // urgent in the last 10, critical in the last 3, and colours to match
        const tickCountdown = (timer, el) => {
          const remain = Math.max(0, Math.ceil((timer.endsAt - Date.now()) / 1000));
          if(el){
            el.textContent = remain;
            el.classList.toggle('warn', remain <= 10 && remain > 3);
            el.classList.toggle('crit', remain <= 3);
          }
          if(el && remain !== timer.lastBeep){
            timer.lastBeep = remain;
            if(remain > 0) playSound(remain <= 3 ? 'tickCrit' : remain <= 10 ? 'tickWarn' : 'tick');
          }
          return remain;
        };
        if(displayBuzzTimer){
          const remain = tickCountdown(displayBuzzTimer, document.getElementById('qb-countdown'));
          if(remain === 0 && !displayBuzzTimer.fired){
            displayBuzzTimer.fired = true;
            playSound('timesup');
            showBanner('timesup', `⏰ TIME'S UP!<div style="font-size:26px;margin-top:10px;">Host's decision&hellip;</div>`);
          }
        }
        if(displayQTimer){
          const remain = tickCountdown(displayQTimer, document.getElementById('qb-qcountdown'));
          if(remain === 0 && !displayQTimer.fired){
            displayQTimer.fired = true;
            playSound('timesup');
            renderDisplay();   // flip straight to the "checking answers" view
          }
        }
        // the 3-2-1 before a question: repaint the number in place and pip once
        // per step, so the count never stutters on the 900ms poll
        if(displayStartCount){
          const remain = Math.max(0, Math.ceil((displayStartCount.endsAt - Date.now()) / 1000));
          if(remain !== displayStartCount.shown){
            displayStartCount.shown = remain;
            const el = document.getElementById('qb-startcount');
            if(el){
              el.innerHTML = remain > 0
                ? `<div class="num">${remain}</div><div class="lbl">Get ready&hellip;</div>`
                : `<div class="num go">GO!</div>`;
            }
            playSound(remain > 0 ? 'pip' : 'go');
          }
        }
      }, 200);
    }
    const seq = ++displaySeq;
    const [state, players] = await Promise.all([getGameState(), getPlayers()]);
    if(seq !== displaySeq) return;   // a newer render superseded this one

    // podium mode renders once and then leaves the DOM alone, so its staged
    // reveal animations and music aren't restarted by the poll
    if(state.showPodium){
      prevDisplaySnap = null;
      displayBuzzTimer = null;
      displayQTimer = null;
      if(!document.getElementById('qb-podium')) renderPodium(players, state.quizTitle);
      return;
    }

    const buzz = state.status === 'live' ? earliestBuzz(await fetchBuzzes(state.buzzEpoch), state.lockedOut) : null;
    const currentStage = (state.stages && state.stages[state.stageIndex]) || null;
    // showLobby lets the host force the join screen back up even mid-game
    const isLobby = !state.roundId || !!state.showLobby;
    const showStandings = !!state.showStandings;
    const tiedAtTop = tiedLeaders(players);
    const betting = state.wagerActive && state.wagerPhase === 'betting';
    const bettingAntes = betting ? await fetchAntes(state.anteEpoch) : {};
    const answering = state.qMode && state.status === 'live' && !!state.answerEpoch; // false while a wager's betting phase hides the question
    const qAnswersLive = answering ? await fetchAnswers(state.answerEpoch) : {};
    // powerup plays land mid-question (from the 3-2-1 onwards). The projector
    // announces the loud ones the moment they happen: oil slicks get their
    // dripping banner, an armed nuke trips the air-raid siren. Bombs stay
    // secret until the reveal — that's their drama.
    const puWatch = state.qMode && state.status === 'live' && !!state.puEpoch && !state.reviewing;
    const livePowers = puWatch ? await fetchPowers(state.puEpoch) : {};
    if(seq !== displaySeq) return;

    let nukeArmed = false;
    Object.values(livePowers).forEach(pw => {
      if(!pw || !pw.id) return;
      const key = state.puEpoch + ':' + pw.id;
      if(pw.type === 'oil' && pw.target){
        if(!displayPuSeen[key]){
          displayPuSeen[key] = 1;
          playSound('splat');
          showBanner('oil', `🛢️ ${esc(pw.name || 'Someone')} OILED ${esc(pw.targetName || 'someone')}!<div style="font-size:26px;margin-top:10px;">5 seconds of drippy chaos on their phone</div>`);
        }
      } else if(pw.type === 'nuke'){
        nukeArmed = true;
        if(!displayPuSeen[key]){
          displayPuSeen[key] = 1;
          playSound('siren');
        }
      }
    });
    // the flashing INBOUND strip lives outside the polled DOM (like the
    // banners), so the repaint can't blink it; it drops at the reveal
    ensureNukeAlert(nukeArmed);

    // the 3-2-1 opening a question: start this display's own clock once per round
    const counting = !!state.countdown && state.status === 'live' && !isLobby && !showStandings;
    if(counting){
      if(!displayStartCount || displayStartCount.roundId !== state.roundId){
        displayStartCount = { roundId: state.roundId, endsAt: Date.now() + COUNTDOWN_SECONDS * 1000, shown: null };
      }
    } else {
      displayStartCount = null;
    }

    if(answering && !state.reviewing){
      if(!displayQTimer || displayQTimer.epoch !== state.answerEpoch){
        displayQTimer = { epoch: state.answerEpoch, endsAt: Date.now() + (state.qSeconds || QUESTION_SECONDS) * 1000, fired: false };
      }
    } else {
      displayQTimer = null;
    }

    if(buzz){
      const key = (state.buzzEpoch || '') + ':' + buzz.id;
      if(!displayBuzzTimer || displayBuzzTimer.key !== key){
        displayBuzzTimer = { key, endsAt: Date.now() + ANSWER_SECONDS * 1000, fired: false };
      }
    } else if(state.status !== 'live' || !displayBuzzTimer || displayBuzzTimer.key.indexOf((state.buzzEpoch || '') + ':') !== 0){
      // only clear the timer when the round moved on (new epoch / reveal); a
      // single failed buzz fetch must NOT reset the countdown back to 15
      displayBuzzTimer = null;
    }

    // the display is the tab being cast, so it's the room's speaker and hype man:
    // whenever the polled state shows something happened, play a sound and, for
    // right/wrong verdicts, fire the big exploding banner
    if(prevDisplaySnap){
      const prev = prevDisplaySnap;
      if(buzz && buzz.id !== prev.buzzedId) playBuzzFor(buzz);
      if(state.status === 'reveal' && prev.status !== 'reveal'){
        const evs = state.puEvents || [];
        const sub = t => `<div style="font-size:26px;margin-top:10px;">${t}</div>`;
        // Several of these can land on one reveal (a bomb AND a virus biting).
        // Queue them loudest-first instead of letting one silently replace the
        // rest — every deduction gets its own moment on the projector.
        const queue = [];
        const firedNuke = evs.find(e => e.type === 'nuke' && e.fired);
        if(firedNuke) queue.push({ kind:'nuke', sound:'siren', after:() => setTimeout(() => playSound('boom'), 900),
          html:`☢️💥 ${esc(firedNuke.fromName)} NUKED THE ROOM!${sub(`&minus;${firedNuke.damage} to everyone else &middot; &minus;${firedNuke.selfCost} to ${esc(firedNuke.fromName)} &middot; nobody scores!`)}` });
        const firedCarpet = evs.filter(e => e.type === 'carpet' && e.fired);
        firedCarpet.forEach(c => queue.push({ kind:'carpet', sound:'carpet',
          html:`🧨💥 ${esc(c.fromName)} CARPET BOMBED THE ROOM!${sub(`&minus;${c.damage} to every rival &mdash; ${(c.hits || []).map(h => esc(h.name)).join(', ') || 'nobody in range'}`)}` }));
        // every bomb gets named: one card would leave a second bomber unannounced
        const firedBombs = evs.filter(e => e.type === 'bomb' && e.fired);
        if(firedBombs.length) queue.push({ kind:'bomb', sound:'boom',
          html: firedBombs.length === 1
            ? `💣💥 ${esc(firedBombs[0].fromName)} BOMBED ${esc(firedBombs[0].targetName)}!${sub(`&minus;${firedBombs[0].damage} points`)}`
            : `💣💥 ${firedBombs.length} BOMBS WENT OFF!${sub(firedBombs.map(b => `${esc(b.fromName)} &rarr; ${esc(b.targetName)} &minus;${b.damage}`).join('<br>'))}` });
        const infections = evs.filter(e => e.type === 'virus' && e.fired);
        if(infections.length) queue.push({ kind:'virus', sound:'virus',
          html:`🦠 ${infections.map(v => `${esc(v.fromName)} INFECTED ${esc(v.targetName)}!`).join('<br>')}${sub(`&minus;${VIRUS_DAMAGE} now, and &minus;${VIRUS_DAMAGE} every question until they answer one right`)}` });
        const ticks = evs.filter(e => e.type === 'tick');
        if(ticks.length) queue.push({ kind:'virus', sound:'tick',
          html:`🦠 STILL INFECTED${sub(ticks.map(t2 => `${t2.targetAvatar || ''} ${esc(t2.targetName)} &minus;${t2.damage}`).join('<br>') + '<br>Answer one right to cure it!')}` });
        const cures = evs.filter(e => e.type === 'cured');
        if(cures.length) queue.push({ kind:'correct', sound:'cured',
          html:`💊✨ CURED!${sub(cures.map(c => `${c.targetAvatar || ''} ${esc(c.targetName)}`).join('<br>') + ' shook off the virus')}` });
        if(!queue.length){
          playSound(state.winnerId ? 'correct' : 'reveal');
          if(state.winnerId) showBanner('correct', `${state.winnerAvatar || ''} ${esc(state.winnerName || 'Someone')} got it correct!`);
        } else {
          queue.slice(0, 3).forEach((b, i) => setTimeout(() => {
            playSound(b.sound);
            showBanner(b.kind, b.html);
            if(b.after) b.after();
          }, i * 3600));
        }
      }
      const lockedCount = (state.lockedOut || []).length;
      if(state.status === 'live' && prev.status === 'live' && lockedCount > prev.lockedCount){
        playSound('wrong');
        showBanner('wrong', `${prev.buzzedAvatar || ''} ${esc(prev.buzzedName || 'Someone')} got it wrong!<div style="font-size:26px;margin-top:10px;">Buzzers open again</div>`);
      }
      if(state.status === 'live' && prev.status === 'live' && (state.stageIndex||0) > prev.stageIndex){
        playSound('layer');
        showBanner('layer', `Layer ${(state.stageIndex||0) + 1} of ${(state.stages||[]).length}${currentStage ? `<div style="font-size:26px;margin-top:10px;">${esc(currentStage.label)} &middot; ${currentStage.points} pts up for grabs</div>` : ''}`);
      }
      if(isLobby && players.length > prev.playerCount) playSound('join');
      const introGid = state.showRoundIntro ? state.showRoundIntro.gid : null;
      if(introGid && introGid !== prev.introGid) playSound('layer');   // round announced!
    }
    prevDisplaySnap = {
      buzzedId: buzz ? buzz.id : null,
      buzzedName: buzz ? buzz.name : null,
      buzzedAvatar: buzz ? buzz.avatar : null,
      status: state.status,
      lockedCount: (state.lockedOut || []).length,
      stageIndex: state.stageIndex || 0,
      playerCount: players.length,
      introGid: state.showRoundIntro ? state.showRoundIntro.gid : null
    };

    // Live question already on screen for this same question? Patch just the
    // "answered" chips and leave the rest of the DOM alone. Rebuilding it every
    // poll was restarting the clue image load (so it never appeared) and jolting
    // the layout once a second. The countdown keeps ticking via displayTick.
    const questionTimeUp = displayQTimer && displayQTimer.fired;
    const showIntro = !!state.showRoundIntro;
    const paintingQuestion = answering && !state.reviewing && !questionTimeUp && !isLobby && !showStandings && !showIntro;
    if(paintingQuestion && root.getAttribute('data-qepoch') === state.answerEpoch){
      const row = document.getElementById('qb-answered-row');
      if(row) row.innerHTML = answeredChipsHTML(Object.values(qAnswersLive).filter(a => a && a.id));
      return;
    }
    // remember which question (if any) this render is painting, for the patch above
    root.setAttribute('data-qepoch', paintingQuestion ? state.answerEpoch : '');

    // same idea for the 3-2-1: paint it once, then let displayTick swap the
    // number. Rebuilding it every poll would restart the pop animation.
    if(counting && !showIntro && root.getAttribute('data-counting') === state.roundId) return;
    root.setAttribute('data-counting', counting && !showIntro ? state.roundId : '');

    let stagePill = '';
    let centre;

    if(counting && !showIntro){
      const remain = Math.max(0, Math.ceil((displayStartCount.endsAt - Date.now()) / 1000));
      centre = `<div class="qb-startcount" id="qb-startcount">${remain > 0
        ? `<div class="num">${remain}</div><div class="lbl">Get ready&hellip;</div>`
        : `<div class="num go">GO!</div>`}</div>`;
    } else if(showIntro){
      const ri = state.showRoundIntro;
      centre = `
        <div class="qb-wager-splash" style="margin-top:30px;">
          <div class="round-tag" style="font-size:20px;margin-bottom:14px;">Round ${ri.number} of ${ri.total}</div>
          <div class="qb-wager-title" style="font-size:60px;color:var(--gold);">${esc(ri.name)}</div>
          <div class="qb-pot" style="font-size:30px;margin-top:14px;">${ri.count} question${ri.count === 1 ? '' : 's'} &mdash; get ready!</div>
        </div>
      `;
    } else if(showStandings){
      centre = standingsHTML(players)
        + (state.endOfRound && state.endOfRound.number && state.endOfRound.number < state.endOfRound.total
            ? tipHTML(`Round ${state.endOfRound.number + 1} of ${state.endOfRound.total} coming up&hellip;`)
            : state.endOfRound && state.endOfRound.number >= state.endOfRound.total && !tiedLeaders(players).length
              ? tipHTML(`That was the final round &mdash; podium time! 🏆`)
              : '');
    } else if(!isLobby && betting){
      const inList = Object.values(bettingAntes).filter(a => a && a.id);
      const potNow = sumAntes(bettingAntes) + (state.carryKitty || 0);
      centre = `
        <div class="qb-wager-splash">
          <div class="qb-wager-title">💰 WAGER ROUND</div>
          ${state.carryKitty ? `<div class="qb-carry-banner">🎉 ${state.carryKitty} points rolled over &mdash; the pot starts fat!</div>` : ''}
          ${state.wagerClue ? `<div class="qb-clue-box">🕵️ Clue: <strong>${esc(state.wagerClue)}</strong></div>` : ''}
          ${state.wagerImage ? `<img class="qb-qimage" src="${esc(state.wagerImage)}" alt="clue" onerror="this.style.display='none'" />` : ''}
          <div class="qb-pot">Pot: ${potNow} pts</div>
          <div class="qb-wager-in">${inList.length ? inList.map(a => `<span class="qb-lobby-chip ${a.pass ? 'out' : ''}"><span class="av">${a.avatar || ''}</span> ${esc(a.name || '')} &middot; ${a.pass ? 'no bet' : a.amount + ' pts'}</span>`).join('') : 'Place your bets on your phones&hellip;'}</div>
        </div>
        <div class="qb-rules">
          <h3>💰 Wager round rules</h3>
          <ol>
            <li>Study the clue &mdash; it hints at what's coming next.</li>
            <li>Confident? <strong>Bet up to ${MAX_BET} points on yourself</strong> on your phone, before the song starts. You can even go into <strong>minus points</strong>.</li>
            <li>Not feeling it? Tap <strong>No bet</strong> so the host isn't left waiting.</li>

  // staged podium reveal: 3rd, then 2nd, then the winner, timed to the synth track
  function renderPodium(players, quizTitle){
    const sorted = sortedPlayers(players);
    const rest = sorted.slice(3);
    const fastest = players.filter(p => p.bestReaction).sort((a, b) => a.bestReaction - b.bestReaction)[0];
    const slot = (p, cls, place, h) => p ? `
      <div class="slot" id="qb-slot-${cls}">
        <div class="avatar">${p.avatar}</div>
        <div class="name">${esc(p.name)}</div>

    root.innerHTML = `

        </div>
        <div class="round-tag">The final results</div>
        <h1 class="qb-title">${esc(quizTitle || 'The Music Quiz')}</h1>
        <div class="qb-podium">
          ${slot(sorted[1], 'second', '2', 150)}
          ${slot(sorted[0], 'first', '1', 220)}
          ${slot(sorted[2], 'third', '3', 100)}
        </div>
        <div id="qb-podium-extra" style="opacity:0;transition:opacity .8s;">
          ${fastest ? `<div class="qb-fastest">⚡ Fastest finger of the night: ${fastest.avatar} ${esc(fastest.name)} &mdash; ${(fastest.bestReaction / 1000).toFixed(2)}s</div>` : ''}
          ${rest.length ? `<div class="qb-standings" style="max-width:520px;">${rest.map((p, i) => `
            <div class="qb-standing-row"><span class="rank">${i + 4}.</span><span class="who">${p.avatar} ${esc(p.name)}</span><span class="pts">${p.score}</span></div>`).join('')}</div>` : ''}
        </div>
      </div>
    `;
    bindActions();
    playPodiumSong();
    const show = (cls, t) => setTimeout(() => { const el = document.getElementById('qb-slot-' + cls); if(el) el.classList.add('shown'); }, t);
    show('third', 2500);
    show('second', 5000);
    show('first', 8600);
    if(sorted[0]) setTimeout(() => showBanner('correct', `🏆 ${sorted[0].avatar} ${esc(sorted[0].name)} WINS!`), 8700);
    setTimeout(() => { const el = document.getElementById('qb-podium-extra'); if(el) el.style.opacity = 1; }, 10200);
  }

  // ---------- ADMIN ----------
  let adminPoll = null;
  let adminSeq = 0;   // stale-render ticket, same idea as the display's
  let adminQTimer = null;   // question countdown; fires the automatic scoring
  // everyone has answered: end the question immediately, without the host
  // clicking anything. MC + slider only — typed answers can be changed right up
  // to the whistle, so auto-ending a text round would eat those edits.
  // Holds the answerEpoch already auto-ended, so it fires exactly once.
  let adminAutoEnd = null;
  // the 3-2-1 before a question. The host tab is the single writer, so it owns
  // the clock: when this local timer ends it mints the answer epoch and stamps
  // the server clock, which is the moment the question truly opens.
  let adminCountdown = null;
  const COUNTDOWN_SECONDS = 3;
  let adminTick = null;
  let adminBuzzTimer = null;
  let prevAllDecided = null;   // anteEpoch we've already chimed "everyone's bet" for

  // admin password gate. This keeps players from wandering into the host screen
  // by editing the URL; it is a lock on the door, not a vault (the app is all
  // client-side, so a determined snoop could still read the shared data).
  // The hash lives in the game's data; the host's own browser remembers the
  // password so they are never re-prompted on their machine.
  let adminUnlocked = false;
  async function getAdminHash(){
    const text = await kvGet('qb-admin');
    if(!text) return null;
    try{ return JSON.parse(text); }catch(e){ return null; }
  }
  async function isAdminUnlocked(){
    if(adminUnlocked) return true;
    const hash = await getAdminHash();
    if(!hash){ adminUnlocked = true; return true; } // games created before passwords existed
    try{
      const saved = localStorage.getItem('qb-adminpass:' + bucket);
      if(saved && await sha256Hex(saved) === hash){ adminUnlocked = true; return true; }
    }catch(e){}
    return false;
  }
  async function unlockAdmin(){
    const el = document.getElementById('qb-admin-pass-try');
    const pass = el ? el.value.trim() : '';
    if(!pass){ alert('Enter the admin password.'); return; }
    const hash = await getAdminHash();
    if(hash && await sha256Hex(pass) === hash){
      adminUnlocked = true;
      try{ localStorage.setItem('qb-adminpass:' + bucket, pass); }catch(e){}
      renderAdmin();
    } else {
      alert('Wrong password.');
    }
  }

  // host-side undo: snapshot the shared scores + game state just before each
  // host action, so a mis-click ("marked the wrong answer correct") can be
  // rolled back. Lives only in the host's tab; players can't undo anything.
  let undoStack = [];
  async function withUndo(label, fn){
    const [stateSnap, playersSnap] = await Promise.all([kvGet('qb-state'), kvGet('qb-players')]);
    const proceeded = await fn();
    if(proceeded === false) return; // action was a no-op or the host cancelled it
    undoStack.push({ label, state: stateSnap, players: playersSnap });
    if(undoStack.length > 12) undoStack.shift();
    renderAdmin();
  }
  async function undoLast(){
    const snap = undoStack.pop();
    if(!snap) return;
    // keep anyone who joined after the snapshot, so an undo never kicks a player
    let restored = [];
    try{ restored = snap.players ? JSON.parse(snap.players) : []; }catch(e){}
    const current = await getPlayers();
    current.forEach(p => { if(!restored.some(r => r.id === p.id)) restored.push(p); });
    await Promise.all([
      kvSet('qb-state', snap.state || JSON.stringify(defaultState())),
      kvSet('qb-players', JSON.stringify(restored))
    ]);
    renderAdmin();
  }

  async function toggleStandings(){
    const s = await getGameState();
    s.showStandings = !s.showStandings;
    if(s.showStandings){ s.showPodium = false; s.showLobby = false; s.showRoundIntro = null; }
    else s.endOfRound = null;   // taking standings off dismisses the end-of-round note too
    await saveGameState(s);
    renderAdmin();
  }

  async function toggleLobby(){
    const s = await getGameState();
    s.showLobby = !s.showLobby;
    if(s.showLobby){ s.showStandings = false; s.showPodium = false; s.showRoundIntro = null; }
    await saveGameState(s);
    renderAdmin();
  }

  async function togglePodium(){
    const s = await getGameState();
    if(!s.showPodium){
      // soft guard: a tied top spot deserves a sudden death first, not a coin-flip podium
      const players = await getPlayers();
      const tied = tiedLeaders(players);
      if(tied.length && !confirm(`Top scores are level (${tied.map(p => p.name).join(', ')}). The podium will just pick one of them for 1st. Show it anyway?`)) return;
    }
    s.showPodium = !s.showPodium;
    if(s.showPodium){ s.showStandings = false; s.showLobby = false; s.showRoundIntro = null; }
    await saveGameState(s);
    renderAdmin();
  }

  async function adjustScore(id, delta){

      const p = players.find(x => x.id === id);

  // host editing of a player's name/avatar; hostEdited marks the record as
  // host-owned so the player's phone adopts it and keeps it
  let editingPlayerId = null;
  let editName = '';
  let editAvatar = '';

  // typing a score straight in beats clicking ±1 twelve times. Like the name
  // editor, this pauses the admin poll (see the adminPoll guard) so the repaint

  let editingScoreId = null;
  function openScoreEditor(id){

    renderAdmin();

  // sensible default labels so the host doesn't retype layers every round
  function newStageRow(n, points){
    return { label: n === 1 ? '1 Track Layer' : n + ' Track Layers', points: points };
  }

  async function openAddForm(presetType, groupId){
    const lib = await getLibrary();
    formOpen = 'add';
    formJustOpened = true;
    formGroupId = groupId || null;
    formType = presetType === 'sudden' ? 'sudden' : 'song';
    // auto-title within the right pool: questions get Qn, tie-breakers their own count
    if(formType === 'sudden'){
      formLabel = 'Sudden death ' + (lib.suddens.length + 1);
    } else {
      const g = lib.groups.find(x => x.id === formGroupId);
      formLabel = 'Question ' + (((g && g.questions) || []).length + 1);
    }
    formSong = '';
    formArtist = '';
    formStages = [1,2,3,4,5].map(n => newStageRow(n, 6 - n));
    formWager = false;
    formClue = '';
    formClueImage = '';
    formQuestion = '';
    formImage = '';
    formAnswers = ['', '', '', ''];
    formCorrect = 0;
    formTextAnswer = '';
    formSDAnswer = '';
    formSliderMin = 0; formSliderMax = 100; formSliderAnswer = 50;
    formSliderStep = 0; formSliderBand = 0; formSliderUnit = '';
    formQPoints = DEFAULT_POINTS;
    formQBonus = 1;
    formQSeconds = QUESTION_SECONDS;
    renderAdmin();
  }

  function openEditForm(round, groupId){
    formOpen = round.id;
    formJustOpened = true;
    formGroupId = groupId || null;
    formType = ['question','text','slider','sudden'].includes(round.type) ? round.type : 'song';
    formLabel = round.label || '';
    formSong = round.songTitle || '';
    formArtist = round.artist || '';
    formStages = (round.stages || [newStageRow(1, 5)]).map(s => ({label:s.label, points:s.points}));
    formWager = !!round.isWager;
    formClue = round.wagerClue || '';
    formClueImage = round.wagerImage || '';
    formQuestion = round.question || '';
    formImage = round.imageUrl || '';
    formAnswers = (round.answers || ['', '', '', '']).slice(0, 4);
    while(formAnswers.length < 4) formAnswers.push('');
    formCorrect = round.correctIndex || 0;
    formTextAnswer = round.textAnswer || '';
    formSDAnswer = round.answer || '';
    formSliderMin = Number(round.sliderMin) || 0;
    // a non-slider round has no sliderMax, so fall back to the same default a
    // fresh form gets rather than a 0-0 range
    formSliderMax = Number.isFinite(Number(round.sliderMax)) ? Number(round.sliderMax) : 100;
    formSliderAnswer = Number(round.sliderAnswer) || 0;
    formSliderStep = Number(round.sliderStep) || 0;
    formSliderBand = Number(round.sliderBand) || 0;
    formSliderUnit = round.sliderUnit || '';
    formQPoints = round.points || (round.type === 'slider' ? SLIDER_POINTS : DEFAULT_POINTS);
    formQBonus = Number.isInteger(round.bonus) ? round.bonus : 1;
    formQSeconds = round.seconds || (round.type === 'text' ? TEXT_SECONDS : QUESTION_SECONDS);
    renderAdmin();
  }

  function closeForm(){
    formOpen = false;
    formGroupId = null;

  // ---------- round (group) management ----------
  async function addGroup(){
    const name = prompt('Name this round (e.g. General Knowledge):');
    if(!name || !name.trim()) return;
    const lib = await getLibrary();
    lib.groups.push({ id: makeId('g'), type:'group', name: name.trim(), questions: [] });
    await saveLibrary(lib);
    renderAdmin();
  }
  async function renameGroup(gid){
    const lib = await getLibrary();
    const g = lib.groups.find(x => x.id === gid);
    if(!g) return;
    const name = prompt('Rename this round:', g.name);
    if(!name || !name.trim()) return;
    g.name = name.trim();
    await saveLibrary(lib);
    renderAdmin();
  }
  async function deleteGroup(gid){
    const lib = await getLibrary();
    const g = lib.groups.find(x => x.id === gid);
    if(!g) return;
    const n = (g.questions || []).length;
    if(!confirm(`Delete the round "${g.name}"${n ? ` and its ${n} question${n===1?'':'s'}` : ''}?`)) return;
    lib.groups = lib.groups.filter(x => x.id !== gid);
    await saveLibrary(lib);
    renderAdmin();
  }
  async function moveGroup(gid, dir){
    const lib = await getLibrary();
    const i = lib.groups.findIndex(x => x.id === gid);
    const j = i + dir;
    if(i < 0 || j < 0 || j >= lib.groups.length) return;
    [lib.groups[i], lib.groups[j]] = [lib.groups[j], lib.groups[i]];
    await saveLibrary(lib);
    renderAdmin();
  }
  async function moveQuestion(gid, id, dir){
    const lib = await getLibrary();
    const g = lib.groups.find(x => x.id === gid);
    if(!g) return;
    const i = (g.questions || []).findIndex(q => q.id === id);
    const j = i + dir;
    if(i < 0 || j < 0 || j >= g.questions.length) return;
    [g.questions[i], g.questions[j]] = [g.questions[j], g.questions[i]];
    await saveLibrary(lib);
    renderAdmin();
  }
  async function moveSudden(id, dir){
    const lib = await getLibrary();
    const i = lib.suddens.findIndex(x => x.id === id);
    const j = i + dir;
    if(i < 0 || j < 0 || j >= lib.suddens.length) return;
    [lib.suddens[i], lib.suddens[j]] = [lib.suddens[j], lib.suddens[i]];
    await saveLibrary(lib);
    renderAdmin();
  }
  async function deleteQuestion(gid, id){
    if(!confirm('Delete this question?')) return;
    const lib = await getLibrary();
    const g = lib.groups.find(x => x.id === gid);
    if(!g) return;
    g.questions = (g.questions || []).filter(q => q.id !== id);

  // host presses "Announce" on a round: the projector shows its intro splash
  async function announceRound(gid){
    const lib = await getLibrary();
    const gi = lib.groups.findIndex(g => g.id === gid);
    if(gi < 0) return;
    const g = lib.groups[gi];
    const s = await getGameState();
    const alreadyShowing = s.showRoundIntro && s.showRoundIntro.gid === gid;
    s.showRoundIntro = alreadyShowing ? null : {
      gid, name: g.name, number: gi + 1, total: lib.groups.length, count: (g.questions || []).length
    };
    if(s.showRoundIntro){ s.showStandings = false; s.showPodium = false; s.showLobby = false; s.endOfRound = null; }
    await saveGameState(s);
    renderAdmin();
  }

  function addStageRow(){
    const lastPoints = formStages.length ? formStages[formStages.length-1].points : 6;
    formStages.push(newStageRow(formStages.length + 1, Math.max(1, lastPoints - 1)));
    renderAdmin();
  }

  function removeStageRow(idx){
    if(formStages.length <= 1) return;
    formStages.splice(idx, 1);
    renderAdmin();
